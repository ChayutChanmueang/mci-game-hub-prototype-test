<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zoo Detective - Senior Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-height: 100dvh;
            
            /* Color Palette */
            --bg-cream: #FFFbf0;
            --stroke-dark: #334155;
            --pastel-peach: #FDBA74;
            --pastel-mint: #A7F3D0;
            --pastel-blue: #7DD3FC;
            --pastel-yellow: #FDE047;
            --white: #FFFFFF;
            
            /* Paper Cut Specs */
            --border-thick: 3px solid var(--stroke-dark);
            --shadow-solid: 4px 4px 0px var(--stroke-dark);
            --shadow-solid-sm: 2px 2px 0px var(--stroke-dark);
            --shadow-solid-hover: 2px 2px 0px var(--stroke-dark);
        }

        body {
            font-family: 'Mali', cursive;
            background-color: #E2E8F0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: var(--app-height);
            overflow: hidden;
            color: var(--stroke-dark);
            font-size: 18px; 
        }

        .app-container {
            width: 100%;
            height: 100%;
            max-height: 100%;
            background: var(--bg-cream);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 500px) {
            .app-container {
                max-width: 50vh; /* รักษาอัตราส่วน 9:18 บนจอใหญ่ */
                aspect-ratio: 9/18;
                border-radius: 2.5rem;
                height: 96%;
                border: 8px solid var(--stroke-dark);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        /* --- PAPER CUT UI COMPONENTS --- */
        .paper-panel {
            background: var(--white);
            border: var(--border-thick);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-solid);
            padding: 1.5rem;
        }

        .paper-btn {
            background: var(--white);
            border: var(--border-thick);
            border-radius: 1rem;
            box-shadow: var(--shadow-solid);
            padding: 1rem;
            font-family: inherit;
            font-weight: 700;
            color: var(--stroke-dark);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            font-size: 1.25rem;
        }

        .paper-btn:active {
            transform: translate(2px, 2px);
            box-shadow: var(--shadow-solid-hover);
        }

        /* --- MENU INTERFACE --- */
        #menu-interface {
            padding: 1.5rem;
            padding-top: max(1.5rem, env(safe-area-inset-top));
            padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
        }

        .diff-option {
            display: flex;
            align-items: center;
            background: var(--white);
            border: var(--border-thick);
            border-radius: 1.25rem;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            box-shadow: var(--shadow-solid);
            transition: all 0.15s ease;
        }

        .diff-option:active {
            transform: translate(2px, 2px);
            box-shadow: var(--shadow-solid-hover);
        }
        
        .diff-option.active {
            background: var(--pastel-yellow);
            transform: translate(2px, 2px);
            box-shadow: var(--shadow-solid-hover);
        }

        .diff-icon {
            font-size: 2.5rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            border: 2px solid var(--stroke-dark);
            border-radius: 1rem;
            margin-right: 1rem;
            box-shadow: var(--shadow-solid-sm);
        }

        /* --- GAME INTERFACE --- */
        #game-interface {
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .hud-bar {
            flex: 0 0 auto; /* ความสูงตายตัว ไม่โดนเบียด */
            background: var(--pastel-blue);
            padding: 0.75rem 1rem;
            padding-top: max(0.75rem, env(safe-area-inset-top));
            border-bottom: var(--border-thick);
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-content {
            flex: 1; /* ใช้พื้นที่ที่เหลือทั้งหมด */
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            gap: 0.75rem;
            overflow: hidden; /* ป้องกันไม่ให้ทะลุออกไปบัง Footer */
            position: relative;
        }

        /* --- LAYOUT ที่รับประกันการไม่ทับซ้อน --- */
        .clues-card {
            flex: 1 1 0%; /* ยืดหยุ่นได้ แบ่งพื้นที่กับตารางเกม */
            min-height: 0; /* จำเป็นมาก ป้องกันไม่ให้ flex ขยายทะลุจอเมื่อข้อมูลเยอะ */
            display: flex;
            flex-direction: column;
            background: var(--white);
            border: var(--border-thick);
            border-radius: 1.5rem;
            padding: 1rem;
            box-shadow: var(--shadow-solid);
        }
        
        .clues-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed var(--stroke-dark);
            font-size: 1.25rem;
        }

        .clues-list-wrapper {
            flex: 1 1 0%;
            overflow-y: auto; /* เลื่อนอ่านได้ถ้ายาวเกิน */
            padding-right: 0.5rem;
            -webkit-overflow-scrolling: touch;
        }

        /* คลาสตกแต่ง Scrollbar สำหรับกล่องคำใบ้ */
        .clues-list-wrapper::-webkit-scrollbar { width: 6px; }
        .clues-list-wrapper::-webkit-scrollbar-track { background: transparent; }
        .clues-list-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .grid-wrapper {
            flex: 1.2 1 0%; /* ให้พื้นที่กับตารางเกมมากกว่าคำใบ้เล็กน้อย */
            min-height: 0; /* ป้องกันการทะลุ flex */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.5rem;
        }

        .grid-layout { 
            display: grid; 
            /* กำหนดขนาดผ่าน JS */
        }

        .slot {
            width: 100%;
            height: 100%;
            background: #F1F5F9;
            border: var(--border-thick);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.1);
            transition: transform 0.1s;
            position: relative;
        }
        
        .slot:active { transform: scale(0.95); }
        .slot.active {
            background-color: var(--white);
            box-shadow: var(--shadow-solid-sm);
            transform: scale(1.05);
            z-index: 10;
        }

        /* --- Footer / Controls --- */
        .controls {
            flex: 0 0 auto; /* ความสูงคงที่ ไม่โดนเบียด */
            background: var(--white);
            padding: 1rem;
            padding-bottom: max(1rem, env(safe-area-inset-bottom));
            border-top: var(--border-thick);
            border-radius: 2rem 2rem 0 0;
            z-index: 20;
        }

        .animal-bank {
            display: flex;
            flex-wrap: wrap; /* ให้ปุ่มจัดเรียงปัดบรรทัดอัตโนมัติ */
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .animal-btn {
            width: clamp(60px, 15vw, 80px); /* ขนาดปุ่มสัมพันธ์กับจอ */
            height: clamp(60px, 15vw, 80px);
            background: var(--white);
            border: var(--border-thick);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 8vw, 3rem); 
            transition: all 0.15s;
            cursor: pointer;
            box-shadow: var(--shadow-solid-sm);
            flex: 0 0 auto;
        }
        .animal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        .animal-btn.selected {
            background: var(--pastel-yellow);
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .hidden { display: none !important; }
        
        .wiggle { animation: wiggle 0.4s ease-in-out; }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            75% { transform: rotate(-3deg); }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            animation: fall 1.5s ease-out forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-app">
        
        <!-- === 1. MENU INTERFACE === -->
        <div id="menu-interface">
            <div class="paper-panel text-center mb-6 mt-4">
                <div class="text-6xl mb-2">🕵️‍♂️🦁</div>
                <h1 class="text-3xl font-black" style="color: var(--stroke-dark);">สวนสัตว์นักสืบ</h1>
                <p class="text-lg font-semibold mt-2" style="color: #64748b;">
                    ฝึกสมองด้วยปริศนาจัดบ้านสัตว์<br>สังเกตคำใบ้ แล้ววางสัตว์ให้ถูกที่!
                </p>
            </div>

            <div class="flex-1 mb-4">
                <p class="text-xl font-bold mb-3 ml-2">ระดับความยาก</p>
                
                <div onclick="selectDifficulty(1)" id="diff-1" class="diff-option active">
                    <div class="diff-icon" style="background-color: var(--pastel-mint);">🐣</div>
                    <div class="text-left">
                        <div class="font-bold text-2xl">Easy (ง่าย)</div>
                        <div class="text-base text-slate-600 font-medium">ตาราง 3 ช่อง - เริ่มต้นง่ายๆ</div>
                    </div>
                </div>

                <div onclick="selectDifficulty(2)" id="diff-2" class="diff-option">
                    <div class="diff-icon" style="background-color: var(--pastel-yellow);">🐢</div>
                    <div class="text-left">
                        <div class="font-bold text-2xl">Medium (ปานกลาง)</div>
                        <div class="text-base text-slate-600 font-medium">ตาราง 4 ช่อง - ซับซ้อนขึ้นอีกนิด</div>
                    </div>
                </div>

                <div onclick="selectDifficulty(3)" id="diff-3" class="diff-option">
                    <div class="diff-icon" style="background-color: var(--pastel-peach);">🦊</div>
                    <div class="text-left">
                        <div class="font-bold text-2xl">Hard (ยาก)</div>
                        <div class="text-base text-slate-600 font-medium">ตาราง 6 ช่อง - ท้าทายความจำ</div>
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-2">
                <button onclick="startGame()" class="paper-btn w-full text-2xl py-4" style="background-color: var(--pastel-mint);">
                    ▶ เริ่มเล่นเกม
                </button>
                <div class="flex justify-between items-center mt-4 px-2">
                    <button onclick="toggleMusic()" id="music-btn" class="text-2xl opacity-70 hover:opacity-100 transition">🎵 เปิดเพลง</button>
                </div>
            </div>
        </div>

        <!-- === 2. GAME INTERFACE === -->
        <div id="game-interface" class="hidden">
            <!-- Header -->
            <header class="hud-bar">
                <button onclick="backToMenu()" class="paper-btn text-xl px-4 py-2" style="background: var(--white); box-shadow: var(--shadow-solid-sm);">
                    ◀ ย้อนกลับ
                </button>
                <div class="flex flex-col items-end">
                    <span class="text-sm font-bold uppercase tracking-wider">ด่านที่ <span id="stage-display">1</span>/10</span>
                    <span class="text-lg font-bold" id="level-name">Easy</span>
                </div>
            </header>

            <!-- Main Content -->
            <main class="game-content">
                
                <!-- กล่องคำใบ้ -->
                <section class="clues-card">
                    <div class="clues-header">
                        <span class="text-2xl mr-2">📝</span>
                        <h2 class="font-bold text-xl">คำใบ้</h2>
                    </div>
                    <div class="clues-list-wrapper">
                        <ul id="hint-list" class="space-y-4 text-2xl font-medium list-none p-0 m-0 pb-4 leading-relaxed">
                            <!-- Hints จะถูกเติมที่นี่ -->
                        </ul>
                    </div>
                </section>

                <!-- กล่องตารางเกม -->
                <div class="grid-wrapper" id="grid-wrapper">
                    <section class="grid-layout" id="game-grid">
                        <!-- Slots จะถูกสร้างที่นี่ตามการคำนวณ -->
                    </section>
                </div>
            </main>

            <!-- Footer -->
            <footer class="controls">
                <div id="animal-bank" class="animal-bank">
                    <!-- ปุ่มสัตว์แบบ flex-wrap เพื่อไม่ให้ล้น -->
                </div>
                <button onclick="onCheckAnswer()" class="paper-btn w-full text-2xl py-3" style="background: var(--pastel-peach);">
                    ✅ ส่งคำตอบ
                </button>
            </footer>
        </div>

        <!-- Win Modal -->
        <div id="modal-win" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-6 backdrop-blur-sm">
            <div class="paper-panel w-full max-w-xs text-center relative overflow-hidden" style="background: var(--bg-cream);">
                <div class="text-7xl mb-4 mt-2">🎉</div>
                <h2 class="text-3xl font-bold mb-6" id="win-title">เก่งมาก!</h2>
                
                <div class="grid gap-3" id="win-buttons">
                    <!-- Buttons -->
                </div>
            </div>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bgm" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=bossa-nova-111064.mp3" type="audio/mpeg">
    </audio>

    <script>
        const ALL_ANIMALS = ['🦁', '🐘', '🦒', '🐒', '🦓', '🐯', '🦛', '🐼', '🦊', '🐨', '🐮', '🐷', '🐸', '🐔', '🐧'];
        
        let state = {
            selectedDifficulty: 1,
            level: 1,
            stage: 1, 
            rows: 1,
            cols: 2,
            solution: [],
            currentBoard: [],
            selectedAnimal: null
        };

        const LEVEL_NAMES = {1: "Easy", 2: "Medium", 3: "Hard"};

        // --- Audio System ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'chime') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'error') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        let isMusicPlaying = false;
        function toggleMusic() {
            const bgm = document.getElementById('bgm');
            const btn = document.getElementById('music-btn');
            bgm.volume = 0.3; 
            if (isMusicPlaying) {
                bgm.pause();
                btn.innerText = "🎵 เปิดเพลง";
                btn.style.opacity = "0.7";
            } else {
                bgm.play().catch(e => console.log("Audio play failed:", e));
                btn.innerText = "🔇 ปิดเพลง";
                btn.style.opacity = "1";
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // --- Visual Feedback ---
        function shootConfetti() {
            const colors = ['var(--pastel-peach)', 'var(--pastel-mint)', 'var(--pastel-blue)', 'var(--pastel-yellow)'];
            for(let i=0; i<30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = Math.random() > 0.5 ? '✨' : '⭐';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = (Math.random() * 20 + 20) + 'vh';
                particle.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
                particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (Math.random() * 1 + 1) + 's';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 2000);
            }
        }

        // --- Navigation ---
        function selectDifficulty(lvl) {
            state.selectedDifficulty = lvl;
            playSound('pop');
            document.querySelectorAll('.diff-option').forEach(el => el.classList.remove('active'));
            document.getElementById(`diff-${lvl}`).classList.add('active');
        }

        function showMenu() {
            document.getElementById('menu-interface').classList.remove('hidden');
            document.getElementById('game-interface').classList.add('hidden');
        }

        function backToMenu() {
            playSound('pop');
            showMenu();
        }

        function startGame() {
            playSound('pop');
            state.level = state.selectedDifficulty;
            state.stage = 1;
            document.getElementById('menu-interface').classList.add('hidden');
            document.getElementById('game-interface').classList.remove('hidden');
            initGameRound();
        }

        // --- Game Logic ---
        function initGameRound() {
            // Level 1 = 1x3, Level 2 = 2x2, Level 3 = 2x3 (แนวนอน)
            if (state.level === 1) { state.rows = 1; state.cols = 3; }
            else if (state.level === 2) { state.rows = 2; state.cols = 2; }
            else { state.rows = 2; state.cols = 3; } 

            const totalSlots = state.rows * state.cols;
            const shuffledAnimals = [...ALL_ANIMALS].sort(() => Math.random() - 0.5);
            state.availableAnimals = shuffledAnimals.slice(0, totalSlots);
            state.solution = [...state.availableAnimals].sort(() => Math.random() - 0.5);
            state.currentBoard = new Array(totalSlots).fill(null);
            state.selectedAnimal = null;
            
            document.getElementById('level-name').innerText = LEVEL_NAMES[state.level];
            document.getElementById('stage-display').innerText = state.stage;
            
            renderAnimalBank();
            generateHints();
            
            // ให้ Browser วาด Layout เสร็จก่อน ค่อยคำนวณพื้นที่ตาราง
            setTimeout(renderGrid, 50); 
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            const wrapper = document.getElementById('grid-wrapper');
            grid.innerHTML = '';
            
            // อ่านค่าพื้นที่ว่างที่เหลือจริงๆ จากการแบ่ง Flex
            const availWidth = wrapper.clientWidth - 10;
            const availHeight = wrapper.clientHeight - 10;

            const gap = 12;
            const totalGapW = (state.cols - 1) * gap;
            const totalGapH = (state.rows - 1) * gap;

            // คำนวณขนาดเซลล์ที่ใหญ่ที่สุดที่จะเป็นไปได้โดยไม่ล้น
            const maxCellW = (availWidth - totalGapW) / state.cols;
            const maxCellH = (availHeight - totalGapH) / state.rows;
            
            let cellSize = Math.floor(Math.min(maxCellW, maxCellH));
            // นำค่าจำกัดความกว้าง/สูงตายตัวออก เพื่อให้ยืดหดได้ตามจริง 100%
            
            grid.style.gridTemplateColumns = `repeat(${state.cols}, ${cellSize}px)`;
            grid.style.gridTemplateRows = `repeat(${state.rows}, ${cellSize}px)`;
            grid.style.gap = `${gap}px`;

            const fontSize = Math.floor(cellSize * 0.5);

            for (let i = 0; i < state.rows * state.cols; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.style.fontSize = `${fontSize}px`;
                slot.onclick = () => onSlotClick(i);
                grid.appendChild(slot);
            }
        }

        function renderAnimalBank() {
            const bank = document.getElementById('animal-bank');
            bank.innerHTML = '';

            state.availableAnimals.forEach(animal => {
                const btn = document.createElement('div');
                btn.className = 'animal-btn';
                btn.id = `btn-${animal}`;
                btn.innerText = animal;
                btn.onclick = () => onAnimalSelect(animal);
                bank.appendChild(btn);
            });
        }

        function getPositionName(idx) {
            const r = Math.floor(idx / state.cols);
            const c = idx % state.cols;
            
            if (state.rows === 1) {
                const names = ["ซ้าย", "กลาง", "ขวา"];
                return names[c];
            }
            if (state.rows === 2 && state.cols === 2) {
                const rowName = r === 0 ? "บน" : "ล่าง";
                const colName = c === 0 ? "ซ้าย" : "ขวา";
                return `${colName}${rowName}`;
            }
            // 2x3 Hard (แนวนอน)
            const rowNames = ["บน", "ล่าง"];
            const colNames = ["ซ้าย", "กลาง", "ขวา"];
            return `${rowNames[r]}${colNames[c]}`;
        }

        function getPhrase(type, a1, a2) {
            const phrases = {
                up: `<b>${a1}</b> อยู่บน <b>${a2}</b>`,
                down: `<b>${a1}</b> อยู่ล่าง <b>${a2}</b>`,
                left: `<b>${a1}</b> อยู่ซ้ายของ <b>${a2}</b>`,
                right: `<b>${a1}</b> อยู่ขวาของ <b>${a2}</b>`
            };
            return phrases[type];
        }

        function generateHints() {
            const sol = state.solution;
            const list = document.getElementById('hint-list');
            const hints = [];
            const total = state.rows * state.cols;
            const visited = new Set();
            
            let rootIdx = Math.floor(Math.random() * total);
            visited.add(rootIdx);
            
            hints.push(`<span style="color: var(--pastel-peach); font-weight:900;">${sol[rootIdx]}</span> อยู่ที่ <b>${getPositionName(rootIdx)}</b>`);

            while (visited.size < total - 1) {
                const candidates = [];
                visited.forEach(u => {
                    const r = Math.floor(u / state.cols);
                    const c = u % state.cols;
                    const neighbors = [
                        { idx: u - state.cols, dir: 'up' },
                        { idx: u + state.cols, dir: 'down' },
                        { idx: u - 1, dir: 'left', valid: c > 0 },
                        { idx: u + 1, dir: 'right', valid: c < state.cols - 1 }
                    ];
                    neighbors.forEach(n => {
                        if (n.idx >= 0 && n.idx < total && !visited.has(n.idx)) {
                            if ((n.dir === 'left' || n.dir === 'right') && !n.valid) return;
                            candidates.push({ u: u, v: n.idx, dir: n.dir });
                        }
                    });
                });

                if (candidates.length === 0) break;

                const pick = candidates[Math.floor(Math.random() * candidates.length)];
                const animalU = sol[pick.u];
                const animalV = sol[pick.v];
                
                hints.push(getPhrase(pick.dir, animalV, animalU));
                visited.add(pick.v);
            }
            
            // คำใบ้สุดท้าย
            hints.push(`<span style="color: var(--stroke-dark); opacity: 0.8; font-size: 1.25rem;">ตัวที่เหลือให้วางในช่องว่าง</span>`);
            
            // เรียงลำดับคำใบ้และใช้ตัวเลข
            list.innerHTML = hints.map((h, index) => `
                <li class="flex items-start">
                    <span style="font-weight:900; color:#94a3b8; margin-right:12px; min-width: 24px;">${index + 1}.</span>
                    <span>${h}</span>
                </li>
            `).join('');
        }

        function onAnimalSelect(animal) {
            playSound('pop');
            state.selectedAnimal = animal;
            document.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`btn-${animal}`).classList.add('selected');
        }

        function onSlotClick(idx) {
            if (!state.selectedAnimal) return;
            playSound('pop');
            const prevIdx = state.currentBoard.indexOf(state.selectedAnimal);
            if (prevIdx !== -1) {
                state.currentBoard[prevIdx] = null;
                const prevSlot = document.querySelectorAll('.slot')[prevIdx];
                prevSlot.innerHTML = ``;
                prevSlot.classList.remove('active');
            }
            state.currentBoard[idx] = state.selectedAnimal;
            const slot = document.querySelectorAll('.slot')[idx];
            slot.innerText = state.selectedAnimal;
            slot.classList.add('active');
        }

        function nextStage() {
            playSound('pop');
            state.stage++;
            document.getElementById('modal-win').classList.add('hidden');
            initGameRound();
        }

        function onCheckAnswer() {
            if (state.currentBoard.includes(null)) {
                playSound('error');
                const app = document.getElementById('main-app');
                app.classList.add('wiggle');
                setTimeout(() => app.classList.remove('wiggle'), 400);
                return;
            }

            const isCorrect = state.currentBoard.every((val, i) => val === state.solution[i]);

            if (isCorrect) {
                playSound('chime');
                shootConfetti();
                
                const btnContainer = document.getElementById('win-buttons');
                const isLastStage = state.stage === 10;
                
                let nextBtnHtml = '';
                let titleHtml = `เยี่ยมมาก!`;

                if (isLastStage) {
                    titleHtml = `🎉 จบด่านระดับ ${LEVEL_NAMES[state.level]} !`;
                    nextBtnHtml = `
                        <button onclick="backToMenu(); document.getElementById('modal-win').classList.add('hidden')" class="paper-btn w-full text-xl" style="background: var(--pastel-mint);">
                            🏠 กลับหน้าหลัก
                        </button>
                    `;
                } else {
                    nextBtnHtml = `
                        <button onclick="nextStage()" class="paper-btn w-full text-2xl" style="background: var(--pastel-mint);">
                            ไปต่อ ด่าน ${state.stage+1} ➔
                        </button>
                    `;
                }

                document.getElementById('win-title').innerHTML = titleHtml;
                btnContainer.innerHTML = nextBtnHtml;
                document.getElementById('modal-win').classList.remove('hidden');
            } else {
                playSound('error');
                const app = document.getElementById('main-app');
                app.classList.add('wiggle');
                setTimeout(() => app.classList.remove('wiggle'), 400);
            }
        }

        // วาดตารางใหม่เสมอเมื่อมีการปรับขนาดหน้าจอ (เช่น หมุนโทรศัพท์)
        window.addEventListener('resize', renderGrid);
    </script>
</body>
</html>
