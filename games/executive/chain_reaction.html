<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chain Reaction: แก้ปมปัญหาลูกโซ่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FDFBF7;
            --color-peach: #FFCBA4;
            --color-mint: #A2E4B8;
            --color-sky: #AEC6CF;
            --color-yellow: #FDFD96;
            --color-stroke: #4A4A4A;
        }

        body {
            font-family: 'Mali', sans-serif;
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 9:18 Mobile Container */
        #app-container {
            width: 100%;
            height: 100vh;
            max-width: 420px; /* ขยายเล็กน้อยเพื่อรองรับ Card ที่ใหญ่ขึ้น */
            max-height: 840px;
            aspect-ratio: 9 / 18;
            background-color: var(--bg-cream);
            position: relative;
            overflow: hidden;
            border: 4px solid var(--color-stroke);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
        }

        /* Paper Cut Styles */
        .paper-panel {
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            border: 3px solid var(--color-stroke);
            border-radius: 1.5rem;
            box-shadow: 4px 4px 0px var(--color-stroke);
        }

        .paper-btn {
            border: 3px solid var(--color-stroke);
            border-radius: 1rem;
            box-shadow: 4px 4px 0px var(--color-stroke);
            transition: all 0.1s ease;
            font-weight: 600;
        }

        .paper-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--color-stroke);
        }

        .paper-item {
            border: 3px solid var(--color-stroke);
            border-radius: 1.25rem;
            box-shadow: 4px 4px 0px var(--color-stroke);
            transition: all 0.2s ease;
            background-color: white;
            cursor: pointer;
            position: relative;
        }

        .paper-item:active {
            transform: translate(2px, 2px) scale(0.95);
            box-shadow: 2px 2px 0px var(--color-stroke);
        }

        /* Animations */
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
            75% { transform: rotate(-5deg); }
        }
        .animate-wiggle { animation: wiggle 0.4s ease-in-out; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-in-out; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Utilities */
        .hide { display: none !important; }
        .text-stroke {
            -webkit-text-stroke: 1px var(--color-stroke);
            color: white;
            text-shadow: 2px 2px 0px var(--color-stroke);
        }
        
        .locked-overlay {
            position: absolute;
            top: -12px;
            right: -12px;
            background-color: var(--color-peach);
            border: 3px solid var(--color-stroke);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 2px 2px 0px var(--color-stroke);
            z-index: 10;
        }

        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

<div id="app-container">
    <canvas id="confetti-canvas" class="hide"></canvas>

    <!-- MAIN MENU SCREEN -->
    <div id="screen-menu" class="flex flex-col h-full w-full p-6 relative">

        </div>

            </p>
        </div>

            </button>
            <button onclick="selectDifficulty('medium')" class="paper-btn p-4 bg-[var(--color-peach)] flex flex-col items-center">

            </button>
        </div>
    </div>

    <!-- GAME PLAY SCREEN -->
    <div id="screen-game" class="hide flex flex-col h-full w-full bg-[#FDFBF7] relative">
        <!-- Header -->
        <div class="bg-white border-b-4 border-[var(--color-stroke)] p-4 flex justify-between items-center z-10 shadow-sm">

            <div class="flex flex-col items-center">

                <span class="text-lg font-bold" id="game-goal-text">เป้าหมาย...</span>
                <span class="text-sm text-gray-500" id="timer-display">⏱️ 04:00</span>
            </div>
            <div class="paper-panel bg-[var(--color-mint)] px-3 py-1 text-center min-w-[60px]">
                <div class="text-xs">คะแนน</div>
                <div class="font-bold text-lg" id="score-display">0</div>
            </div>
        </div>

        <!-- Feedback Toast -->
        <div id="feedback-toast" class="absolute top-24 left-1/2 transform -translate-x-1/2 px-4 py-2 rounded-full border-2 border-[var(--color-stroke)] font-bold text-center shadow-md transition-opacity duration-300 opacity-0 z-20 pointer-events-none whitespace-nowrap">
            Message
        </div>

        <!-- Game Area -->
        <div class="flex-1 p-4 relative overflow-y-auto" id="game-board-container">
            <div id="game-board" class="flex flex-wrap gap-5 justify-center items-center h-full content-center pb-8">
                <!-- Items will be injected here -->
            </div>
        </div>

        <!-- Inventory / Current Tool -->
        <div class="bg-white border-t-4 border-[var(--color-stroke)] p-4 flex flex-col items-center z-10 h-36">
            <span class="text-base font-bold text-gray-600 mb-2">เครื่องมือในมือคุณ:</span>
            <div id="current-tool-slot" class="w-20 h-20 rounded-2xl border-4 border-dashed border-gray-300 flex items-center justify-center text-5xl bg-gray-50 transition-all duration-300">
                🖐️
            </div>
            <span id="current-tool-name" class="text-sm mt-1 font-bold text-gray-400">มือเปล่า</span>
        </div>
    </div>

    <!-- RESULT SCREEN -->

            <p class="text-lg mb-6 text-gray-600">คุณแก้ปัญหาลูกโซ่ได้ยอดเยี่ยม</p>
            
            <div class="text-6xl font-bold text-[var(--color-stroke)] mb-2" id="final-score">100</div>
            <p class="text-sm font-bold mb-8">คะแนนรวมของคุณ</p>

            <button onclick="returnToMenu()" class="paper-btn p-4 w-full bg-[var(--color-yellow)] text-xl">
                เล่นอีกครั้ง
            </button>
        </div>
    </div>

</div>

            { goal: "ปรุงยาวิเศษ", items: [ { id: 'recipe', icon: '📜', name: 'ตำราเวท', state: 'free', requiredTool: '', color: 'var(--color-peach)' }, { id: 'pot', icon: '🍲', name: 'หม้อต้ม', state: 'locked', lockIcon: 'วิธี', lockName: 'ดูตำราก่อน', requiredTool: 'recipe', color: 'var(--color-sky)' }, { id: 'herb', icon: '🌿', name: 'สมุนไพร', state: 'locked', lockIcon: 'หม้อ', lockName: 'ใส่ลงไป', requiredTool: 'pot', color: 'var(--color-mint)' }, { id: 'potion', icon: '🧪', name: 'น้ำยา', state: 'locked', lockIcon: 'เคี่ยว', lockName: 'คนให้เข้ากัน', requiredTool: 'herb', color: 'var(--color-yellow)' }, { id: 'witch', icon: '🧙‍♀️', name: 'แม่มด', state: 'locked', lockIcon: 'รอ', lockName: 'รอดื่ม', requiredTool: 'potion', isFinal: true, color: '#AEC6CF' }, { id: 'decoy1', icon: '🥄', name: 'ช้อนคน', state: 'free', isDecoy: true, color: '#e5e5e5' }, { id: 'decoy2', icon: '🍵', name: 'ถ้วยชา', state: 'free', isDecoy: true, color: '#FFB6C1' }, { id: 'decoy3', icon: '🍽️', name: 'จาน', state: 'free', isDecoy: true, color: '#e5e5e5' } ] }
        ]
    };

    /* --- Game State --- */
    let currentDifficulty = '';
    let currentLevelSequence = [];
    let currentRoundIndex = 0;
    const TOTAL_ROUNDS = 5;
    let isTransitioning = false;
    let currentLevel = null;
    let score = 0;
    let timeLeft = 240; // 4 minutes
    let timerInterval = null;
    let currentTool = { id: 'hand', icon: '🖐️', name: 'มือเปล่า' };

    /* --- Audio System (Web Audio API) --- */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration, vol) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    }

    function playSuccessChime() {
        playTone(523.25, 'sine', 0.1, 0.3); // C5
        setTimeout(() => playTone(659.25, 'sine', 0.2, 0.3), 100); // E5
        setTimeout(() => playTone(783.99, 'sine', 0.4, 0.3), 200); // G5
    }

    function playErrorBoop() {
        playTone(150, 'triangle', 0.3, 0.4);
    }

    function playWinFanfare() {
        playTone(523.25, 'square', 0.2, 0.2);
        setTimeout(() => playTone(659.25, 'square', 0.2, 0.2), 200);
        setTimeout(() => playTone(783.99, 'square', 0.2, 0.2), 400);
        setTimeout(() => playTone(1046.50, 'square', 0.6, 0.2), 600);
    }

    /* --- UI Functions --- */
    const screens = {
        menu: document.getElementById('screen-menu'),
        game: document.getElementById('screen-game'),
        result: document.getElementById('screen-result')
    };

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.add('hide'));
        screens[screenName].classList.remove('hide');
    }

    function updateScoreDisplay() {
        document.getElementById('score-display').innerText = score;
        const el = document.getElementById('score-display').parentElement;
        el.classList.remove('animate-pop');
        void el.offsetWidth; // trigger reflow
        el.classList.add('animate-pop');
    }

    function showFeedback(text, isPositive) {
        const toast = document.getElementById('feedback-toast');
        toast.innerText = text;
        toast.className = `absolute top-24 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full border-3 font-bold text-center shadow-lg transition-all duration-300 z-50 whitespace-nowrap text-sm ${isPositive ? 'bg-[var(--color-mint)] border-[var(--color-stroke)] text-gray-800' : 'bg-[#FFB6C1] border-[var(--color-stroke)] text-gray-800'}`;
        
        toast.style.opacity = '1';
        toast.style.transform = 'translate(-50%, 0)';
        
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, -10px)';
        }, 1500);
    }

    function updateToolUI(icon, name) {
        const slot = document.getElementById('current-tool-slot');
        const nameEl = document.getElementById('current-tool-name');
        
        slot.innerHTML = icon;
        nameEl.innerText = name;
        slot.classList.remove('border-dashed', 'border-gray-300', 'bg-gray-50');
        slot.classList.add('border-solid', 'border-[var(--color-stroke)]', 'bg-[var(--color-yellow)]', 'animate-pop');
        
        setTimeout(() => {
            slot.classList.remove('animate-pop');
        }, 300);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    /* --- Game Logic --- */
    function selectDifficulty(diff) {
        currentDifficulty = diff;
        startGame();
    }

    function startGame() {
        // Reset State
        score = 0;
        timeLeft = 240;
        currentRoundIndex = 0;
        isTransitioning = false;
        
        // Randomly pick 5 unique levels for the selected difficulty
        const diffLevels = levelsData[currentDifficulty];
        const shuffledLevels = [...diffLevels].sort(() => Math.random() - 0.5);
        currentLevelSequence = shuffledLevels.slice(0, TOTAL_ROUNDS);

        // Update UI
        document.getElementById('timer-display').innerText = `⏱️ ${formatTime(timeLeft)}`;
        updateScoreDisplay();
        
        loadSubLevel();
        
        // Timer
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(isTransitioning) return; // หยุดเวลาชั่วคราวตอนสลับด่าน
            timeLeft--;
            document.getElementById('timer-display').innerText = `⏱️ ${formatTime(timeLeft)}`;
            if (timeLeft <= 0) {
                endGame(false);
            }
        }, 1000);

        showScreen('game');
    }

    function loadSubLevel() {
        isTransitioning = false;
        currentTool = { id: 'hand', icon: '🖐️', name: 'มือเปล่า' };
        
        // Deep copy the current sub-level
        currentLevel = JSON.parse(JSON.stringify(currentLevelSequence[currentRoundIndex]));
        
        // Shuffle items
        currentLevel.items.sort(() => Math.random() - 0.5);

        // Update UI
        document.getElementById('round-display').innerText = `ด่าน ${currentRoundIndex + 1}/${TOTAL_ROUNDS}`;
        document.getElementById('game-goal-text').innerText = `เป้าหมาย: ${currentLevel.goal}`;
        
        // Reset Tool UI
        const slot = document.getElementById('current-tool-slot');
        slot.innerHTML = '🖐️';
        document.getElementById('current-tool-name').innerText = 'มือเปล่า';
        slot.className = 'w-20 h-20 rounded-2xl border-4 border-dashed border-gray-300 flex items-center justify-center text-5xl bg-gray-50 transition-all duration-300';

        renderBoard();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        
        currentLevel.items.forEach((item, index) => {
            const el = document.createElement('div');
            // Add float animation with varied delays, adjusted size for bigger UI
            el.className = `paper-item flex flex-col items-center justify-center w-[110px] h-[130px] p-2 animate-float shrink-0`;
            el.style.backgroundColor = item.color;
            el.style.animationDelay = `${index * 0.2}s`;
            el.id = `item-${item.id}`;
            
            let innerHTML = `<span class="text-6xl mb-2 select-none pointer-events-none drop-shadow-sm">${item.icon}</span>
                             <span class="text-[15px] font-bold text-gray-800 text-center leading-tight pointer-events-none">${item.name}</span>`;
            
            if (item.state === 'locked') {
                innerHTML += `<div class="locked-overlay pointer-events-none" id="lock-${item.id}">
                                <span>${item.lockIcon}</span>
                              </div>`;
                el.style.filter = "brightness(0.9)";
            }

            el.innerHTML = innerHTML;
            el.onclick = () => handleItemClick(item, el);
            board.appendChild(el);
        });
    }

    function handleItemClick(item, element) {
        // If already used or transitioning, ignore
        if (item.state === 'used' || isTransitioning) return;

        // Check if item is a decoy
        if (item.isDecoy) {
            playErrorBoop();
            element.classList.remove('animate-wiggle');
            void element.offsetWidth;
            element.classList.add('animate-wiggle');
            score -= 5;
            updateScoreDisplay();
            showFeedback("-5 ไม่ใช่ของที่ต้องการนะ", false);
            return;
        }

        // Check if item can be interacted with
        if (item.state === 'free' || item.requiredTool === currentTool.id) {
            // Success Interaction
            playSuccessChime();
            score += 20;
            updateScoreDisplay();
            
            // Visual feedback
            element.classList.remove('animate-pop');
            void element.offsetWidth;
            element.classList.add('animate-pop');

            // If it was locked, unlock it visually
            if (item.state === 'locked') {
                const lockEl = document.getElementById(`lock-${item.id}`);
                if(lockEl) lockEl.classList.add('hide');
                element.style.filter = "brightness(1)";
                showFeedback(`+20 ใช้ ${currentTool.name} สำเร็จ!`, true);
            } else {
                 showFeedback(`+20 หยิบ ${item.name} แล้ว`, true);
            }

            // Update state
            item.state = 'used';
            element.style.opacity = '0.5';
            element.style.cursor = 'default';

            // Set as current tool if it unlocks something else or is final
            currentTool = { id: item.id, icon: item.icon, name: item.name };
            updateToolUI(item.icon, item.name);

            // Check win condition
            if (item.isFinal) {
                isTransitioning = true; // ล็อคการกดปุ่มชั่วคราว
                if (currentRoundIndex < TOTAL_ROUNDS - 1) {
                    showFeedback(`🎉 สำเร็จ! เตรียมไปด่านที่ ${currentRoundIndex + 2}...`, true);
                    currentRoundIndex++;
                    // หน่วงเวลา 1.5 วินาทีแล้วโหลดด่านถัดไป
                    setTimeout(() => loadSubLevel(), 1500);
                } else {
                    // จบ 5 ด่าน
                    setTimeout(() => endGame(true), 500);
                }
            }

        } else {
            // Failed Interaction (Wrong tool)
            playErrorBoop();
            element.classList.remove('animate-wiggle');
            void element.offsetWidth;
            element.classList.add('animate-wiggle');
            
            score -= 5;
            updateScoreDisplay();
            
            let msg = "-5 ใช้เครื่องมือไม่ถูกนะ";
            if(item.state === 'locked') {
                msg = `-5 ติด ${item.lockName}`;
            }
            showFeedback(msg, false);
        }
    }

    function endGame(isWin) {
        clearInterval(timerInterval);
        
        if (isWin) {
            playWinFanfare();
            triggerConfetti();
            document.getElementById('final-score').innerText = score;
            showScreen('result');
        } else {
            alert("หมดเวลา! ลองใหม่อีกครั้งนะ");
            returnToMenu();
        }
    }

    function returnToMenu() {
        clearInterval(timerInterval);
        showScreen('menu');
        const canvas = document.getElementById('confetti-canvas');
        canvas.classList.add('hide');
    }

    /* --- Simple Confetti System --- */
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        canvas.classList.remove('hide');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#FFCBA4', '#A2E4B8', '#AEC6CF', '#FDFD96'];

        for (let i = 0; i < 100; i++) {
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2 + 100,
                r: Math.random() * 6 + 4,
                dx: Math.random() * 10 - 5,
                dy: Math.random() * -15 - 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.floor(Math.random() * 10) - 10,
                tiltAngleIncrement: (Math.random() * 0.07) + 0.05,
                tiltAngle: 0
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.tiltAngle += p.tiltAngleIncrement;
                p.y += (Math.cos(p.tiltAngle) + p.dy + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2 + p.dx;
                p.dy += 0.2; // gravity

                if (p.y <= canvas.height) active = true;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();
            });

            if (active) {
                requestAnimationFrame(draw);
            }
        }
        draw();
    }

</script>
