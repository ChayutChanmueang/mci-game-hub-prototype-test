<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diet Chef - เมนูสั่งทำพิเศษ</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* High Saturation Pastel Palette */
            --bg-cream: #FFFDF7;
            --peach: #FFB5A7;
            --mint: #A3E4D7;
            --sky: #AED6F1;
            --yellow: #F9E79F;
            --text-dark: #4A4A4A;
            --stroke: #5D4037;
            --red-warn: #FF6B6B;
            --green-success: #58D68D;
            
            /* Game Dimensions */
            --app-max-width: 400px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Mali', sans-serif;
            background-color: #E5E7E9;
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            line-height: 1.5;
        }

        /* 9:18 Aspect Ratio Container */
        #app {
            width: 100%;
            height: 100%;
            max-width: var(--app-max-width);
            background: linear-gradient(180deg, var(--bg-cream) 0%, #FFF5E6 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        @media (min-aspect-ratio: 9/18) {
            #app {
                height: 100vh;
                max-height: 800px;
                aspect-ratio: 9/18;
                border: 4px solid var(--stroke);
                border-radius: 30px;
            }
        }

        /* UI Elements - Paper Cut Style */
        .panel {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 20px;
            box-shadow: 0 6px 0 var(--stroke);
            padding: 20px;
            margin: 15px;
            text-align: center;
        }

        .btn {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 25px;
            box-shadow: 0 6px 0 var(--stroke);
            padding: 12px 20px;
            font-family: inherit;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: block;
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--stroke);
        }

        .btn.bg-peach { background-color: var(--peach); }
        .btn.bg-mint { background-color: var(--mint); }
        .btn.bg-sky { background-color: var(--sky); }
        .btn.bg-yellow { background-color: var(--yellow); }

        .desc-text {
            font-size: 0.9rem;
            opacity: 0.8;
            display: block;
            margin-top: 4px;
            font-weight: 400;
        }

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: opacity 0.3s ease;
            background: linear-gradient(180deg, var(--bg-cream) 0%, #FFF5E6 100%);
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* Menu Screen */
        #menu-screen {
            padding: 20px;
            justify-content: center;
        }
        
        .game-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--peach);
            text-shadow: 2px 2px 0 var(--stroke), -2px -2px 0 var(--stroke), 2px -2px 0 var(--stroke), -2px 2px 0 var(--stroke), 0 4px 0 var(--stroke);
            margin-bottom: 5px;
            line-height: 1.1;
        }

        /* Game Screen */
        #game-screen {
            background: linear-gradient(180deg, var(--sky) 0%, var(--bg-cream) 40%, var(--bg-cream) 100%);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border-bottom: 3px solid var(--stroke);
            z-index: 20;
            border-radius: 0 0 20px 20px;
        }

        .status-badge {
            background: var(--yellow);
            border: 2px solid var(--stroke);
            border-radius: 15px;
            padding: 5px 15px;
            font-weight: 600;
            box-shadow: 0 3px 0 var(--stroke);
            font-size: 1.1rem;
        }

        .btn-back {
            background: var(--peach);
            border: 2px solid var(--stroke);
            border-radius: 15px;
            padding: 5px 10px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 3px 0 var(--stroke);
        }

        .btn-back:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 var(--stroke);
        }

        /* Play Area */
        .play-area {
            flex: 1;
            position: relative;
            touch-action: none; /* Prevent scrolling while dragging */
        }

        /* Customers */
        .customers-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            margin-top: 10px;
        }

        .customer {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 20px;
            box-shadow: 0 6px 0 var(--stroke);
            width: 140px;
            padding: 10px;
            text-align: center;
            position: relative;
            transition: transform 0.2s;
        }

        .customer.satisfied {
            background: var(--mint);
            transform: scale(1.05);
        }

        .c-icon {
            font-size: 3rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .c-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .c-condition {
            font-size: 0.85rem;
            background: var(--peach);
            border-radius: 10px;
            padding: 2px 5px;
            border: 1px solid var(--stroke);
            display: inline-block;
        }

        .plate-zone {
            width: 80px;
            height: 40px;
            background: rgba(0,0,0,0.05);
            border: 2px dashed var(--stroke);
            border-radius: 50%;
            margin: 10px auto 0;
            position: relative;
        }

        .warning-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--red-warn);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--stroke);
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .warning-icon.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Foods */
        .foods-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 0 20px;
        }

        .food-item {
            background: white;
            border: 3px solid var(--stroke);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            box-shadow: 0 6px 0 var(--stroke);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: grab;
            position: relative;
            z-index: 30;
            touch-action: none;
        }

        .food-item.dragging {
            cursor: grabbing;
            z-index: 100;
            box-shadow: 0 15px 20px rgba(0,0,0,0.2), 0 10px 0 var(--stroke);
            transform: scale(1.1);
            transition: none; /* remove transition while dragging for responsiveness */
        }

        .food-item.served {
            pointer-events: none;
            box-shadow: 0 2px 0 var(--stroke);
        }

        .food-name-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.8rem;
            background: white;
            border: 2px solid var(--stroke);
            border-radius: 10px;
            padding: 2px 8px;
            white-space: nowrap;
            pointer-events: none;
        }

        /* Animations */
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .wiggle {
            animation: wiggle 0.3s ease-in-out;
        }

        /* Floating Score */
        .float-score {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 200;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 1px 1px 0 var(--stroke), -1px -1px 0 var(--stroke), 1px -1px 0 var(--stroke), -1px 1px 0 var(--stroke);
        }

        .float-score.pos { color: var(--green-success); }
        .float-score.neg { color: var(--red-warn); }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        /* End Screen */
        #end-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(180deg, var(--mint) 0%, var(--bg-cream) 100%);
        }

        .final-score {
            font-size: 4rem;
            color: var(--peach);
            font-weight: 700;
            text-shadow: 2px 2px 0 var(--stroke);
            margin: 10px 0;
        }
        
        .toggle-sound {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: 2px solid var(--stroke);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--stroke);
            z-index: 50;
        }
        .toggle-sound:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--stroke);
        }

    </style>
</head>
<body>

    <div id="app">
        <!-- Audio Toggle -->
        <div class="toggle-sound" id="btn-sound" onclick="toggleSound()">🔊</div>

        <!-- Menu Screen -->
        <div id="menu-screen" class="screen">
            <div class="panel" style="background-color: var(--bg-cream);">
                <div class="game-title">Diet Chef</div>
                <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 10px;">เมนูสั่งทำพิเศษ</div>
                <p style="font-size: 0.95rem; margin-bottom: 20px;">
                    ลากอาหารไปเสิร์ฟให้ตรงกับเงื่อนไขการกินของลูกค้าทุกคน!<br>
                    <span style="color: var(--red-warn); font-size: 0.8rem;">(ระวัง! เสิร์ฟผิดโดนหักคะแนน)</span>
                </p>
                
                <div style="text-align: left; margin-bottom: 10px; font-weight: bold; padding-left: 10px;">เลือกระดับความยาก:</div>
                
                <button class="btn bg-mint" onclick="startGame('easy')">
                    ระดับง่าย
                    <span class="desc-text">ลูกค้า 2 คน, เงื่อนไขตรงไปตรงมา</span>
                </button>
                <button class="btn bg-sky" onclick="startGame('medium')">
                    ระดับปานกลาง
                    <span class="desc-text">ลูกค้า 3 คน, อาหารเริ่มมีความซับซ้อน</span>
                </button>
                <button class="btn bg-peach" onclick="startGame('hard')">
                    ระดับยาก
                    <span class="desc-text">ลูกค้า 4 คน, เงื่อนไขซ้อนทับกัน</span>
                </button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div class="top-bar">
                <button class="btn-back" onclick="backToMenu()">◀ ออก</button>
                <div class="status-badge" id="score-display">คะแนน: 0</div>
                <div class="status-badge" style="background: var(--mint);" id="time-display">04:00</div>
            </div>
            
            <div class="play-area" id="play-area">
                <div class="customers-container" id="customers-container">
                    <!-- Customers generated here -->
                </div>
                
                <div class="foods-container" id="foods-container">
                    <!-- Foods generated here -->
                </div>
            </div>
            
            <canvas id="confetti-canvas"></canvas>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="screen hidden">
            <div class="panel">
                <h2 style="font-size: 2rem; margin: 0;">หมดเวลา!</h2>
                <div class="final-score" id="final-score-display">120</div>
                <p style="font-size: 1.2rem; margin-bottom: 20px;">คุณคือสุดยอดเชฟ!</p>
                <button class="btn bg-yellow" onclick="backToMenu()">กลับหน้าหลัก</button>
            </div>
        </div>

    </div>

    <script>
        // --- GAME DATA & CONFIG ---
        
        // Tags: 'meat', 'seafood', 'spicy', 'sweet'
        // 'vegetarian' translates to avoiding ['meat', 'seafood']
        
        const DB_FOODS = {
            f_tofu: { id: 'f_tofu', name: 'ต้มจืดเต้าหู้', icon: '🍲', tags: [] },
            f_shrimp: { id: 'f_shrimp', name: 'กุ้งเผา', icon: '🦐', tags: ['seafood'] },
            f_kaprao: { id: 'f_kaprao', name: 'กะเพราหมู', icon: '🍛', tags: ['meat', 'spicy'] },
            f_salad: { id: 'f_salad', name: 'สลัดผัก', icon: '🥗', tags: [] },
            f_padthai: { id: 'f_padthai', name: 'ผัดไทยกุ้ง', icon: '🍜', tags: ['seafood', 'sweet'] },
            f_friedpork: { id: 'f_friedpork', name: 'หมูทอด', icon: '🍖', tags: ['meat'] },
            f_bualoy: { id: 'f_bualoy', name: 'บัวลอย', icon: '🍧', tags: ['sweet'] },
            f_tomyum: { id: 'f_tomyum', name: 'ต้มยำกุ้ง', icon: '🥣', tags: ['seafood', 'spicy'] },
            f_yum: { id: 'f_yum', name: 'ยำวุ้นเส้น', icon: '🥗', tags: ['spicy'] },
            f_sweetpork: { id: 'f_sweetpork', name: 'หมูหวาน', icon: '🍲', tags: ['meat', 'sweet'] }
        };

        const DB_CUSTOMERS = {
            c_A: { id: 'c_A', name: 'ลุง A', icon: '👨‍🦳', condText: 'ไม่กินเผ็ด', avoids: ['spicy'] },
            c_B: { id: 'c_B', name: 'ป้า B', icon: '👵', condText: 'มังสวิรัติ', avoids: ['meat', 'seafood'] },
            c_C: { id: 'c_C', name: 'พี่ C', icon: '👱‍♂️', condText: 'แพ้กุ้ง/ทะเล', avoids: ['seafood'] },
            c_D: { id: 'c_D', name: 'น้อง D', icon: '👩‍🦰', condText: 'ไม่ชอบหวาน', avoids: ['sweet'] },
            c_E: { id: 'c_E', name: 'ยาย E', icon: '🧓', condText: 'ไม่เนื้อ, ไม่หวาน', avoids: ['meat', 'sweet'] },
            c_F: { id: 'c_F', name: 'หมอ F', icon: '👨‍⚕️', condText: 'ไม่เผ็ด, ไม่ทะเล', avoids: ['spicy', 'seafood'] },
            c_G: { id: 'c_G', name: 'เจ๊ G', icon: '👩‍🍳', condText: 'ไม่เผ็ด, ไม่หวาน', avoids: ['spicy', 'sweet'] }
        };

        // Pre-designed rounds to ensure there is a perfect match logic
        const LEVELS = {
            easy: [
                { customers: ['c_A', 'c_B'], foods: ['f_friedpork', 'f_salad'] }, // A(!spicy)->Pork, B(veg)->Salad
                { customers: ['c_C', 'c_D'], foods: ['f_bualoy', 'f_shrimp'] },   // C(!seafood)->Bualoy, D(!sweet)->Shrimp
                { customers: ['c_A', 'c_C'], foods: ['f_shrimp', 'f_kaprao'] }    // A(!spicy)->Shrimp, C(!seafood)->Kaprao
            ],
            medium: [
                { customers: ['c_A', 'c_B', 'c_C'], foods: ['f_padthai', 'f_tofu', 'f_kaprao'] }, 
                // A(!spicy)->Padthai, B(veg)->Tofu, C(!seafood)->Kaprao
                { customers: ['c_D', 'c_B', 'c_A'], foods: ['f_yum', 'f_bualoy', 'f_friedpork'] },
                // D(!sweet)->Yum, B(veg)->Bualoy, A(!spicy)->Pork
                { customers: ['c_F', 'c_A', 'c_B'], foods: ['f_friedpork', 'f_yum', 'f_tofu'] }
                // F(!spicy,!seafood)->Pork, A(!spicy)->Yum, B(veg)->Tofu
            ],
            hard: [
                { customers: ['c_E', 'c_C', 'c_A', 'c_B'], foods: ['f_yum', 'f_sweetpork', 'f_padthai', 'f_tofu'] },
                // E(!meat,!sweet)->Yum, C(!seafood)->Sweetpork, A(!spicy)->Padthai, B(veg)->Tofu
                { customers: ['c_F', 'c_B', 'c_D', 'c_B'], foods: ['f_friedpork', 'f_padthai', 'f_kaprao', 'f_salad'] }
                // F(!spicy,!seafood)->Pork, B(wait, 2 B's, let's change to C_G)
            ]
        };
        // Fix Hard Level 2 Duplicate
        LEVELS.hard[1] = { customers: ['c_F', 'c_E', 'c_D', 'c_B'], foods: ['f_friedpork', 'f_padthai', 'f_kaprao', 'f_salad'] };
        // Let's re-verify hard 2: 
        // F(!spicy,!seafood) -> Pork(meat)
        // E(!meat,!sweet) -> Salad(safe)
        // D(!sweet) -> Kaprao(meat,spicy)
        // B(veg = !meat,!seafood) -> Wait, B can't eat Padthai(seafood,sweet). E can't eat Padthai(sweet). F can't eat Padthai(seafood). D can't eat Padthai(sweet). 
        // Padthai is invalid for everyone! Let's fix Hard 2 foods.
        LEVELS.hard[1] = { customers: ['c_F', 'c_E', 'c_D', 'c_B'], foods: ['f_friedpork', 'f_salad', 'f_kaprao', 'f_bualoy'] };
        // F(!spicy,!seafood) -> Pork. E(!meat,!sweet) -> Salad. D(!sweet) -> Kaprao. B(veg) -> Bualoy(sweet). Perfect!

        // --- GAME STATE ---
        let state = {
            score: 0,
            timeLeft: 240, // 4 minutes
            timerInterval: null,
            difficulty: 'easy',
            currentRoundIdx: 0,
            servedCount: 0,
            totalCustomers: 0,
            soundEnabled: true
        };

        // --- AUDIO SYSTEM (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!state.soundEnabled) return;
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'success') {
                // Soft chime
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'error') {
                // Soft thud
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'complete') {
                // Happy chord arpeggio
                const freqs = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                freqs.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.1 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                    osc.start(audioCtx.currentTime + i * 0.1);
                    osc.stop(audioCtx.currentTime + i * 0.1 + 0.5);
                });
            }
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            document.getElementById('btn-sound').textContent = state.soundEnabled ? '🔊' : '🔇';
            if (state.soundEnabled) initAudio();
        }

        // --- CORE LOGIC ---

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function startGame(difficulty) {
            initAudio(); // Initialize audio context on first interaction
            state.difficulty = difficulty;
            state.score = 0;
            state.timeLeft = 240;
            state.currentRoundIdx = 0;
            
            updateTopBar();
            showScreen('game-screen');
            
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                updateTopBar();
                if (state.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            loadRound();
        }

        function updateTopBar() {
            document.getElementById('score-display').textContent = `คะแนน: ${state.score}`;
            document.getElementById('time-display').textContent = formatTime(state.timeLeft);
        }

        function backToMenu() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            showScreen('menu-screen');
        }

        function endGame() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            document.getElementById('final-score-display').textContent = state.score;
            showScreen('end-screen');
            playSound('complete');
            createConfetti(100);
        }

        function loadRound() {
            const levelsArr = LEVELS[state.difficulty];
            // Loop rounds if we run out
            const roundData = levelsArr[state.currentRoundIdx % levelsArr.length];
            
            state.servedCount = 0;
            state.totalCustomers = roundData.customers.length;

            renderCustomers(roundData.customers);
            renderFoods(roundData.foods);
        }

        function renderCustomers(customerIds) {
            const container = document.getElementById('customers-container');
            container.innerHTML = '';
            
            // Adjust size based on count
            let custWidth = '140px';
            if (customerIds.length >= 4) custWidth = '45%';
            else if (customerIds.length === 3) custWidth = '30%';

            customerIds.forEach(id => {
                const c = DB_CUSTOMERS[id];
                const div = document.createElement('div');
                div.className = 'customer';
                div.id = `cust-${id}`;
                div.style.width = custWidth;
                div.dataset.id = id;
                
                div.innerHTML = `
                    <div class="warning-icon" id="warn-${id}">!</div>
                    <div class="c-icon">${c.icon}</div>
                    <div class="c-name">${c.name}</div>
                    <div class="c-condition">${c.condText}</div>
                    <div class="plate-zone" id="plate-${id}"></div>
                `;
                container.appendChild(div);
            });
        }

        function renderFoods(foodIds) {
            const container = document.getElementById('foods-container');
            container.innerHTML = '';
            
            // Shuffle foods visually
            const shuffledIds = [...foodIds].sort(() => Math.random() - 0.5);

            shuffledIds.forEach((id, index) => {
                const f = DB_FOODS[id];
                const div = document.createElement('div');
                div.className = 'food-item';
                div.id = `food-${index}`;
                div.dataset.id = id;
                div.innerHTML = `
                    ${f.icon}
                    <div class="food-name-label">${f.name}</div>
                `;
                container.appendChild(div);
                
                // Add Drag Events
                setupDragAndDrop(div);
            });
        }

        // --- DRAG AND DROP LOGIC (Pointer Events for Mobile & Desktop) ---
        
        function setupDragAndDrop(el) {
            let startX = 0, startY = 0, currentX = 0, currentY = 0;
            let initialRect = null;
            let isDragging = false;

            el.addEventListener('pointerdown', (e) => {
                if (el.classList.contains('served')) return;
                isDragging = true;
                el.classList.add('dragging');
                
                // Keep track of where we started
                initialRect = el.getBoundingClientRect();
                
                startX = e.clientX;
                startY = e.clientY;
                currentX = 0;
                currentY = 0;

                // Capture pointer to track outside element
                el.setPointerCapture(e.pointerId);
            });

            el.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                currentX = dx;
                currentY = dy;
                
                el.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
            });

            el.addEventListener('pointerup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                el.classList.remove('dragging');
                el.releasePointerCapture(e.pointerId);

                // Check Drop Target
                const targetCustomer = checkCollision(el);
                
                if (targetCustomer) {
                    evaluateDrop(el, targetCustomer);
                } else {
                    // Snap back
                    el.style.transform = `translate(0px, 0px) scale(1)`;
                }
            });
        }

        function checkCollision(foodEl) {
            const foodRect = foodEl.getBoundingClientRect();
            const customers = document.querySelectorAll('.customer');
            
            // Calculate center of dragged food
            const fCx = foodRect.left + foodRect.width / 2;
            const fCy = foodRect.top + foodRect.height / 2;

            for (let c of customers) {
                const cRect = c.getBoundingClientRect();
                // Check if food center is inside customer rect
                if (fCx > cRect.left && fCx < cRect.right && 
                    fCy > cRect.top && fCy < cRect.bottom) {
                    return c;
                }
            }
            return null;
        }

        function evaluateDrop(foodEl, customerEl) {
            const foodId = foodEl.dataset.id;
            const custId = customerEl.dataset.id;
            
            const food = DB_FOODS[foodId];
            const cust = DB_CUSTOMERS[custId];

            // Check constraint
            const conflictTag = food.tags.find(tag => cust.avoids.includes(tag));

            if (conflictTag) {
                // FAIL
                playSound('error');
                
                // Show warning
                const warnIcon = customerEl.querySelector('.warning-icon');
                warnIcon.classList.add('show');
                setTimeout(() => warnIcon.classList.remove('show'), 1500);

                // Wiggle and snap back
                foodEl.classList.add('wiggle');
                foodEl.style.transform = `translate(0px, 0px) scale(1)`;
                setTimeout(() => foodEl.classList.remove('wiggle'), 300);

                updateScore(-5, foodEl);

            } else {
                // SUCCESS
                playSound('success');
                
                foodEl.classList.add('served');
                customerEl.classList.add('satisfied');
                
                // Move food visually to plate
                const plate = customerEl.querySelector('.plate-zone');
                const plateRect = plate.getBoundingClientRect();
                const parentRect = foodEl.parentElement.getBoundingClientRect();
                
                // Calculate position relative to container
                const targetX = plateRect.left - parentRect.left + (plateRect.width/2) - (foodEl.offsetWidth/2);
                const targetY = plateRect.top - parentRect.top + (plateRect.height/2) - (foodEl.offsetHeight/2) - (foodEl.offsetTop);
                
                foodEl.style.transition = 'transform 0.2s ease-out';
                foodEl.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.8)`;
                
                // Hide food label
                foodEl.querySelector('.food-name-label').style.display = 'none';

                state.servedCount++;
                
                if (state.servedCount === state.totalCustomers) {
                    // Round Complete
                    updateScore(20, customerEl); // Show score at the last customer
                    playSound('complete');
                    createConfetti(30);
                    
                    setTimeout(() => {
                        state.currentRoundIdx++;
                        loadRound();
                    }, 1500);
                }
            }
        }

        function updateScore(points, element) {
            state.score += points;
            updateTopBar();
            
            // Show floating text
            const rect = element.getBoundingClientRect();
            const floatEl = document.createElement('div');
            floatEl.className = `float-score ${points > 0 ? 'pos' : 'neg'}`;
            floatEl.textContent = points > 0 ? `+${points}` : points;
            
            floatEl.style.left = `${rect.left + rect.width/2 - 20}px`;
            floatEl.style.top = `${rect.top}px`;
            
            document.body.appendChild(floatEl);
            
            setTimeout(() => {
                document.body.removeChild(floatEl);
            }, 1000);
        }

        // --- CONFETTI SYSTEM ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createConfetti(count) {
            const colors = ['#FFB5A7', '#A3E4D7', '#AED6F1', '#F9E79F', '#58D68D'];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    r: Math.random() * 6 + 4,
                    dx: Math.random() * 10 - 5,
                    dy: Math.random() * -10 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.floor(Math.random() * 10) - 10,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05,
                    tiltAngle: 0
                });
            }
            if (!animationId) animateConfetti();
        }

        function animateConfetti() {
            requestAnimationFrame(animateConfetti);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, index) => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2;
                p.dy += 0.1; // gravity
                p.x += p.dx;
                p.y += p.dy;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();

                if (p.y > canvas.height) {
                    particles.splice(index, 1);
                }
            });

            if (particles.length === 0) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

    </script>
