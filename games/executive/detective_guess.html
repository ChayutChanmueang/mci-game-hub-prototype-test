<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detective Guess - นักสืบหาคนร้าย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cream: #FDFBF7;
            --color-peach: #FFB5A7;
            --color-mint: #A8E6CF;
            --color-sky: #A1C9F1;
            --color-yellow: #FFD3B6;
            --color-text: #4A4A4A;
            --stroke-color: #8C7A6B;
        }

        body {
            font-family: 'Mali', cursive;
            background-color: #e5e5e5; /* พื้นหลังข้างนอกมือถือ */
            color: var(--color-text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Mobile Container (9:18 Aspect Ratio) */
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 400px; /* จำกัดความกว้างให้เหมือนมือถือ */
            max-height: 800px;
            background-color: var(--bg-cream);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        /* Paper Cut Style UI */
        .paper-panel {
            background: white;
            border-radius: 24px;
            border: 3px solid var(--stroke-color);
            box-shadow: 4px 6px 0px var(--stroke-color);
            padding: 1.5rem;
            transition: transform 0.1s;
        }

        .paper-btn {
            background: white;
            border-radius: 16px;
            border: 3px solid var(--stroke-color);
            box-shadow: 3px 5px 0px var(--stroke-color);
            padding: 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .paper-btn:active {
            transform: translate(3px, 5px);
            box-shadow: 0px 0px 0px var(--stroke-color);
        }

        .btn-peach { background-color: var(--color-peach); }
        .btn-mint { background-color: var(--color-mint); }
        .btn-sky { background-color: var(--color-sky); }
        .btn-yellow { background-color: var(--color-yellow); }

        /* Suspect Character Style */
        .suspect-card {
            background: white;
            border-radius: 16px;
            border: 3px solid var(--stroke-color);
            box-shadow: 2px 4px 0px var(--stroke-color);
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .suspect-card.eliminated {
            opacity: 0.4;
            filter: grayscale(100%);
            pointer-events: none;
            box-shadow: 0px 0px 0px var(--stroke-color);
            transform: translate(2px, 4px);
        }

        /* Animations */
        @keyframes wiggle {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-3deg); }
            50% { transform: translateX(5px) rotate(3deg); }
            75% { transform: translateX(-5px) rotate(-3deg); }
            100% { transform: translateX(0); }
        }
        .animate-wiggle {
            animation: wiggle 0.4s ease-in-out;
        }

        /* Toast Message */
        #toast {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-text);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 50;
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: fall linear forwards;
            z-index: 40;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        .screen.active {
            display: flex;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- Screen 1: Main Menu -->
    <div id="menu-screen" class="screen active justify-center relative bg-[#FDFBF7]">
        <!-- Decorative SVG BG -->
        <svg class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
            <circle cx="20" cy="20" r="30" fill="var(--color-mint)" />
            <circle cx="90" cy="80" r="40" fill="var(--color-peach)" />
            <circle cx="80" cy="10" r="20" fill="var(--color-yellow)" />
        </svg>

        <div class="paper-panel btn-yellow text-center mb-8 relative z-10">
            <h1 class="text-4xl font-bold mb-2">Detective<br>Guess</h1>
            <h2 class="text-xl">นักสืบหาคนร้าย</h2>
            <p class="text-sm mt-4 leading-relaxed">
                ใช้ตรรกะตัดตัวเลือกที่ไม่ใช่ออก<br>
                แตะคนที่ <b>"ไม่ตรง"</b> กับคำใบ้<br>เพื่อคัดออกจนเหลือคนร้ายตัวจริง!
            </p>
        </div>

        <div class="space-y-4 relative z-10">
            <div class="text-center font-bold text-lg mb-2">เลือกระดับความยาก:</div>
            
            <button class="paper-btn btn-mint w-full" onclick="startGame('easy')">
                <span class="text-2xl">Easy</span>
                <span class="text-sm font-normal mt-1">6 คน | คำใบ้ตรงไปตรงมา</span>
            </button>
            
            <button class="paper-btn btn-sky w-full" onclick="startGame('medium')">
                <span class="text-2xl">Medium</span>
                <span class="text-sm font-normal mt-1">8 คน | คำใบ้เชื่อม (และ/หรือ)</span>
            </button>
            
            <button class="paper-btn btn-peach w-full" onclick="startGame('hard')">
                <span class="text-2xl">Hard</span>
                <span class="text-sm font-normal mt-1">12 คน | คำใบ้ปฏิเสธซ้อน (ไม่ใช่คนที่ไม่...)</span>
            </button>
        </div>
    </div>

    <!-- Screen 2: Game Screen -->
    <div id="game-screen" class="screen bg-[#FDFBF7]">
        <!-- Top Bar -->
        <div class="flex justify-between items-center mb-4">
            <button class="paper-btn !p-2 !rounded-xl !text-sm bg-white" onclick="returnToMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="paper-panel !p-2 !px-4 !rounded-xl flex gap-4 bg-white">
                <div class="font-bold text-lg text-blue-600">⏱ <span id="time-display">04:00</span></div>
                <div class="font-bold text-lg text-orange-500">⭐ <span id="score-display">0</span></div>
            </div>
        </div>

        <!-- Clue Panel -->
        <div class="paper-panel btn-yellow mb-4 text-center">
            <div class="text-sm font-bold mb-1 opacity-70">คำใบ้ที่ <span id="clue-progress">1/3</span></div>
            <div id="clue-text" class="text-xl font-bold leading-relaxed min-h-[60px] flex items-center justify-center">
                กำลังโหลดคำใบ้...
            </div>
            <div class="text-xs mt-2 text-red-500 font-bold bg-white/50 inline-block px-2 py-1 rounded-lg border border-red-200">
                แตะคนที่ "ไม่ตรง" กับคำใบ้เพื่อคัดออก
            </div>
        </div>

        <!-- Suspects Grid -->
        <div id="suspects-grid" class="grid gap-3 flex-1 overflow-y-auto pb-4 content-start">
            <!-- Inject via JS -->
        </div>
    </div>

    <!-- Screen 3: Result Screen -->
    <div id="result-screen" class="screen justify-center items-center bg-[#FDFBF7] relative">
        <div class="paper-panel btn-mint text-center w-full max-w-sm relative z-10">
            <h2 id="result-title" class="text-3xl font-bold mb-2">สรุปผลงาน</h2>
            <div id="result-icon" class="text-6xl mb-4">🏆</div>
            <p id="result-message" class="text-lg mb-6">คุณจับคนร้ายได้สำเร็จ!</p>
            
            <div class="bg-white rounded-xl p-4 border-2 border-[var(--stroke-color)] mb-6">
                <div class="text-sm text-gray-500">คะแนนของคุณ</div>
                <div id="final-score" class="text-4xl font-bold text-orange-500">120</div>
            </div>

            <button class="paper-btn bg-white w-full" onclick="returnToMenu()">
                เล่นอีกครั้ง
            </button>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast">ลองดูดีๆ นะ</div>

</div>

<script>
    // --- Audio System (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'correct') {
            // Soft chime
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'wrong') {
            // Soft boop
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'win') {
            // Arpeggio
            const notes = [400, 500, 600, 800];
            notes.forEach((freq, i) => {
                const oscWin = audioCtx.createOscillator();
                const gainWin = audioCtx.createGain();
                oscWin.type = 'sine';
                oscWin.connect(gainWin);
                gainWin.connect(audioCtx.destination);
                
                const time = now + (i * 0.1);
                oscWin.frequency.setValueAtTime(freq, time);
                gainWin.gain.setValueAtTime(0, time);
                gainWin.gain.linearRampToValueAtTime(0.2, time + 0.05);
                gainWin.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                
                oscWin.start(time);
                oscWin.stop(time + 0.3);
            });
        }
    }

    // --- Game Logic & Data ---
    let timerInterval;
    let timeLeft = 240; // 4 minutes
    let score = 0;
    let currentDifficulty = 'easy';
    let suspects = [];
    let currentClues = [];
    let activeClueIndex = 0;

    const TRAITS = ['glasses', 'hat', 'mustache', 'bag'];
    const COLORS = ['#FFB5A7', '#A8E6CF', '#A1C9F1', '#FFD3B6', '#E2D4C0', '#D4A5A5'];

    // Generator function for characters (SVG)
    function generateSuspectSVG(suspect, color) {
        return `
        <svg viewBox="0 0 100 120" class="w-full h-full drop-shadow-md">
            <!-- Body -->
            <rect x="25" y="40" width="50" height="80" rx="25" fill="${color}" stroke="#8C7A6B" stroke-width="4"/>
            <!-- Face -->
            <circle cx="50" cy="50" r="30" fill="#FFE5D9" stroke="#8C7A6B" stroke-width="4"/>
            <!-- Eyes -->
            <circle cx="40" cy="45" r="4" fill="#4A4A4A"/>
            <circle cx="60" cy="45" r="4" fill="#4A4A4A"/>
            
            ${suspect.glasses ? `
            <!-- Glasses -->
            <circle cx="40" cy="45" r="10" fill="none" stroke="#4A4A4A" stroke-width="3"/>
            <circle cx="60" cy="45" r="10" fill="none" stroke="#4A4A4A" stroke-width="3"/>
            <line x1="50" y1="45" x2="50" y2="45" stroke="#4A4A4A" stroke-width="3"/>
            ` : ''}

            ${suspect.mustache ? `
            <!-- Mustache -->
            <path d="M 35 60 Q 50 50 65 60 Q 50 65 35 60 Z" fill="#4A4A4A"/>
            ` : ''}

            ${suspect.hat ? `
            <!-- Hat -->
            <path d="M 20 25 L 80 25 L 70 5 L 30 5 Z" fill="#F4A261" stroke="#8C7A6B" stroke-width="4" stroke-linejoin="round"/>
            <line x1="15" y1="25" x2="85" y2="25" stroke="#8C7A6B" stroke-width="4" stroke-linecap="round"/>
            ` : ''}

            ${suspect.bag ? `
            <!-- Bag -->
            <rect x="15" y="80" width="20" height="25" rx="4" fill="#E76F51" stroke="#8C7A6B" stroke-width="3"/>
            <path d="M 20 80 L 30 50" stroke="#8C7A6B" stroke-width="3" fill="none"/>
            ` : ''}
        </svg>
        `;
    }

    // --- Level Generation System ---
    function generateLevel(difficulty) {
        let numSuspects = difficulty === 'easy' ? 6 : difficulty === 'medium' ? 8 : 12;
        
        // 1. Create Culprit randomly
        const culprit = {
            id: 'culprit',
            glasses: Math.random() > 0.5,
            hat: Math.random() > 0.5,
            mustache: Math.random() > 0.5,
            bag: Math.random() > 0.5,
            isCulprit: true,
            eliminated: false
        };

        // 2. Generate Clues based on Culprit traits
        let clues = [];
        let usedTraits = [];

        // Helper to get trait names
        const traitNames = { glasses: 'ใส่แว่น', hat: 'ใส่หมวก', mustache: 'มีหนวด', bag: 'ถือกระเป๋า' };

        if (difficulty === 'easy') {
            // Easy: 3 straightforward clues
            let available = [...TRAITS].sort(() => 0.5 - Math.random());
            for(let i=0; i<3; i++) {
                let t = available[i];
                let hasTrait = culprit[t];
                clues.push({
                    text: `คนร้าย${hasTrait ? '' : 'ไม่ได้'}${traitNames[t]}`,
                    test: (s) => s[t] === hasTrait // True if matches clue (is target)
                });
            }
        } else if (difficulty === 'medium') {
            // Medium: 4 clues, some with AND
            let available = [...TRAITS].sort(() => 0.5 - Math.random());
            
            // Clue 1: Simple
            clues.push({
                text: `คนร้าย${culprit[available[0]] ? '' : 'ไม่ได้'}${traitNames[available[0]]}`,
                test: (s) => s[available[0]] === culprit[available[0]]
            });

            // Clue 2: AND condition
            let t1 = available[1], t2 = available[2];
            let v1 = culprit[t1], v2 = culprit[t2];
            clues.push({
                text: `คนร้าย${v1?'':'ไม่ได้'}${traitNames[t1]} และ ${v2?'':'ไม่ได้'}${traitNames[t2]}`,
                test: (s) => (s[t1] === v1) && (s[t2] === v2)
            });

            // Clue 3: Simple
            clues.push({
                text: `คนร้าย${culprit[available[3]] ? '' : 'ไม่ได้'}${traitNames[available[3]]}`,
                test: (s) => s[available[3]] === culprit[available[3]]
            });

        } else if (difficulty === 'hard') {
            // Hard: 4-5 clues, Double negatives
            let available = [...TRAITS].sort(() => 0.5 - Math.random());
            
            clues.push({ // Double negative
                text: `คนร้ายไม่ใช่คนที่${!culprit[available[0]] ? '' : 'ไม่ได้'}${traitNames[available[0]]}`, // e.g. "ไม่ใช่คนที่ไม่ได้ใส่แว่น" = ใส่แว่น
                test: (s) => s[available[0]] === culprit[available[0]]
            });

            clues.push({ // Simple
                text: `คนร้าย${culprit[available[1]] ? '' : 'ไม่ได้'}${traitNames[available[1]]}`,
                test: (s) => s[available[1]] === culprit[available[1]]
            });

            clues.push({ // Double negative
                text: `คนร้ายเป็นไปไม่ได้ที่จะ${!culprit[available[2]] ? '' : 'ไม่ได้'}${traitNames[available[2]]}`,
                test: (s) => s[available[2]] === culprit[available[2]]
            });
            
            clues.push({ // Simple
                text: `คนร้าย${culprit[available[3]] ? '' : 'ไม่ได้'}${traitNames[available[3]]}`,
                test: (s) => s[available[3]] === culprit[available[3]]
            });
        }

        // 3. Generate Decoy Suspects
        suspects = [culprit];
        
        // Ensure for each clue, there is at least 1 decoy that fails it (so player has something to click)
        clues.forEach((clue, index) => {
            let decoy = {
                id: `decoy_req_${index}`,
                glasses: culprit.glasses,
                hat: culprit.hat,
                mustache: culprit.mustache,
                bag: culprit.bag,
                isCulprit: false,
                eliminated: false
            };
            // Mutate decoy so it fails THIS clue, but passes previous clues
            // This is a simplification. We'll just randomize traits until it fails the clue.
            let safety = 0;
            while(clue.test(decoy) && safety < 50) {
                decoy[TRAITS[Math.floor(Math.random()*TRAITS.length)]] = Math.random() > 0.5;
                safety++;
            }
            if (!suspects.find(s => s.glasses === decoy.glasses && s.hat === decoy.hat && s.mustache === decoy.mustache && s.bag === decoy.bag)) {
                suspects.push(decoy);
            }
        });

        // Fill the rest with random decoys that are NOT identical to culprit
        while(suspects.length < numSuspects) {
            let decoy = {
                id: `decoy_rnd_${suspects.length}`,
                glasses: Math.random() > 0.5,
                hat: Math.random() > 0.5,
                mustache: Math.random() > 0.5,
                bag: Math.random() > 0.5,
                isCulprit: false,
                eliminated: false
            };
            // Check if it's too similar to culprit (passes ALL clues)
            let passesAll = clues.every(c => c.test(decoy));
            // Check duplicate
            let isDup = suspects.find(s => s.glasses === decoy.glasses && s.hat === decoy.hat && s.mustache === decoy.mustache && s.bag === decoy.bag);
            
            if (!passesAll && !isDup) {
                suspects.push(decoy);
            }
        }

        // Shuffle suspects
        suspects.sort(() => 0.5 - Math.random());
        currentClues = clues;
        activeClueIndex = 0;
    }

    // --- UI Rendering ---
    function renderSuspects() {
        const grid = document.getElementById('suspects-grid');
        grid.innerHTML = '';
        
        // Adjust grid columns based on difficulty
        if(currentDifficulty === 'easy') grid.className = 'grid gap-3 flex-1 overflow-y-auto pb-4 content-start grid-cols-2';
        else if(currentDifficulty === 'medium') grid.className = 'grid gap-3 flex-1 overflow-y-auto pb-4 content-start grid-cols-2';
        else grid.className = 'grid gap-2 flex-1 overflow-y-auto pb-4 content-start grid-cols-3'; // Hard = smaller, 3 cols

        suspects.forEach((s, index) => {
            const card = document.createElement('div');
            card.className = `suspect-card ${s.eliminated ? 'eliminated' : ''}`;
            card.id = `suspect-${s.id}`;
            card.innerHTML = generateSuspectSVG(s, COLORS[index % COLORS.length]);
            card.onclick = () => handleTap(s.id);
            grid.appendChild(card);
        });
    }

    function updateUI() {
        document.getElementById('score-display').innerText = score;
        
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('time-display').innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;

        if (activeClueIndex < currentClues.length) {
            document.getElementById('clue-progress').innerText = `${activeClueIndex + 1}/${currentClues.length}`;
            document.getElementById('clue-text').innerText = `"${currentClues[activeClueIndex].text}"`;
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 1500);
    }

    function createConfetti() {
        const colors = ['#FFB5A7', '#A8E6CF', '#A1C9F1', '#FFD3B6'];
        for (let i = 0; i < 30; i++) {
            let conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 1 + 1) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 2000);
        }
    }

    // --- Interaction Logic ---
    function handleTap(id) {
        const suspect = suspects.find(s => s.id === id);
        if (suspect.eliminated) return;

        const currentClue = currentClues[activeClueIndex];
        const card = document.getElementById(`suspect-${id}`);

        // If clue.test(suspect) is TRUE, it means this suspect MATCHES the clue (could be culprit).
        // Player is supposed to tap people who DO NOT match the clue to eliminate them.
        const shouldBeEliminated = !currentClue.test(suspect);

        if (shouldBeEliminated) {
            // Correct tap!
            suspect.eliminated = true;
            card.classList.add('eliminated');
            playSound('correct');
            
            // Check if all necessary eliminations for this clue are done
            const remainingToEliminate = suspects.filter(s => !s.eliminated && !currentClue.test(s));
            
            if (remainingToEliminate.length === 0) {
                // Clue cleared!
                score += 10;
                activeClueIndex++;
                createConfetti();
                
                // Check win condition
                const activeSuspects = suspects.filter(s => !s.eliminated);
                if (activeSuspects.length === 1 && activeSuspects[0].isCulprit) {
                    setTimeout(() => triggerWin(), 500);
                } else if (activeClueIndex >= currentClues.length && activeSuspects.length > 1) {
                    // Out of clues but more than 1 person left (fallback safety)
                    triggerWin(); 
                } else {
                    updateUI();
                }
            }

        } else {
            // Wrong tap! (Tapped someone who fits the clue)
            score -= 5;
            showToast("ลองดูดีๆ นะ!");
            playSound('wrong');
            
            // Wiggle animation
            card.classList.remove('animate-wiggle');
            void card.offsetWidth; // trigger reflow
            card.classList.add('animate-wiggle');
            
            updateUI();
        }
    }

    // --- Game Flow Control ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(difficulty) {
        initAudio();
        currentDifficulty = difficulty;
        score = 0;
        timeLeft = 240; // 4 mins
        
        generateLevel(difficulty);
        switchScreen('game-screen');
        renderSuspects();
        updateUI();

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) {
                triggerLose("หมดเวลา!");
            }
        }, 1000);
    }

    function triggerWin() {
        clearInterval(timerInterval);
        playSound('win');
        createConfetti();
        document.getElementById('result-title').innerText = "จับคนร้ายสำเร็จ!";
        document.getElementById('result-message').innerText = "ตรรกะของคุณเฉียบคมมาก";
        document.getElementById('result-icon').innerText = "🕵️‍♂️✨";
        document.getElementById('final-score').innerText = score;
        switchScreen('result-screen');
    }

    function triggerLose(reason) {
        clearInterval(timerInterval);
        playSound('wrong');
        document.getElementById('result-title').innerText = "ผู้ต้องสงสัยหลบหนีไปได้!";
        document.getElementById('result-message').innerText = reason;
        document.getElementById('result-icon').innerText = "💨";
        document.getElementById('final-score').innerText = score;
        switchScreen('result-screen');
    }

    function returnToMenu() {
        clearInterval(timerInterval);
        switchScreen('menu-screen');
    }

</script>
</body>
</html>
