<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proverb Painter - เกมทายสำนวนไทย</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-cream: #FFFDF5;
            --peach: #FFB085;
            --mint: #B5EAD7;
            --sky: #A2D2FF;
            --yellow: #FFDAC1;
            --dark-text: #4A3F35;
            --panel-stroke: #6D5D50;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Mitr', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 9:18 Aspect Ratio Container */
        #game-container {
            width: 100vw;
            height: calc(100vw * 2);
            max-width: 450px;
            max-height: 900px;
            background-color: var(--bg-cream);
            position: relative;
            overflow: hidden;
            border: 4px solid var(--panel-stroke);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 30px;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* UI Elements */
        .panel {
            background: white;
            border: 3px solid var(--panel-stroke);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 4px 4px 0px var(--panel-stroke);
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: var(--dark-text);
            margin: 0 0 15px 0;
            line-height: 1.2;
        }

        p {
            font-size: 20px;
            color: var(--dark-text);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border: 3px solid var(--panel-stroke);
            border-radius: 20px;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 var(--panel-stroke);
            position: relative;
            top: 0;
            background-color: white;
            color: var(--dark-text);
        }

        .btn:active {
            top: 4px;
            box-shadow: 0 2px 0 var(--panel-stroke);
        }

        .btn-start { background-color: var(--mint); }
        .btn-option { background-color: var(--sky); text-align: left; padding-left: 25px; }
        .btn-diff { background-color: var(--yellow); font-size: 20px; }
        
        .btn-back {
            width: auto;
            display: inline-block;
            padding: 10px 20px;
            font-size: 18px;
            background: var(--peach);
            margin-bottom: 10px;
        }

        /* Game Area */
        #visual-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            position: relative;
            margin-bottom: 25px;
            overflow: hidden;
            /* Paper Cut Effect */
            background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f0f0 100%);
        }

        #visual-panel svg {
            width: 90%;
            height: 90%;
            filter: drop-shadow(4px 4px 2px rgba(0,0,0,0.1));
        }

        .score-box {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-text);
            background: var(--yellow);
            padding: 5px 15px;
            border-radius: 12px;
            border: 2px solid var(--panel-stroke);
        }

        /* Feedback Animations */
        .wiggle {
            animation: wiggle 0.4s ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .color-up {
            animation: colorUp 0.8s forwards;
        }

        @keyframes colorUp {
            from { filter: grayscale(1); }
            to { filter: grayscale(0); transform: scale(1.05); }
        }

        /* Difficulty badge info */
        .diff-info {
            display: block;
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <!-- หน้าเริ่มเกม -->
    <div id="home-screen" class="screen active">
        <div class="panel">
            <h1>Proverb Painter</h1>
            <p>ตีความหมายของภาพวาด<br>ให้เป็นสำนวนไทยแสนสนุก</p>
        </div>

        <div class="panel">
            <p style="margin-bottom: 10px; font-weight: bold;">เลือกความยาก</p>
            <button class="btn btn-diff" onclick="setDifficulty('easy')">
                ง่าย
                <span class="diff-info">ภาพตรงตัว สำนวนคุ้นหู</span>
            </button>
            <button class="btn btn-diff" onclick="setDifficulty('medium')">
                ปานกลาง
                <span class="diff-info">ต้องตีความลึกซึ้งขึ้น</span>
            </button>
            <button class="btn btn-diff" onclick="setDifficulty('hard')">
                ยาก
                <span class="diff-info">ตัวเลือกใกล้เคียงกันมาก</span>
            </button>
        </div>

        <button class="btn btn-start" onclick="startGame()" id="start-btn" style="display:none;">เริ่มวาดภาพ!</button>
    </div>

    <!-- หน้าเล่นเกม -->
    <div id="game-screen" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button class="btn btn-back" onclick="goHome()">⬅ ย้อนกลับ</button>
            <div id="score-display" class="score-box">คะแนน: 0</div>
        </div>

        <div id="visual-panel" class="panel">
            <!-- SVG content will be injected here -->
        </div>

        <div id="options-container">
            <!-- Buttons will be injected here -->
        </div>
    </div>

    <!-- หน้าจบเกม -->
    <div id="result-screen" class="screen">
        <div class="panel" style="margin-top: 50px;">
            <h1>จบเกม!</h1>
            <p id="final-score-text" style="font-size: 32px; font-weight: bold;"></p>
            <p id="evaluation-text"></p>
        </div>
        <button class="btn btn-start" onclick="goHome()">เล่นอีกครั้ง</button>
    </div>

</div>

    let currentDifficulty = 'easy';
    let score = 0;
    let currentQuestionIndex = 0;
    let gameQuestions = [];

    // Synthesize Soft Chime
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playChime(freq, type = 'sine') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function setDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.btn-diff').forEach(btn => {
            btn.style.backgroundColor = 'var(--yellow)';
            btn.style.borderWidth = '3px';
        });
        event.currentTarget.style.backgroundColor = 'var(--mint)';
        document.getElementById('start-btn').style.display = 'block';
        playChime(440);
    }

    function startGame() {
        score = 0;
        currentQuestionIndex = 0;
        gameQuestions = [...proverbs[currentDifficulty]];
        // Shuffle questions
        gameQuestions.sort(() => Math.random() - 0.5);
        
        updateScore();
        showScreen('game-screen');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= gameQuestions.length) {
            endGame();
            return;
        }

        const q = gameQuestions[currentQuestionIndex];
        const visualPanel = document.getElementById('visual-panel');
        visualPanel.innerHTML = q.svg;
        visualPanel.classList.remove('color-up');

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        // Shuffle options
        const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, q.answer, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, btn) {
        if (selected === correct) {
            score += 15;
            updateScore();
            playChime(880);
            
            // Visual feedback: Confetti
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FFB085', '#B5EAD7', '#A2D2FF', '#FFDAC1']
            });

            // Make visual colorful and move
            const svg = document.querySelector('#visual-panel svg');
            svg.classList.add('color-up');
            btn.style.backgroundColor = 'var(--mint)';

            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        } else {
            score = Math.max(0, score - 5);
            updateScore();
            playChime(220, 'square');
            
            // Wiggle effect
            const visualPanel = document.getElementById('visual-panel');
            visualPanel.classList.add('wiggle');
            btn.style.backgroundColor = '#ffcccc';
            
            setTimeout(() => {
                visualPanel.classList.remove('wiggle');
            }, 400);
        }
    }

    function updateScore() {
        document.getElementById('score-display').innerText = `คะแนน: ${score}`;
    }

    function endGame() {
        showScreen('result-screen');
        document.getElementById('final-score-text').innerText = `${score} คะแนน`;
        
        let eval = "เก่งมาก! คุณคือจิตรกรเอกด้านสำนวน";
        if (score < 15) eval = "พยายามอีกนิดนะ ลองใหม่ได้เสมอ!";
        else if (score < 30) eval = "ทำได้ดีแล้ว! อีกนิดจะเทพแล้ว";
        
        document.getElementById('evaluation-text').innerText = eval;
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function goHome() {
        showScreen('home-screen');
    }

    // Initialize with first user interaction to enable AudioContext
    document.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }, { once: true });

</script>

</body>
</html>
