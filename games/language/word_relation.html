            { id: 312, emoji: "⚖️", correct: "ธรรม", options: ["ธรรม", "ทำ", "ทัม", "ทัณฑ์"], desc: "ธรรม (ความดี/ความถูกต้อง) vs ทำ (กระทำ)" },
            { id: 313, emoji: "🎨", correct: "สรรค์", options: ["สรรค์", "สรร", "ศัลย์", "สัน"], desc: "สรรค์ (สร้างให้มีให้เป็น เช่น สร้างสรรค์)" },
            { id: 314, emoji: "👀", correct: "ทัศน์", options: ["ทัศน์", "ทัด", "ธรรศ", "ทัส"], desc: "ทัศน์ (การเห็น/สิ่งที่เห็น เช่น ทิวทัศน์)" },
            { id: 315, emoji: "🌸", correct: "พรรณ", options: ["พรรณ", "พัน", "พันธ์", "ภัณฑ์"], desc: "พรรณ (สีของผิว/ชนิดพืช) vs พัน (จำนวน)" },
            { id: 316, emoji: "🗡️", correct: "ขรรค์", options: ["ขรรค์", "ขัน", "ครรภ์", "คัน"], desc: "ขรรค์ (อาวุธคล้ายหอก/ดาบ) vs ขัน (ภาชนะ)" },
            { id: 317, emoji: "🥣", correct: "ขัน", options: ["ขัน", "ขรรค์", "คัน", "ครรภ์"], desc: "ขัน (ภาชนะตักน้ำ) vs ขรรค์ (อาวุธ)" },
            { id: 318, emoji: "🤰", correct: "ครรภ์", options: ["ครรภ์", "คัน", "ขัน", "ขรรค์"], desc: "ครรภ์ (ท้อง) vs คัน (อาการคัน)" },
            { id: 319, emoji: "👑", correct: "รัช", options: ["รัช", "รัด", "รัฐ", "รัตน์"], desc: "รัช (สมบัติ/ความเป็นพระราชา เช่น รัชกาล)" },
            { id: 320, emoji: "🎗️", correct: "รัด", options: ["รัด", "รัช", "รัฐ", "รัตน์"], desc: "รัด (โอบรอบให้แน่น) vs รัช (ราชสมบัติ)" },
            { id: 321, emoji: "👥", correct: "ราษฎร์", options: ["ราษฎร์", "ราด", "ราช", "ลาภ"], desc: "ราษฎร์ (พลเมือง) vs ราด (เทน้ำ)" },
            { id: 322, emoji: "🚿", correct: "ราด", options: ["ราด", "ราษฎร์", "ราช", "ลาศ"], desc: "ราด (เทของเหลว) vs ราษฎร์ (คน)" },
            { id: 323, emoji: "⚙️", correct: "จักร", options: ["จักร", "จัก", "จั๊ก", "จักษ์"], desc: "จักร (ล้อ/อาวุธกลม) vs จัก (จะ)" },
            { id: 324, emoji: "👴", correct: "เกษียณ", options: ["เกษียณ", "เกษียน", "เกรียน", "เขียน"], desc: "เกษียณ (ครบกำหนดอายุทำงาน)" },
            { id: 325, emoji: "🥛", correct: "เกษียน", options: ["เกษียน", "เกษียณ", "เขียน", "เสถียร"], desc: "เกษียน (น้ำนม - เกษียรสมุทร)" },
            { id: 326, emoji: "👸", correct: "พักตร์", options: ["พักตร์", "พัก", "พรรค", "ภัค"], desc: "พักตร์ (ใบหน้า) vs พัก (หยุด)" },
            { id: 327, emoji: "📜", correct: "กฤช", options: ["กฤช", "กริช", "กิจ", "กฤษฎ์"], desc: "กฤช (มีดสองคม) - บางทีสะกด กริช" },
            { id: 328, emoji: "🌍", correct: "โลกา", options: ["โลกา", "โรคา", "โลภา", "โศกา"], desc: "โลกา (โลก) vs โรคา (โรค)" },
            { id: 329, emoji: "🤕", correct: "โรคา", options: ["โรคา", "โลกา", "ราก้า", "ราคา"], desc: "โรคา (ความเจ็บป่วย) vs โลกา (โลก)" },
            { id: 330, emoji: "🐎", correct: "อาชา", options: ["อาชา", "อาชญา", "อาจาร", "อาจา"], desc: "อาชา (ม้า) vs อาชญา (โทษ)" },
            { id: 331, emoji: "⚖️", correct: "อาชญา", options: ["อาชญา", "อาชา", "อาญา", "อารยา"], desc: "อาชญา (อำนาจ/โทษ) - อาชญากรรม" }
        ];

        // --- Logic ---
        const shuffleArray = (array) => {
            return [...array].sort(() => Math.random() - 0.5);
        };

        const getOptionsForDifficulty = (allOptions, correct, difficulty) => {
            let numOptions = 4;
            if (difficulty === 'EASY') numOptions = 2;
            if (difficulty === 'MEDIUM') numOptions = 3;

            const distractors = allOptions.filter(opt => opt !== correct);
            const selectedDistractors = shuffleArray(distractors).slice(0, numOptions - 1);
            
            return shuffleArray([correct, ...selectedDistractors]);
        };

        function App() {
            const [gameState, setGameState] = useState('START'); // START, PLAYING, GAME_OVER, LEADERBOARD
            const [difficulty, setDifficulty] = useState('EASY');
            const [score, setScore] = useState(0);
            
            const [leaderboardEasy, setLeaderboardEasy] = useState([]);
            const [leaderboardMedium, setLeaderboardMedium] = useState([]);
            const [leaderboardHard, setLeaderboardHard] = useState([]);
            
            const [activeLeaderboardTab, setActiveLeaderboardTab] = useState('EASY');
            const [highScoreDisplay, setHighScoreDisplay] = useState(0);

            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [activeQuestions, setActiveQuestions] = useState([]);
            const [currentOptions, setCurrentOptions] = useState([]);
            const [lives, setLives] = useState(3);
            
            const [timer, setTimer] = useState(0); 
            const [totalPlayTime, setTotalPlayTime] = useState(0); 
            
            const [selectedOption, setSelectedOption] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);

            useEffect(() => {
                const lbEasy = JSON.parse(localStorage.getItem('thai-homophone-lb-easy') || '[]');
                const lbMedium = JSON.parse(localStorage.getItem('thai-homophone-lb-medium') || '[]');
                const lbHard = JSON.parse(localStorage.getItem('thai-homophone-lb-hard') || '[]');
                
                setLeaderboardEasy(lbEasy);
                setLeaderboardMedium(lbMedium);
                setLeaderboardHard(lbHard);

                if (lbEasy.length > 0) setHighScoreDisplay(lbEasy[0].score);
            }, []);

            useEffect(() => {
                let interval;
                if (gameState === 'PLAYING' && !showFeedback) {
                    const startTime = Date.now() - (timer * 1000);
                    interval = setInterval(() => {
                        setTimer((Date.now() - startTime) / 1000);
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [gameState, showFeedback]); // eslint-disable-line

            const startGame = (selectedDiff) => {
                setDifficulty(selectedDiff);
                
                let pool = [];
                if (selectedDiff === 'EASY') pool = [...QUESTIONS_EASY];
                else if (selectedDiff === 'MEDIUM') pool = [...QUESTIONS_MEDIUM];
                else pool = [...QUESTIONS_HARD];

                const allShuffled = shuffleArray(pool);
                const gameQuestions = allShuffled.slice(0, 15);
                
                setActiveQuestions(gameQuestions);
                
                setCurrentQIndex(0);
                if (gameQuestions.length > 0) {
                    const firstQ = gameQuestions[0];
                    setCurrentOptions(getOptionsForDifficulty(firstQ.options, firstQ.correct, selectedDiff));
                }
                
                setScore(0);
                setLives(3);
                setTimer(0);
                setTotalPlayTime(0); 
                setGameState('PLAYING');
                setSelectedOption(null);
                setIsCorrect(null);
                setShowFeedback(false);
            };

            const handleAnswer = (option) => {
                if (showFeedback) return;

                const currentQ = activeQuestions[currentQIndex];
                const correct = option === currentQ.correct;

                setTotalPlayTime((prev) => prev + timer);

                setSelectedOption(option);
                setIsCorrect(correct);
                setShowFeedback(true);

                if (correct) {
                    const speedBonus = Math.max(0, Math.ceil(10 - timer));
                    let difficultyMultiplier = 1;
                    if (difficulty === 'MEDIUM') difficultyMultiplier = 1.2;
                    if (difficulty === 'HARD') difficultyMultiplier = 1.5;

                    setScore((s) => s + Math.ceil((10 + speedBonus) * difficultyMultiplier));
                } else {
                    setLives((l) => l - 1);
                }
            };

            const nextQuestion = () => {
                if (lives <= 0 && !isCorrect) {
                    endGame();
                    return;
                }

                if (currentQIndex >= activeQuestions.length - 1) {
                    endGame(); 
                    return;
                }

                const nextIdx = currentQIndex + 1;
                const nextQ = activeQuestions[nextIdx];
                
                setCurrentQIndex(nextIdx);
                setCurrentOptions(getOptionsForDifficulty(nextQ.options, nextQ.correct, difficulty));
                
                setTimer(0);
                setSelectedOption(null);
                setIsCorrect(null);
                setShowFeedback(false);
            };

            const endGame = () => {
                const newEntry = {
                    id: Date.now().toString(),
                    score: score,
                    difficulty: difficulty,
                    time: totalPlayTime,
                    date: new Date().toISOString()
                };

                let currentList = [];
                let storageKey = '';

                if (difficulty === 'EASY') {
                    currentList = [...leaderboardEasy];
                    storageKey = 'thai-homophone-lb-easy';
                } else if (difficulty === 'MEDIUM') {
                    currentList = [...leaderboardMedium];
                    storageKey = 'thai-homophone-lb-medium';
                } else {
                    currentList = [...leaderboardHard];
                    storageKey = 'thai-homophone-lb-hard';
                }

                const updatedList = [...currentList, newEntry]
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10);

                if (difficulty === 'EASY') setLeaderboardEasy(updatedList);
                else if (difficulty === 'MEDIUM') setLeaderboardMedium(updatedList);
                else setLeaderboardHard(updatedList);

                localStorage.setItem(storageKey, JSON.stringify(updatedList));
                setGameState('GAME_OVER');
            };

            const renderStartScreen = () => {
                const maxEasy = leaderboardEasy.length > 0 ? leaderboardEasy[0].score : 0;
                const maxMedium = leaderboardMedium.length > 0 ? leaderboardMedium[0].score : 0;
                const maxHard = leaderboardHard.length > 0 ? leaderboardHard[0].score : 0;

                return (
                    <div className="flex flex-col items-center justify-center h-full p-6 text-center animate-fadeIn relative">
                        <div className="mb-6 relative">
                            <div className="text-8xl mb-4 animate-bounce-slow">🇹🇭</div>
                        </div>
                        <h1 className="text-3xl font-extrabold text-white mb-2 drop-shadow-md">คำพ้อง...ต้องทาย</h1>
                        <p className="text-blue-100 mb-8 text-sm font-light">เลือกคำศัพท์ที่ถูกต้องให้ตรงกับภาพ</p>

                        <div className="w-full max-w-xs space-y-3 mb-6">
                            <p className="text-white/80 font-bold mb-2">เลือกระดับความยาก:</p>
                            
                            <button onClick={() => startGame('EASY')} className="group w-full bg-green-500 hover:bg-green-400 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-between relative overflow-hidden">
                                <span className="flex items-center gap-2 relative z-10"><Star size={18} fill="currentColor"/> ง่าย</span>
                                <span className="text-xs opacity-80 bg-black/20 px-2 py-1 rounded relative z-10">สูงสุด: {maxEasy}</span>
                            </button>

                            <button onClick={() => startGame('MEDIUM')} className="group w-full bg-yellow-500 hover:bg-yellow-400 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-between relative overflow-hidden">
                                <span className="flex items-center gap-2 relative z-10"><Star size={18} fill="currentColor"/><Star size={18} fill="currentColor"/> ปานกลาง</span>
                                <span className="text-xs opacity-80 bg-black/20 px-2 py-1 rounded relative z-10">สูงสุด: {maxMedium}</span>
                            </button>

                            <button onClick={() => startGame('HARD')} className="group w-full bg-red-500 hover:bg-red-400 text-white font-bold py-3 px-6 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-between relative overflow-hidden">
                                <span className="flex items-center gap-2 relative z-10"><Star size={18} fill="currentColor"/><Star size={18} fill="currentColor"/><Star size={18} fill="currentColor"/> ยาก</span>
                                <span className="text-xs opacity-80 bg-black/20 px-2 py-1 rounded relative z-10">สูงสุด: {maxHard}</span>
                            </button>
                        </div>

                        <button 
                            onClick={() => { setActiveLeaderboardTab('EASY'); setGameState('LEADERBOARD'); }}
                            className="flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white px-6 py-3 rounded-full font-bold transition-all border border-white/10"
                        >
                            <Trophy size={20} className="text-yellow-400" /> อันดับยอดเยี่ยม
                        </button>
                    </div>
                );
            };

            const renderLeaderboard = () => {
                let currentList = [];
                if (activeLeaderboardTab === 'EASY') currentList = leaderboardEasy;
                else if (activeLeaderboardTab === 'MEDIUM') currentList = leaderboardMedium;
                else currentList = leaderboardHard;

                return (
                    <div className="flex flex-col h-full p-6 animate-fadeIn relative">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={() => setGameState('START')} className="p-2 bg-white/10 rounded-full text-white hover:bg-white/20 transition-colors">
                                <ArrowLeft size={24} />
                            </button>
                            <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                <Trophy className="text-yellow-400" /> กระดานผู้นำ
                            </h2>
                            <div className="w-10"></div>
                        </div>

                        {/* Tabs */}
                        <div className="flex p-1 bg-black/20 rounded-xl mb-4">
                            {['EASY', 'MEDIUM', 'HARD'].map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveLeaderboardTab(tab)}
                                    className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${
                                        activeLeaderboardTab === tab 
                                            ? (tab === 'EASY' ? 'bg-green-500 text-white shadow-md' : tab === 'MEDIUM' ? 'bg-yellow-500 text-white shadow-md' : 'bg-red-500 text-white shadow-md')
                                            : 'text-white/60 hover:text-white hover:bg-white/10'
                                    }`}
                                >
                                    {tab === 'EASY' ? 'ง่าย' : tab === 'MEDIUM' ? 'กลาง' : 'ยาก'}
                                </button>
                            ))}
                        </div>

                        <div className="bg-white/95 backdrop-blur-md rounded-3xl flex-1 overflow-hidden flex flex-col shadow-2xl custom-scrollbar">
                            <div className={`p-3 text-white grid grid-cols-12 gap-2 text-xs font-bold text-center uppercase tracking-wider
                                ${activeLeaderboardTab === 'EASY' ? 'bg-green-600' : activeLeaderboardTab === 'MEDIUM' ? 'bg-yellow-600' : 'bg-red-600'}
                            `}>
                                <div className="col-span-2">#</div>
                                <div className="col-span-5">คะแนน</div>
                                <div className="col-span-5">เวลา</div>
                            </div>
                            
                            <div className="overflow-y-auto flex-1 p-2 custom-scrollbar">
                                {currentList.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                        <ListIcon size={48} className="mb-2 opacity-50" />
                                        <p>ยังไม่มีข้อมูลระดับนี้</p>
                                    </div>
                                ) : (
                                    currentList.map((entry, index) => (
                                        <div key={index} className={`grid grid-cols-12 gap-2 items-center p-3 mb-2 rounded-xl text-center border-b-2 ${index === 0 ? 'bg-yellow-50 border-yellow-200' : index === 1 ? 'bg-gray-50 border-gray-200' : index === 2 ? 'bg-orange-50 border-orange-200' : 'bg-white border-transparent'}`}>
                                            <div className="col-span-2 font-black text-gray-600 flex justify-center">
                                                {index === 0 ? <Crown size={20} className="text-yellow-500" /> : index + 1}
                                            </div>
                                            <div className="col-span-5 font-bold text-indigo-600 text-lg">{entry.score}</div>
                                            <div className="col-span-5 text-xs text-gray-500 font-mono">
                                                {entry.time.toFixed(0)} วินาที
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderGameScreen = () => {
                const currentQ = activeQuestions[currentQIndex];
                if (!currentQ) return null;

                return (
                    <div className="flex flex-col h-full relative">
                        {/* Top Bar */}
                        <div className="px-4 py-4 flex justify-between items-center bg-black/10 backdrop-blur-md sticky top-0 z-10">
                            <div className="flex items-center gap-1 bg-white/20 px-3 py-1 rounded-full min-w-[60px] justify-center">
                                <Heart className={`w-4 h-4 ${lives < 2 ? 'text-red-500 animate-pulse' : 'text-red-400'} fill-current`} />
                                <span className="font-bold text-white text-sm">{lives}</span>
                            </div>
                            
                            <div className="flex items-center gap-2 bg-gray-800/60 px-4 py-1 rounded-full border border-white/10">
                                <Clock size={16} className="text-blue-300" />
                                <span className="font-mono text-xl text-blue-100 font-bold w-[45px] text-center">
                                    {timer.toFixed(1)}
                                </span>
                            </div>

                            <div className="flex items-center gap-1 bg-white/20 px-3 py-1 rounded-full min-w-[70px] justify-center">
                                <Trophy className="w-4 h-4 text-yellow-400 fill-current" />
                                <span className="font-bold text-white text-sm">{score}</span>
                            </div>
                        </div>

                        <div className="absolute top-16 right-4">
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full text-white uppercase tracking-wider
                                ${difficulty === 'EASY' ? 'bg-green-500/80' : difficulty === 'MEDIUM' ? 'bg-yellow-500/80' : 'bg-red-500/80'}
                            `}>
                                {difficulty}
                            </span>
                        </div>

                        <div className="flex-1 flex flex-col items-center justify-center p-6 pb-2">
                            <div className="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-xs text-center relative overflow-visible transform transition hover:scale-105 duration-300">
                                <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-3 py-0.5 rounded-b-lg text-xs font-bold shadow-sm whitespace-nowrap">
                                    ด่านที่ {currentQIndex + 1} / {activeQuestions.length}
                                </div>
                                
                                <div className="text-[8rem] leading-none mb-4 filter drop-shadow-md mt-4 select-none">
                                    {currentQ.emoji}
                                </div>
                                
                                <div className="bg-gray-100 rounded-lg p-2 mb-2">
                                    <p className="text-gray-500 text-sm font-medium">คำศัพท์ที่ถูกต้องคือ?</p>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-md rounded-t-3xl p-6 pb-12 animate-slideUp">
                            <div className={`grid gap-3 ${currentOptions.length === 2 ? 'grid-cols-1' : 'grid-cols-2'}`}>
                                {currentOptions.map((option, idx) => {
                                    let btnClass = "bg-white text-gray-800 shadow-[0_4px_0_rgb(209,213,219)] active:shadow-none active:translate-y-[4px]";
                                    
                                    if (showFeedback) {
                                        if (option === currentQ.correct) {
                                            btnClass = "bg-green-500 text-white shadow-[0_4px_0_rgb(21,128,61)] scale-105 ring-2 ring-white";
                                        } else if (option === selectedOption && option !== currentQ.correct) {
                                            btnClass = "bg-red-500 text-white shadow-none opacity-50";
                                        } else {
                                            btnClass = "bg-gray-200 text-gray-400 shadow-none opacity-50";
                                        }
                                    }

                                    return (
                                        <button
                                            key={idx}
                                            onClick={() => handleAnswer(option)}
                                            disabled={showFeedback}
                                            className={`
                                                h-16 rounded-2xl text-2xl font-bold transition-all duration-200 
                                                flex items-center justify-center relative overflow-hidden
                                                ${btnClass}
                                            `}
                                        >
                                            {option}
                                            {showFeedback && option === currentQ.correct && (
                                                <CheckCircle className="absolute top-2 right-2 w-5 h-5 text-white/80" />
                                            )}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {showFeedback && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-[2px] animate-fadeIn">
                                <div className="bg-white rounded-2xl p-6 shadow-2xl max-w-sm w-full text-center border-4 border-white relative">
                                    
                                    {isCorrect && (
                                        <div className="absolute -top-12 left-1/2 -translate-x-1/2 animate-bounce-slow">
                                            <span className="bg-yellow-400 text-yellow-900 font-bold px-4 py-1 rounded-full shadow-lg border-2 border-white">
                                                +{Math.ceil((10 + Math.max(0, 10 - timer)) * (difficulty === 'MEDIUM' ? 1.2 : difficulty === 'HARD' ? 1.5 : 1))} คะแนน!
                                            </span>
                                        </div>
                                    )}

                                    <div className={`mx-auto w-14 h-14 rounded-full flex items-center justify-center mb-3 ${isCorrect ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                        {isCorrect ? <CheckCircle size={32} /> : <XCircle size={32} />}
                                    </div>
                                    
                                    <h2 className={`text-xl font-bold mb-1 ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                        {isCorrect ? 'ถูกต้อง!' : 'ผิดครับ!'}
                                    </h2>
                                    <p className="text-gray-400 text-xs mb-4">ใช้เวลาไป {timer.toFixed(1)} วินาที</p>
                                    
                                    <div className="bg-blue-50 p-3 rounded-xl mb-5 text-left border border-blue-100">
                                        <p className="text-gray-800 text-base leading-relaxed font-medium">
                                            {currentQ.desc}
                                        </p>
                                    </div>

                                    <button 
                                        onClick={nextQuestion}
                                        className={`w-full py-3 rounded-xl font-bold text-white text-lg shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95 ${isCorrect ? 'bg-green-500 hover:bg-green-600' : 'bg-gray-500 hover:bg-gray-600'}`}
                                    >
                                        {currentQIndex >= activeQuestions.length - 1 && (lives > 0 || isCorrect) ? 'สรุปผลคะแนน' : <span>ข้อต่อไป <ChevronRight size={20} className="inline"/></span>}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderGameOver = () => (
                <div className="flex flex-col items-center justify-center h-full p-6 text-center animate-fadeIn">
                    <div className="bg-white rounded-3xl shadow-xl p-8 w-full max-w-sm relative">
                        <div className="absolute -top-12 left-1/2 -translate-x-1/2 bg-yellow-400 p-4 rounded-full shadow-lg border-4 border-white">
                            <Trophy size={48} className="text-yellow-900" />
                        </div>
                        
                        <h2 className="text-2xl font-bold text-gray-800 mt-8 mb-1">สรุปผลการเล่น</h2>
                        <p className="text-gray-400 text-sm mb-6">ระดับ: {difficulty}</p>
                        
                        <div className="grid grid-cols-2 gap-4 w-full mb-6">
                            <div className="bg-blue-50 p-4 rounded-2xl flex flex-col items-center border border-blue-100">
                                <span className="text-4xl font-black text-blue-600">{score}</span>
                                <span className="text-xs font-bold text-gray-500 uppercase mt-1">คะแนนรวม</span>
                            </div>
                            <div className="bg-orange-50 p-4 rounded-2xl flex flex-col items-center border border-orange-100">
                                <span className="text-4xl font-black text-orange-600 flex items-baseline">
                                    {totalPlayTime.toFixed(0)} <span className="text-sm font-bold ml-1 text-orange-400">วิ</span>
                                </span>
                                <span className="text-xs font-bold text-gray-500 uppercase mt-1">เวลาที่ใช้</span>
                            </div>
                        </div>

                        <div className="flex gap-2 mb-6">
                            <button 
                                onClick={() => { setActiveLeaderboardTab(difficulty); setGameState('LEADERBOARD'); }}
                                className="flex-1 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-bold py-3 rounded-xl transition-colors flex flex-col items-center justify-center gap-1"
                            >
                                <ListIcon size={20} />
                                <span className="text-xs">ดูอันดับ (ระดับนี้)</span>
                            </button>
                        </div>

                        <button 
                            onClick={() => setGameState('START')}
                            className="w-full bg-blue-600 hover:bg-blue-700 text-white text-lg font-bold py-3 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95"
                        >
                            <RotateCcw size={20} /> กลับไปหน้าหลัก
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex items-center justify-center font-sans">
                    <div className="w-full h-[100dvh] sm:h-[800px] sm:w-[450px] bg-gradient-to-br from-indigo-500 to-purple-700 sm:rounded-[3rem] overflow-hidden shadow-2xl relative font-thai">
                        
                        <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-white/10 rounded-full blur-3xl pointer-events-none" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-blue-500/20 rounded-full blur-3xl pointer-events-none" />

                        {gameState === 'START' && renderStartScreen()}
                        {gameState === 'PLAYING' && renderGameScreen()}
                        {gameState === 'GAME_OVER' && renderGameOver()}
                        {gameState === 'LEADERBOARD' && renderLeaderboard()}
                        
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
