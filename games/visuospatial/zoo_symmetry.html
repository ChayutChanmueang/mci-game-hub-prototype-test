<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoo Symmetry Game</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700;800&display=swap');
        
        body {
            font-family: 'Sarabun', sans-serif;
        }

        @keyframes pop-in {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 2s infinite ease-in-out;
        }

        @keyframes pulse-dot {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 0 8px rgba(244, 63, 94, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        .animate-pulse-dot {
            animation: pulse-dot 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- UI Icons ---
        const IconBase = ({ children, size = 24, className = "", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3"></polygon></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></IconBase>;
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17"></path><path d="M14 14.66V17"></path><path d="M12 2v20"></path><path d="M22 6a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V4h20v2z"></path></IconBase>;
        const Clock = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></IconBase>;
        const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></IconBase>;
        const ArrowRight = (props) => <IconBase {...props}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></IconBase>;
        const RefreshCw = (props) => <IconBase {...props}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></IconBase>;
        const BarChart2 = (props) => <IconBase {...props}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></IconBase>;
        const BookOpen = (props) => <IconBase {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></IconBase>;
        const Swords = (props) => <IconBase {...props}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"></polyline><line x1="13" y1="19" x2="19" y2="13"></line><line x1="16" y1="16" x2="20" y2="20"></line><line x1="19" y1="21" x2="21" y2="19"></line><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"></polyline><line x1="5" y1="14" x2="9" y2="18"></line><line x1="7" y1="17" x2="4" y2="20"></line><line x1="2" y1="19" x2="4" y2="21"></line></IconBase>;
        const ArrowLeft = (props) => <IconBase {...props}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></IconBase>;
        const Grid4 = (props) => <IconBase {...props}><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></IconBase>;
        const InfinityIcon = (props) => <IconBase {...props}><path d="M12 12c-2-2.67-4-4-6-4a4 4 0 1 0 0 8c2 0 4-1.33 6-4Zm0 0c2 2.67 4 4 6 4a4 4 0 1 0 0-8c-2 0-4 1.33-6 4Z"></path></IconBase>;
        const Save = (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></IconBase>;

        // --- Animal Assets ---
        const AnimalIcons = {
            lion: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="7" />
                <path d="M12 5v-2m-4.5 3l-1.5-2m9 2l1.5-2M5 12H3m18 0h-2M7.5 17.5l-1.5 2m9-2l1.5 2" />
                </svg>
            ),
            elephant: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 18h16M7 18v-7a5 5 0 0110 0v7M7 11H4a2 2 0 00-2 2v2M17 11h3a2 2 0 012 2v2M10 14h4" />
                </svg>
            ),
            bird: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16 7h.01" />
                <path d="M3.4 18H12a8 8 0 000-16 8 8 0 008 8 2.7 2.7 0 012.8 2.3A2 7 2 0 0122 13v5h-2.5" />
                </svg>
            ),
            dragon: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M2 12h2M20 12h2M12 2v2M12 20v2" />
                <path d="M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                <circle cx="12" cy="12" r="4" />
                </svg>
            ),
            whale: (props) => (
                <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v16z"></path>
                <path d="M10 14a4 4 0 0 1 4 4"></path>
                </svg>
            )
        };

        const THEMES = [
            { name: 'ป่าดิบชื้น', bg: 'bg-emerald-50', header: 'bg-emerald-500', cell: 'bg-emerald-200', active: 'bg-emerald-500', text: 'text-emerald-800', border: 'border-emerald-600', accent: 'bg-emerald-600' },
            { name: 'ทุ่งหญ้าสะวันนา', bg: 'bg-amber-50', header: 'bg-amber-500', cell: 'bg-amber-200', active: 'bg-amber-500', text: 'text-amber-800', border: 'border-amber-600', accent: 'bg-amber-600' },
            { name: 'ภูเขาไฟ', bg: 'bg-rose-50', header: 'bg-rose-500', cell: 'bg-rose-200', active: 'bg-rose-500', text: 'text-rose-800', border: 'border-rose-600', accent: 'bg-rose-600' },
            { name: 'มิติพิศวง', bg: 'bg-purple-50', header: 'bg-purple-600', cell: 'bg-purple-200', active: 'bg-purple-600', text: 'text-purple-800', border: 'border-purple-600', accent: 'bg-purple-600' },
            { name: 'ท้องทะเลลึก', bg: 'bg-blue-50', header: 'bg-blue-600', cell: 'bg-blue-200', active: 'bg-blue-600', text: 'text-blue-800', border: 'border-blue-600', accent: 'bg-blue-600' }
        ];

        // --- Configuration ---
        const DIFFICULTY_CONFIG = {
            EASY: { 
                label: "ง่าย", 
                desc: "4x4 สะท้อนพื้นฐาน", 
                size: 4, 
                color: "bg-emerald-500", 
                text: "text-emerald-600",
                bgLight: "bg-emerald-50",
                border: "border-emerald-200",
                icon: AnimalIcons.bird,
                levels: 30
            },
            MEDIUM: { 
                label: "กลาง", 
                desc: "4x4 + หมุน 180°", 
                size: 4, 
                color: "bg-amber-500", 
                text: "text-amber-600",
                bgLight: "bg-amber-50",
                border: "border-amber-200",
                icon: AnimalIcons.elephant,
                levels: 30
            },
            HARD: { 
                label: "ยาก", 
                desc: "6x6 รวมทุกรูปแบบ", 
                size: 6, 
                color: "bg-rose-500", 
                text: "text-rose-600",
                bgLight: "bg-rose-50",
                border: "border-rose-200",
                icon: AnimalIcons.lion,
                levels: 30
            },
            CHALLENGE: {
                label: "ทดสอบ",
                desc: "15 ด่าน วัดระดับ",
                size: 4, 
                color: "bg-purple-600",
                text: "text-purple-600",
                bgLight: "bg-purple-50",
                border: "border-purple-200",
                icon: AnimalIcons.dragon,
                levels: 15
            },
            ENDLESS: {
                label: "ไม่มีที่สิ้นสุด",
                desc: "เล่นต่อเนื่อง บันทึกสถิติ",
                size: 4,
                color: "bg-blue-600",
                text: "text-blue-600",
                bgLight: "bg-blue-50",
                border: "border-blue-200",
                icon: AnimalIcons.whale,
                levels: 9999
            }
        };

        // --- Storage Helpers ---
        const STORAGE_KEY_LEADERBOARD = 'zoo_symmetry_scores_v3';
        const STORAGE_KEY_PROGRESS = 'zoo_symmetry_progress_v1'; // Generic progress for all modes

        const loadLeaderboardData = () => {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_LEADERBOARD);
                if (saved) return JSON.parse(saved);
            } catch (e) { console.error(e); }
            return { EASY: [], MEDIUM: [], HARD: [], CHALLENGE: [] };
        };

        const loadProgressData = () => {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_PROGRESS);
                if (saved) return JSON.parse(saved);
            } catch (e) { console.error(e); }
            return {}; // Format: { "EASY": { level: 5, score: 500, time: 120 }, "ENDLESS": { ... } }
        };

        const saveLeaderboardData = (data) => {
            try { localStorage.setItem(STORAGE_KEY_LEADERBOARD, JSON.stringify(data)); } catch (e) {}
        };

        const saveProgressData = (data) => {
            try { localStorage.setItem(STORAGE_KEY_PROGRESS, JSON.stringify(data)); } catch (e) {}
        };

        function ZooSymmetryGame() {
            const [gameMode, setGameMode] = useState('practice');
            const [currentLevelNum, setCurrentLevelNum] = useState(1);
            const [gameState, setGameState] = useState('menu'); 
            const [selectedDifficulty, setSelectedDifficulty] = useState('EASY');
            const [leaderboardTab, setLeaderboardTab] = useState('EASY');
            
            const [leaderboardData, setLeaderboardData] = useState(loadLeaderboardData);
            const [progressData, setProgressData] = useState(loadProgressData);

            const [gridSize, setGridSize] = useState(4);
            const [grid, setGrid] = useState([]);
            const [symmetryType, setSymmetryType] = useState('vertical');
            const [time, setTime] = useState(0); 
            const [score, setScore] = useState(0); 
            const [totalScore, setTotalScore] = useState(0); 
            const [totalTime, setTotalTime] = useState(0); 
            
            const isProcessingWin = useRef(false);

            let themeIndex = 0;
            if (gameMode === 'challenge') {
                themeIndex = 3; 
            } else if (gameMode === 'endless') {
                themeIndex = 4;
            } else {
                themeIndex = selectedDifficulty === 'EASY' ? 0 : selectedDifficulty === 'MEDIUM' ? 1 : 2;
            }
            const currentTheme = THEMES[themeIndex];
            
            let currentConfig = DIFFICULTY_CONFIG[selectedDifficulty];
            if (gameMode === 'challenge') currentConfig = DIFFICULTY_CONFIG['CHALLENGE'];
            if (gameMode === 'endless') currentConfig = DIFFICULTY_CONFIG['ENDLESS'];

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = String(seconds % 60).padStart(2, '0');
                return `${m}:${s}`;
            };

            useEffect(() => {
                let interval;
                if (gameState === 'playing') {
                    interval = setInterval(() => {
                        setTime((prev) => prev + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [gameState]);

            // --- Level Generation Logic ---
            const generateLevel = useCallback(() => {
                let size = 4;
                let sym = 'vertical';
                let targetDots = 2;
                
                // --- ENDLESS MODE LOGIC ---
                if (gameMode === 'endless') {
                    const isRelief = currentLevelNum % 5 === 0 && currentLevelNum % 10 !== 0;
                    const isBoss = currentLevelNum % 10 === 0;
                    
                    if (isRelief) {
                        size = 4;
                        sym = Math.random() > 0.5 ? 'vertical' : 'horizontal';
                        targetDots = 3;
                    } else if (isBoss) {
                        size = 6;
                        const types = ['rotational-180', 'quadruple'];
                        sym = types[Math.floor(Math.random() * types.length)];
                        targetDots = Math.min(6 + Math.floor(currentLevelNum / 20), 10);
                    } else {
                        if (currentLevelNum <= 10) {
                            size = 4;
                            sym = Math.random() > 0.5 ? 'vertical' : 'horizontal';
                            targetDots = Math.min(2 + Math.floor(currentLevelNum/3), 5);
                        } else if (currentLevelNum <= 20) {
                            size = 4;
                            const types = ['vertical', 'horizontal', 'rotational-180'];
                            sym = types[Math.floor(Math.random() * types.length)];
                            targetDots = 4;
                        } else if (currentLevelNum <= 30) {
                            size = Math.random() > 0.5 ? 4 : 6;
                            const types = ['vertical', 'horizontal', 'rotational-180', 'quadruple'];
                            sym = types[Math.floor(Math.random() * types.length)];
                            targetDots = 5;
                        } else {
                            size = 6;
                            const types = ['vertical', 'horizontal', 'rotational-180', 'quadruple'];
                            sym = types[Math.floor(Math.random() * types.length)];
                            targetDots = Math.min(5 + Math.floor((currentLevelNum - 30)/10), 9);
                        }
                    }
                } 
                // --- CHALLENGE & PRACTICE MODES ---
                else if (gameMode === 'challenge') {
                    if (currentLevelNum <= 5) {
                        size = 4;
                        sym = Math.random() > 0.5 ? 'vertical' : 'horizontal';
                        targetDots = 3;
                    } else if (currentLevelNum <= 10) {
                        size = 4;
                        const types = ['vertical', 'horizontal', 'rotational-180'];
                        sym = types[Math.floor(Math.random() * types.length)];
                        targetDots = 4;
                    } else {
                        size = 6;
                        const types = ['vertical', 'horizontal', 'rotational-180', 'quadruple'];
                        sym = types[Math.floor(Math.random() * types.length)];
                        targetDots = 5;
                    }
                } else {
                    const config = DIFFICULTY_CONFIG[selectedDifficulty];
                    size = config.size;
                    
                    if (selectedDifficulty === 'EASY') {
                        if (currentLevelNum <= 10) {
                            sym = 'vertical';
                            if (currentLevelNum <= 3) targetDots = 2;
                            else if (currentLevelNum <= 6) targetDots = 3;
                            else targetDots = 4;
                        } else if (currentLevelNum <= 20) {
                            sym = 'horizontal';
                            if (currentLevelNum <= 13) targetDots = 2;
                            else if (currentLevelNum <= 16) targetDots = 3;
                            else targetDots = 4;
                        } else {
                            sym = Math.random() > 0.5 ? 'vertical' : 'horizontal';
                            if (currentLevelNum <= 25) targetDots = 4;
                            else targetDots = 5;
                        }
                    } else if (selectedDifficulty === 'MEDIUM') {
                        if (currentLevelNum <= 10) {
                            sym = Math.random() > 0.5 ? 'vertical' : 'horizontal';
                            if (currentLevelNum <= 3) targetDots = 3;
                            else if (currentLevelNum <= 6) targetDots = 4;
                            else targetDots = 5;
                        } else if (currentLevelNum <= 20) {
                            sym = 'rotational-180';
                            if (currentLevelNum <= 13) targetDots = 3;
                            else if (currentLevelNum <= 16) targetDots = 4;
                            else targetDots = 5;
                        } else {
                            sym = 'quadruple';
                            if (currentLevelNum <= 23) targetDots = 2;
                            else if (currentLevelNum <= 27) targetDots = 3;
                            else targetDots = 3;
                        }
                    } else if (selectedDifficulty === 'HARD') {
                        size = 6;
                        if (currentLevelNum <= 10) {
                            sym = Math.random() > 0.5 ? 'vertical' : 'horizontal';
                            if (currentLevelNum <= 3) targetDots = 4;
                            else if (currentLevelNum <= 6) targetDots = 5;
                            else targetDots = 6;
                        } else if (currentLevelNum <= 20) {
                            sym = 'rotational-180';
                            if (currentLevelNum <= 13) targetDots = 4;
                            else if (currentLevelNum <= 16) targetDots = 5;
                            else targetDots = 6;
                        } else {
                            const types = ['vertical', 'horizontal', 'rotational-180', 'quadruple'];
                            sym = types[Math.floor(Math.random() * types.length)];
                            if (currentLevelNum <= 25) targetDots = 6;
                            else targetDots = 8;
                            if (sym === 'quadruple') targetDots = Math.min(targetDots, 6);
                        }
                    }
                }
                
                const isAlternate = Math.random() > 0.5;
                setGridSize(size);
                setSymmetryType(sym);
                setTime(0);
                isProcessingWin.current = false;

                const newGrid = Array(size * size).fill(null).map((_, i) => ({
                    id: i,
                    row: Math.floor(i / size),
                    col: i % size,
                    isSource: false,
                    filled: false,
                    locked: false,
                }));

                const isValidSource = (r, c, type, alternate) => {
                    if (type === 'vertical') return alternate ? c >= size / 2 : c < size / 2;
                    if (type === 'horizontal') return alternate ? r >= size / 2 : r < size / 2;
                    if (type === 'rotational-180') return alternate ? r >= size / 2 : r < size / 2;
                    if (type === 'quadruple') return r < size / 2 && c < size / 2;
                    return true;
                };

                let targetFillCount = targetDots;
                if (currentLevelNum > 3 && Math.random() > 0.8) targetFillCount += 1;
                
                if (sym === 'quadruple') {
                     targetFillCount = Math.min(targetFillCount, Math.floor((size * size) / 4) - 1);
                } else {
                     targetFillCount = Math.min(targetFillCount, Math.floor((size * size) / 2) - 1);
                }

                let filledCount = 0;
                let attempts = 0;
                while (filledCount < targetFillCount && attempts < 200) {
                    attempts++;
                    const r = Math.floor(Math.random() * size);
                    const c = Math.floor(Math.random() * size);

                    if (isValidSource(r, c, sym, isAlternate)) {
                        const idx = r * size + c;
                        if (!newGrid[idx].locked) {
                            newGrid[idx].locked = true;
                            newGrid[idx].isSource = true;
                            filledCount++;
                        }
                    }
                }

                setGrid(newGrid);
                setGameState(prev => {
                    if (prev !== 'menu' && prev !== 'practice-select') return 'playing';
                    return prev;
                });
                
            }, [selectedDifficulty, currentLevelNum, gameMode]);

            const startGame = (mode, diffKey = null) => {
                setGameMode(mode);
                if (mode === 'practice') {
                    if (diffKey) {
                        setSelectedDifficulty(diffKey);
                        // Check for save data
                        const saveKey = diffKey; // EASY, MEDIUM, HARD
                        if (progressData[saveKey]) {
                            setCurrentLevelNum(progressData[saveKey].level);
                            setTotalScore(progressData[saveKey].score);
                            setTotalTime(progressData[saveKey].totalTime);
                        } else {
                            setCurrentLevelNum(1);
                            setTotalScore(0);
                            setTotalTime(0);
                        }
                        setGrid([]); 
                        setGameState('playing');
                    } else {
                        setGameState('practice-select');
                    }
                } else if (mode === 'challenge') {
                    setSelectedDifficulty('CHALLENGE');
                    if (progressData['CHALLENGE']) {
                        setCurrentLevelNum(progressData['CHALLENGE'].level);
                        setTotalScore(progressData['CHALLENGE'].score);
                        setTotalTime(progressData['CHALLENGE'].totalTime);
                    } else {
                        setCurrentLevelNum(1);
                        setTotalScore(0);
                        setTotalTime(0);
                    }
                    setGrid([]);
                    setGameState('playing');
                } else if (mode === 'endless') {
                    setSelectedDifficulty('ENDLESS');
                    if (progressData['ENDLESS']) {
                        setCurrentLevelNum(progressData['ENDLESS'].level);
                        setTotalScore(progressData['ENDLESS'].score);
                        setTotalTime(progressData['ENDLESS'].totalTime); 
                    } else {
                        setCurrentLevelNum(1);
                        setTotalScore(0);
                        setTotalTime(0);
                    }
                    setGrid([]);
                    setGameState('playing');
                }
            };

            useEffect(() => {
                if (gameState === 'playing' && grid.length === 0) {
                    generateLevel();
                }
            }, [gameState, grid, generateLevel]);

            const getReflection = (r, c, size, type) => {
                if (type === 'vertical') return [{ r: r, c: size - 1 - c }];
                if (type === 'horizontal') return [{ r: size - 1 - r, c: c }];
                if (type === 'rotational-180') return [{ r: size - 1 - r, c: size - 1 - c }];
                if (type === 'quadruple') {
                    return [
                        { r: r, c: size - 1 - c },           
                        { r: size - 1 - r, c: c },           
                        { r: size - 1 - r, c: size - 1 - c } 
                    ];
                }
                return [];
            };

            const handleCellClick = (idx) => {
                if (gameState !== 'playing' || isProcessingWin.current) return;
                const cell = grid[idx];
                if (cell.locked) return;

                const newGrid = [...grid];
                newGrid[idx].filled = !newGrid[idx].filled;
                setGrid(newGrid);
                checkWinCondition(newGrid);
            };

            const checkWinCondition = (currentGrid) => {
                if (isProcessingWin.current) return;

                const size = gridSize;
                let isComplete = true;

                const idealGrid = Array(size * size).fill(false);
                currentGrid.forEach(cell => {
                    if (cell.locked) {
                        idealGrid[cell.id] = true;
                        const reflections = getReflection(cell.row, cell.col, size, symmetryType);
                        reflections.forEach(ref => {
                            const refIdx = ref.r * size + ref.c;
                            if (refIdx >= 0 && refIdx < idealGrid.length) idealGrid[refIdx] = true;
                        });
                    }
                });

                for (let i = 0; i < size * size; i++) {
                    const isFilled = currentGrid[i].locked || currentGrid[i].filled;
                    if (isFilled !== idealGrid[i]) {
                        isComplete = false;
                        break;
                    }
                }

                if (isComplete) {
                    isProcessingWin.current = true;
                    const baseScore = gameMode === 'challenge' ? 200 : 150;
                    const levelScore = Math.max(baseScore - time * 2, 20);
                    setScore(levelScore);
                    setTotalScore(s => s + levelScore);
                    setTotalTime(t => t + time);
                    setTimeout(() => {
                        setGameState('level-complete');
                    }, 300);
                }
            };

            const saveScoreToLeaderboard = () => {
                const currentModeKey = gameMode === 'challenge' ? 'CHALLENGE' : selectedDifficulty;
                const newRecord = {
                    name: "You",
                    score: totalScore,
                    time: totalTime,
                    date: new Date().toISOString(),
                    avatar: "👤"
                };
                const updatedLeaderboard = {
                    ...leaderboardData,
                    [currentModeKey]: [...leaderboardData[currentModeKey], newRecord]
                        .sort((a, b) => b.score - a.score)
                        .slice(0, 10)
                };
                setLeaderboardData(updatedLeaderboard);
                saveLeaderboardData(updatedLeaderboard);
            };

            const nextLevel = () => {
                // Determine current tracking key
                let trackKey = '';
                if (gameMode === 'endless') trackKey = 'ENDLESS';
                else if (gameMode === 'challenge') trackKey = 'CHALLENGE';
                else trackKey = selectedDifficulty;

                const nextLv = currentLevelNum + 1;
                const maxLevels = gameMode === 'endless' ? 9999 : DIFFICULTY_CONFIG[trackKey].levels;

                // SAVE PROGRESS
                if (currentLevelNum < maxLevels) {
                    const newProgress = {
                        ...progressData,
                        [trackKey]: {
                            level: nextLv,
                            score: totalScore,
                            totalTime: totalTime
                        }
                    };
                    setProgressData(newProgress);
                    saveProgressData(newProgress);

                    setCurrentLevelNum(nextLv);
                    setGrid([]); 
                    setGameState('playing'); 
                } else {
                    // Won Game - Clear progress for this track
                    const newProgress = { ...progressData };
                    delete newProgress[trackKey];
                    setProgressData(newProgress);
                    saveProgressData(newProgress);

                    if (gameMode !== 'endless') saveScoreToLeaderboard();
                    setGameState('won');
                }
            };

            const renderAxis = () => {
                const styleLine = "absolute bg-rose-500 opacity-60 pointer-events-none z-10 shadow-sm";
                const styleDot = "absolute bg-rose-500 rounded-full z-20 pointer-events-none transform -translate-x-1/2 -translate-y-1/2 shadow-md border-2 border-white animate-pulse-dot";
                
                switch (symmetryType) {
                    case 'vertical': return <div className={`${styleLine} left-1/2 top-0 bottom-0 w-1 -ml-0.5`} />;
                    case 'horizontal': return <div className={`${styleLine} top-1/2 left-0 right-0 h-1 -mt-0.5`} />;
                    case 'rotational-180': return <div className={`${styleDot} top-1/2 left-1/2 w-4 h-4`} />;
                    case 'quadruple': return (
                        <>
                            <div className={`${styleLine} left-1/2 top-0 bottom-0 w-1 -ml-0.5`} />
                            <div className={`${styleLine} top-1/2 left-0 right-0 h-1 -mt-0.5`} />
                        </>
                    );
                    default: return null;
                }
            };

            const getLevelDescription = () => {
                if (symmetryType === 'vertical') return "สะท้อนแนวตั้ง";
                if (symmetryType === 'horizontal') return "สะท้อนแนวนอน";
                if (symmetryType === 'rotational-180') return "หมุน 180 องศา";
                if (symmetryType === 'quadruple') return "สะท้อน 4 ทิศ (มุมสู่มุม)";
                return "";
            }

            const MobileWrapper = ({ children }) => (
                <div className="w-full h-screen bg-slate-900 flex items-center justify-center overflow-hidden font-sans select-none p-0 sm:p-4">
                <div className={`
                    relative w-full h-full sm:max-w-[400px] sm:max-h-[850px] sm:aspect-[9/20]
                    bg-white sm:rounded-[2.5rem] sm:border-[8px] sm:border-slate-800 sm:shadow-2xl overflow-hidden
                    flex flex-col
                    ${(gameState === 'playing' || gameState === 'level-complete') ? currentTheme.bg : 'bg-slate-50'} transition-colors duration-500
                `}>
                    {children}
                </div>
                </div>
            );

            // --- Screens ---

            if (gameState === 'menu') {
                const endlessSaved = progressData['ENDLESS'];
                const challengeSaved = progressData['CHALLENGE'];

                return (
                <MobileWrapper>
                    <div className={`flex-1 flex flex-col items-center justify-center p-8 relative overflow-hidden bg-white`}>
                    <div className="absolute top-[-20%] left-[-20%] w-[300px] h-[300px] bg-emerald-300 rounded-full opacity-20 blur-3xl"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[250px] h-[250px] bg-amber-300 rounded-full opacity-20 blur-3xl"></div>

                    <div className="bg-white/80 backdrop-blur-xl p-8 rounded-[2rem] shadow-xl w-full text-center border border-white/50 relative z-10">
                        <div className="mb-6 flex justify-center text-emerald-600">
                        <div className="p-4 bg-emerald-100 rounded-2xl shadow-inner animate-bounce-slow">
                            <AnimalIcons.lion className="w-16 h-16" />
                        </div>
                        </div>
                        <h1 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">ZOO<br/><span className="text-emerald-500">SYMMETRY</span></h1>
                        <p className="text-slate-500 mb-8 font-medium">ฝึกสมองประลองปัญญา</p>
                        
                        <div className="space-y-3">
                            <button 
                                onClick={() => startGame('endless')}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl text-lg shadow-lg shadow-blue-200 transform transition active:scale-95 flex items-center justify-center gap-3 border-b-4 border-blue-800 active:border-b-0 active:mt-1"
                            >
                                {endlessSaved ? <Save size={24} /> : <InfinityIcon size={24} />}
                                <span>{endlessSaved ? `เล่นต่อ (Level ${endlessSaved.level})` : 'โหมดไม่มีที่สิ้นสุด'}</span>
                            </button>

                            <div className="grid grid-cols-2 gap-3">
                                <button 
                                    onClick={() => startGame('practice')}
                                    className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-4 rounded-2xl text-md shadow-lg transform transition active:scale-95 flex flex-col items-center justify-center gap-1 border-b-4 border-emerald-700 active:border-b-0 active:mt-1"
                                >
                                    <BookOpen size={20} fill="currentColor" /> 
                                    <span>โหมดฝึกฝน</span>
                                </button>

                                <button 
                                    onClick={() => startGame('challenge')}
                                    className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-4 rounded-2xl text-md shadow-lg transform transition active:scale-95 flex flex-col items-center justify-center gap-1 border-b-4 border-purple-800 active:border-b-0 active:mt-1"
                                >
                                    {challengeSaved ? <Save size={20} /> : <Swords size={20} />} 
                                    <span>{challengeSaved ? `เล่นต่อ` : 'โหมดทดสอบ'}</span>
                                </button>
                            </div>

                            <button 
                                onClick={() => setGameState('leaderboard')}
                                className="w-full bg-white hover:bg-slate-50 text-slate-700 font-bold py-4 px-6 rounded-2xl text-lg shadow-md border-2 border-slate-100 transform transition active:scale-95 flex items-center justify-center gap-3"
                            >
                                <BarChart2 size={24} /> 
                                <span>อันดับคะแนน</span>
                            </button>
                        </div>
                    </div>
                    <div className="mt-8 text-xs text-slate-400 font-medium">VER 6.1 • GLOBAL AUTO-SAVE</div>
                    </div>
                </MobileWrapper>
                );
            }

            if (gameState === 'practice-select') {
                return (
                    <MobileWrapper>
                        <div className="px-6 py-6 bg-white shadow-sm z-10">
                            <div className="flex items-center gap-3 mb-2">
                                <button onClick={() => setGameState('menu')} className="p-2 hover:bg-slate-100 rounded-full transition"><ArrowLeft size={20} className="text-slate-400"/></button>
                                <h2 className="text-2xl font-black text-slate-800">โหมดฝึกฝน</h2>
                            </div>
                            <p className="text-slate-500 text-sm">เลือกระดับความยากที่คุณต้องการฝึก</p>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
                            {['EASY', 'MEDIUM', 'HARD'].map((key) => {
                                const diff = DIFFICULTY_CONFIG[key];
                                const Icon = diff.icon;
                                const saved = progressData[key];
                                return (
                                    <button 
                                        key={key}
                                        onClick={() => startGame('practice', key)}
                                        className="w-full bg-white p-6 rounded-3xl shadow-sm border-2 border-slate-100 hover:border-emerald-200 transition-all active:scale-95 group text-left relative overflow-hidden"
                                    >
                                        <div className={`absolute top-0 right-0 w-24 h-24 ${diff.color} opacity-10 rounded-bl-full transform translate-x-4 -translate-y-4 group-hover:scale-110 transition`}></div>
                                        <div className="flex items-start justify-between relative z-10">
                                            <div>
                                                <div className={`w-12 h-12 ${diff.color} rounded-2xl flex items-center justify-center text-white mb-3 shadow-md`}>
                                                    <Icon className="w-7 h-7" />
                                                </div>
                                                <h3 className="text-xl font-bold text-slate-800">{diff.label}</h3>
                                                <p className="text-sm text-slate-400 mt-1">{diff.desc}</p>
                                            </div>
                                            <div className="text-right">
                                                {saved ? (
                                                    <div className="flex flex-col items-end">
                                                        <span className="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 mb-1">
                                                            <Save size={10}/> เล่นต่อ
                                                        </span>
                                                        <span className="text-xs text-slate-400">Level {saved.level}</span>
                                                    </div>
                                                ) : (
                                                    <div className="bg-slate-100 px-3 py-1 rounded-full text-xs font-bold text-slate-500">
                                                        {diff.levels} ด่าน
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </button>
                                )
                            })}
                        </div>
                    </MobileWrapper>
                )
            }

            if (gameState === 'leaderboard') {
                const currentDiffConfig = DIFFICULTY_CONFIG[leaderboardTab];
                const leaderboardList = leaderboardData[leaderboardTab];
                
                const showUserCurrentScore = (totalScore > 0) && (
                    (gameMode === 'challenge' && leaderboardTab === 'CHALLENGE') ||
                    (gameMode === 'practice' && leaderboardTab === selectedDifficulty)
                );

                return (
                    <MobileWrapper>
                    <div className="px-6 py-6 bg-white shadow-sm z-10 sticky top-0">
                        <div className="flex items-center gap-3 mb-4">
                            <button onClick={() => setGameState('menu')} className="p-2 hover:bg-slate-100 rounded-full transition"><ArrowLeft size={20} className="text-slate-400"/></button>
                            <h2 className="text-2xl font-black text-slate-800">Leaderboard</h2>
                        </div>
                        
                        <div className="flex gap-2 p-1 bg-slate-100 rounded-xl overflow-x-auto">
                            {['EASY', 'MEDIUM', 'HARD', 'CHALLENGE'].map((key) => {
                                const cfg = DIFFICULTY_CONFIG[key];
                                return (
                                    <button
                                        key={key}
                                        onClick={() => setLeaderboardTab(key)}
                                        className={`flex-1 py-2 px-3 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${
                                        leaderboardTab === key 
                                            ? `bg-white ${cfg.text} shadow-sm` 
                                            : 'text-slate-400 hover:text-slate-600'
                                        }`}
                                    >
                                        {cfg.label}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-6 bg-slate-50">
                        
                        {showUserCurrentScore && (
                            <div className={`${currentDiffConfig.color} text-white p-6 rounded-3xl shadow-lg mb-6 relative overflow-hidden transition-colors duration-300`}>
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl transform translate-x-10 -translate-y-10"></div>
                                <div className="relative z-10 flex justify-between items-center px-2">
                                    <div className="text-left">
                                    <div className="opacity-80 font-bold uppercase tracking-wider text-xs mb-1">คะแนนล่าสุดของคุณ</div>
                                    <div className="text-3xl font-black">{totalScore}</div>
                                    </div>
                                    <div className="text-right">
                                    <div className="opacity-80 font-bold uppercase tracking-wider text-xs mb-1">เวลารวม</div>
                                    <div className="text-3xl font-black font-mono">{formatTime(totalTime)}</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="space-y-3 pb-8">
                            {leaderboardList.length > 0 ? (
                                <>
                                <div className="grid grid-cols-[3rem_3rem_1fr_4rem_4rem] gap-1 px-2 text-xs font-bold text-slate-400 uppercase">
                                    <div className="text-center">#</div>
                                    <div className="text-center"></div>
                                    <div>Player</div>
                                    <div className="text-right">Time</div>
                                    <div className="text-right">Score</div>
                                </div>
                                {leaderboardList.map((player, index) => (
                                    <div key={index} className="flex items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border border-slate-100 animate-pop-in" style={{animationDelay: `${index * 0.1}s`}}>
                                        <div className={`w-8 h-8 flex items-center justify-center font-bold rounded-full ${index < 3 ? `${currentDiffConfig.bgLight} ${currentDiffConfig.text}` : 'bg-slate-100 text-slate-400'}`}>
                                            {index + 1}
                                        </div>
                                        <div className="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-xl shrink-0">
                                            {player.avatar}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-slate-700 truncate">{player.name}</div>
                                            <div className="text-[10px] text-slate-400 text-xs">{new Date(player.date).toLocaleDateString()}</div>
                                        </div>
                                        <div className="font-mono text-sm text-slate-500 whitespace-nowrap">
                                            <Clock size={10} className="inline mr-1 opacity-50"/>
                                            {formatTime(player.time)}
                                        </div>
                                        <div className={`font-mono font-bold w-16 text-right ${currentDiffConfig.text}`}>
                                            {player.score.toLocaleString()}
                                        </div>
                                    </div>
                                ))}
                                </>
                            ) : (
                                <div className="text-center py-10 text-slate-400">
                                    <div className="text-5xl mb-4 opacity-20">🏆</div>
                                    <p className="text-sm font-medium">ยังไม่มีประวัติคะแนนในระดับ {currentDiffConfig.label}</p>
                                </div>
                            )}
                        </div>
                    </div>
                    </MobileWrapper>
                )
            }

            if (gameState === 'won') {
                return (
                <MobileWrapper>
                    <div className="flex-1 flex flex-col items-center justify-center p-6 relative">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full text-center animate-bounce-slow border-4 border-amber-100">
                        <Trophy className="w-24 h-24 text-amber-500 mx-auto mb-6 drop-shadow-md" strokeWidth={1.5} />
                        <h2 className="text-3xl font-black text-slate-800 mb-2">COMPLETE!</h2>
                        <p className="text-slate-600 mb-8 font-medium">คุณพิชิตระดับ {currentConfig.label} แล้ว!</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-50 p-3 rounded-2xl">
                                <div className="text-xs text-slate-400 font-bold uppercase">Total Time</div>
                                <div className="text-2xl font-black text-slate-700 font-mono">{formatTime(totalTime)}</div>
                            </div>
                            <div className="bg-slate-50 p-3 rounded-2xl">
                                <div className="text-xs text-slate-400 font-bold uppercase">Total Score</div>
                                <div className="text-2xl font-black text-amber-600">{totalScore}</div>
                            </div>
                        </div>

                        <div className="space-y-3">
                            <button 
                            onClick={() => setGameState('menu')}
                            className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-lg border-b-4 border-slate-950 active:border-b-0 active:translate-y-1 transition-all"
                            >
                            กลับสู่เมนูหลัก
                            </button>
                            <button 
                            onClick={() => {
                                setLeaderboardTab(gameMode === 'challenge' ? 'CHALLENGE' : selectedDifficulty);
                                setGameState('leaderboard');
                            }}
                            className="w-full bg-white text-slate-600 font-bold py-4 rounded-2xl shadow-md border border-slate-200"
                            >
                            ดูอันดับคะแนน
                            </button>
                        </div>
                    </div>
                    </div>
                </MobileWrapper>
                );
            }

            // --- Playing State ---

            return (
                <MobileWrapper>
                {/* Top Header Bar */}
                <div className={`px-5 py-4 flex justify-between items-center ${currentTheme.header} text-white shadow-lg z-20 rounded-b-[2rem]`}>
                    <div className="flex items-center gap-3">
                        <div onClick={() => setGameState('menu')} className="bg-white/20 p-2 rounded-xl backdrop-blur-sm cursor-pointer hover:bg-white/30 transition">
                            <Home size={20} />
                        </div>
                        <div>
                            <div className="text-[10px] font-bold opacity-80 uppercase tracking-widest">{currentConfig.label} {gameMode === 'endless' ? `LEVEL ${currentLevelNum}` : `${currentLevelNum}/${currentConfig.levels}`}</div>
                            <div className="text-lg font-black leading-tight truncate w-32">{getLevelDescription()}</div>
                        </div>
                    </div>
                    <div className="flex items-center gap-2 bg-black/20 px-3 py-1.5 rounded-full backdrop-blur-md border border-white/10">
                        <Clock size={16} className="text-white/80" />
                        <span className="font-mono font-bold text-white tracking-wide">
                            {formatTime(time)}
                        </span>
                    </div>
                </div>

                {/* Main Game Area */}
                <div className="flex-1 flex flex-col items-center justify-center p-4 w-full max-w-md mx-auto relative">
                    
                    {/* Helper Text Pill */}
                    <div className="mb-6 px-4 py-2 rounded-full bg-white/60 backdrop-blur-md shadow-sm border border-white/50 text-sm font-bold text-slate-600 flex items-center gap-2">
                        {symmetryType === 'rotational-180' ? <RefreshCw size={14}/> : (symmetryType === 'quadruple' ? <Grid4 size={14} /> : <div className="w-2 h-2 rounded-full bg-rose-500"></div>)}
                        <span>
                        {symmetryType === 'vertical' && "สะท้อนแนวตั้ง (ซ้าย ↔ ขวา)"}
                        {symmetryType === 'horizontal' && "สะท้อนแนวนอน (บน ↔ ล่าง)"}
                        {symmetryType === 'rotational-180' && "หมุน 180° รอบจุดกึ่งกลาง (ตรงข้าม)"}
                        {symmetryType === 'quadruple' && "สะท้อน 4 ทิศ (มุมสู่มุม)"}
                        </span>
                    </div>

                    {/* Grid Container */}
                    <div className="relative bg-white p-3 rounded-[2rem] shadow-2xl border-4 border-white">
                    {renderAxis()}
                    
                    <div 
                        className="grid gap-2"
                        style={{
                        gridTemplateColumns: `repeat(${gridSize}, minmax(0, 1fr))`,
                        width: 'min(80vw, 340px)', // Adjusted width for mobile ratio
                        height: 'min(80vw, 340px)',
                        }}
                    >
                        {grid.map((cell) => {
                        const isFilled = cell.locked || cell.filled;
                        return (
                            <button
                            key={cell.id}
                            onClick={() => handleCellClick(cell.id)}
                            disabled={cell.locked}
                            className={`
                                relative rounded-xl transition-all duration-200 transform
                                flex items-center justify-center
                                ${isFilled 
                                    ? (cell.locked 
                                        ? 'bg-slate-300 scale-95 shadow-inner' // Source cells
                                        : `${currentTheme.active} scale-100 shadow-[0_4px_0_0_rgba(0,0,0,0.15)]` // User cells
                                    ) 
                                    : 'bg-slate-100 hover:bg-slate-200 active:scale-95'
                                }
                            `}
                            >
                            {isFilled && !cell.locked && (
                                <div className="w-3 h-3 bg-white/30 rounded-full"></div>
                            )}
                            </button>
                        );
                        })}
                    </div>
                    </div>
                </div>

                {/* Bottom Controls */}
                <div className="p-6 pb-8 flex justify-center w-full bg-gradient-to-t from-white/50 to-transparent">
                    <button 
                        onClick={generateLevel} 
                        className="flex items-center gap-2 px-6 py-4 bg-white text-slate-600 font-bold rounded-2xl shadow-lg border-2 border-slate-100 hover:bg-slate-50 transition active:scale-95 w-full justify-center max-w-[200px]"
                    >
                    <RotateCcw size={20} /> 
                    <span>รีเซ็ตกระดาน</span>
                    </button>
                </div>

                {/* Level Complete Modal */}
                {gameState === 'level-complete' && (
                    <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6">
                    <div className="bg-white rounded-[2.5rem] p-8 w-full shadow-2xl animate-pop-in text-center border-4 border-white/20">
                        <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 shadow-inner">
                            <CheckCircle size={48} fill="currentColor" className="text-white"/>
                        </div>
                        <h2 className="text-3xl font-black text-slate-800 mb-1">Excellent!</h2>
                        <p className="text-slate-400 font-medium mb-8">Level {currentLevelNum} Complete</p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-50 p-3 rounded-2xl">
                                <div className="text-xs text-slate-400 font-bold uppercase">Time</div>
                                <div className="text-xl font-black text-slate-700">{formatTime(time)}</div>
                            </div>
                            <div className="bg-slate-50 p-3 rounded-2xl">
                                <div className="text-xs text-slate-400 font-bold uppercase">Score</div>
                                <div className="text-xl font-black text-slate-700">+{score}</div>
                            </div>
                        </div>

                        <button 
                            onClick={nextLevel}
                            className={`w-full ${currentTheme.active} text-white font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 hover:brightness-110 transition border-b-4 border-black/20 active:border-b-0 active:translate-y-1`}
                        >
                            <span>ด่านต่อไป</span> <ArrowRight size={24} />
                        </button>
                    </div>
                    </div>
                )}
                </MobileWrapper>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ZooSymmetryGame />);
    </script>
</body>
</html>
