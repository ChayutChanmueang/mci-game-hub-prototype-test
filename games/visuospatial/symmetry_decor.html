<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symmetry Decor Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        :root {
            --bg-color: #2b303b;
            --primary: #4fc3f7;
            --accent: #ffb74d;
            --text: #ffffff;
            --panel-bg: rgba(30, 40, 50, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            background: linear-gradient(135deg, #263238 0%, #37474f 100%);
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 50vh; 
            background-color: var(--bg-color);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-aspect-ratio: 9/18) {
             #game-container {
                height: 95vh;
                width: calc(95vh * 9 / 18);
                border-radius: 20px;
                border: 8px solid #263238;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* UI Overlays */
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--panel-bg);
            z-index: 10;
            transition: opacity 0.3s;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        
        .screen h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .screen p {
            font-size: 1.4rem;
            color: #ccc;
            margin-bottom: 10px;
        }

        /* Main Menu */
        .title-logo {
            font-size: 4rem; /* Increased size */
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.6);
            line-height: 1.1;
        }
        
        .menu-btn {
            background: linear-gradient(to right, #2980b9, #3498db);
            color: white;
            border: none;
            padding: 18px 0; /* Larger padding */
            width: 90%; /* Wider button */
            font-size: 1.5rem; /* Larger font */
            border-radius: 50px;
            cursor: pointer;
            margin: 12px 0; /* More spacing */
            font-family: 'Kanit', sans-serif;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            font-weight: 600;
        }

        .menu-btn:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        .btn-easy { background: linear-gradient(to right, #27ae60, #2ecc71); }
        .btn-medium { background: linear-gradient(to right, #f39c12, #f1c40f); color: #333; }
        .btn-hard { background: linear-gradient(to right, #c0392b, #e74c3c); }
        .btn-free { background: linear-gradient(to right, #8e44ad, #9b59b6); }
        .btn-assess { background: linear-gradient(to right, #607d8b, #78909c); border: 2px solid #b0bec5; margin-bottom: 20px; }

        /* HUD */
        .hud-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            pointer-events: none;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
            margin-bottom: 15px;
        }

        .stat-box { font-size: 1.2rem; color: #ddd; display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .stat-val { font-size: 1.6rem; font-weight: bold; color: var(--primary); margin-top: 2px; }

        .mission-box {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.3rem; /* Larger text */
            color: #ffe0b2;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .back-btn {
            pointer-events: auto;
            background: rgba(255,255,255,0.25);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-right: 10px;
            font-weight: 600;
        }

        /* Leaderboard Table */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 1.2rem; /* Larger table text */
        }
        .leaderboard-table th { background: rgba(255,255,255,0.15); padding: 12px; text-align: left; color: var(--accent); }
        .leaderboard-table td { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px; }
        .leaderboard-row:nth-child(1) td { color: #ffd700; font-weight: bold; font-size: 1.3rem; } /* Gold */
        .leaderboard-row:nth-child(2) td { color: #c0c0c0; } /* Silver */
        .leaderboard-row:nth-child(3) td { color: #cd7f32; } /* Bronze */

        /* Modal Content */
        .win-score { font-size: 5rem; color: var(--success); margin: 15px 0; font-weight: bold; text-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .win-time { font-size: 1.8rem; color: #eee; margin-bottom: 20px; }
        .assessment-badge {
            font-size: 2rem; color: var(--accent); 
            border: 3px solid var(--accent); padding: 20px; 
            border-radius: 20px; margin: 30px 0;
            background: rgba(255, 183, 77, 0.15);
            font-weight: bold;
            width: 80%;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD (Visible during gameplay) -->
        <div id="hud" class="ui-layer hud-layer hidden">
            <div class="top-bar">
                <button class="back-btn" onclick="goToMenu()">🏠 MENU</button>
                <div class="stat-box">TIME<span id="time-display" class="stat-val">00:00</span></div>
                <div class="stat-box">SCORE<span id="score-display" class="stat-val">0</span></div>
            </div>
            <div class="mission-box" id="mission-display">
                Mission Text
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <div class="title-logo">Symmetry<br>Decor</div>
            <p style="font-size: 1.3rem; margin-bottom: 30px;">ฝึกสมองประลองปัญญา</p>
            
            <button class="menu-btn btn-assess" onclick="selectDifficulty('Assessment')">📋 โหมดทดสอบ (Assessment)</button>
            <button class="menu-btn btn-easy" onclick="selectDifficulty('Easy')">🟢 ระดับง่าย (Easy)</button>
            <button class="menu-btn btn-medium" onclick="selectDifficulty('Medium')">🟡 ระดับกลาง (Medium)</button>
            <button class="menu-btn btn-hard" onclick="selectDifficulty('Hard')">🔴 ระดับยาก (Hard)</button>
            <button class="menu-btn btn-free" onclick="selectDifficulty('Free')">🟣 โหมดอิสระ (Free)</button>
            
            <button class="menu-btn" style="background: transparent; border: 2px solid #666; margin-top: 20px; font-size: 1.2rem; padding: 12px 0;" onclick="showLeaderboard()">🏆 อันดับคะแนน</button>
        </div>

        <!-- Level Complete Modal (General) -->
        <div id="level-complete" class="screen hidden">
            <h2 style="color: var(--success); font-size: 3.5rem;">ผ่านด่าน!</h2>
            <div class="win-score" id="level-score">+100</div>
            <p class="win-time">เวลาที่ใช้: <span id="level-time">00:15</span></p>
            <button class="menu-btn btn-easy" onclick="nextLevel()">ด่านถัดไป ➡</button>
            <button class="menu-btn" style="background: transparent; border: 2px solid #777;" onclick="goToMenu()">กลับเมนูหลัก</button>
        </div>

        <!-- Assessment Complete Modal -->
        <div id="assessment-complete" class="screen hidden">
            <h2 style="color: var(--primary);">ผลการทดสอบ</h2>
            <p>คุณทำครบ 10 ด่านแล้ว!</p>
            <div class="win-time">เวลารวม: <span id="total-assess-time" style="color: white; font-weight: bold;"></span></div>
            <div style="margin-top: 20px; font-size: 1.3rem; color: #bbb;">ระดับความสามารถของคุณคือ:</div>
            <div class="assessment-badge" id="skill-result">Intermediate</div>
            <button class="menu-btn" onclick="goToMenu()">กลับเมนูหลัก</button>
        </div>

        <!-- Leaderboard Screen -->
        <div id="leaderboard-screen" class="screen hidden">
            <h2>🏆 Leaderboard</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="back-btn" onclick="renderLeaderboard('Easy')">Easy</button>
                <button class="back-btn" onclick="renderLeaderboard('Medium')">Med</button>
                <button class="back-btn" onclick="renderLeaderboard('Hard')">Hard</button>
                <button class="back-btn" onclick="renderLeaderboard('Assessment')">Test</button>
            </div>
            <div style="width: 100%; max-height: 400px; overflow-y: auto;">
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Score/Result</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
            <button class="menu-btn" style="margin-top: 20px;" onclick="goToMenu()">กลับ</button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        // --- Game State ---
        let gameState = 'MENU'; // MENU, PLAYING, END
        let difficulty = 'Easy';
        let level = 1;
        let score = 0;
        let startTime = 0;
        let timerInterval = null;
        let elapsedSeconds = 0;
        let totalAssessmentTime = 0; // Cumulative time for assessment mode

        // --- Grid & Physics ---
        let rows = 4, cols = 4;
        let cellSize, gridX, gridY, gridWidth, gridHeight;
        let fixedItems = [], playItems = [];
        let isDragging = false, dragItem = null;
        let originalGridPos = { r: 0, c: 0 };
        let currentSymmetryMode = 'L-R'; 

        // --- Assets ---
        const colors = ['#e57373', '#64b5f6', '#ffd54f', '#ba68c8', '#4db6ac', '#ff8a65']; 
        const shapes = ['vase', 'photo', 'bottle', 'doll', 'plant', 'clock'];

        // --- Resize ---
        function resize() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            calculateGrid();
            draw();
        }
        window.addEventListener('resize', resize);

        // --- Modes & Config ---
        function getDifficultyConfig(diff, lvl) {
            let config = { rows: 4, cols: 4, modes: ['L-R', 'T-B'] };
            
            if (diff === 'Easy') {
                config.rows = 4; config.cols = 4;
                config.modes = ['L-R', 'T-B'];
            } 
            else if (diff === 'Medium') {
                if (lvl % 2 !== 0) { config.rows = 4; config.cols = 4; }
                else { config.rows = 6; config.cols = 6; }
                config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT'];
            } 
            else if (diff === 'Hard') {
                const cycle = lvl % 3;
                if (cycle === 1) { config.rows = 4; config.cols = 4; }
                else if (cycle === 2) { config.rows = 6; config.cols = 6; }
                else { config.rows = 8; config.cols = 6; }

                if (config.rows === config.cols) {
                    // Added FOUR_WAY to Hard modes
                    config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT', 'DIAGONAL', 'FOUR_WAY'];
                } else {
                    // FOUR_WAY requires even grid splits, which 6x8 supports (3x4 quadrants)
                    // We allow it here too
                    config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT', 'FOUR_WAY'];
                }
            }
            else if (diff === 'Free') {
                const r = Math.random();
                if (r < 0.33) { config.rows = 4; config.cols = 4; }
                else if (r < 0.66) { config.rows = 6; config.cols = 6; }
                else { config.rows = 8; config.cols = 6; }

                if (config.rows === config.cols) {
                    config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT', 'DIAGONAL', 'FOUR_WAY'];
                } else {
                    config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT', 'FOUR_WAY'];
                }
            }
            else if (diff === 'Assessment') {
                // Fixed progression
                switch(lvl) {
                    case 1: config = { rows: 4, cols: 4, modes: ['L-R'] }; break;
                    case 2: config = { rows: 4, cols: 4, modes: ['T-B'] }; break;
                    case 3: config = { rows: 4, cols: 4, modes: ['R-L'] }; break;
                    case 4: config = { rows: 6, cols: 6, modes: ['L-R'] }; break;
                    case 5: config = { rows: 6, cols: 6, modes: ['B-T'] }; break;
                    case 6: config = { rows: 6, cols: 6, modes: ['QUADRANT'] }; break;
                    case 7: config = { rows: 4, cols: 4, modes: ['DIAGONAL'] }; break;
                    case 8: config = { rows: 6, cols: 6, modes: ['FOUR_WAY'] }; break; // Hard mechanic test
                    case 9: config = { rows: 8, cols: 6, modes: ['T-B'] }; break;
                    case 10: config = { rows: 6, cols: 6, modes: ['DIAGONAL'] }; break;
                }
            }
            return config;
        }

        // --- Main Functions ---

        function goToMenu() {
            stopTimer();
            gameState = 'MENU';
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('level-complete').classList.add('hidden');
            document.getElementById('assessment-complete').classList.add('hidden');
            document.getElementById('leaderboard-screen').classList.add('hidden');
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }

        function selectDifficulty(diff) {
            difficulty = diff;
            level = 1;
            score = 0;
            elapsedSeconds = 0;
            totalAssessmentTime = 0;
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            startLevel();
        }

        function startLevel() {
            gameState = 'PLAYING';
            const config = getDifficultyConfig(difficulty, level);
            rows = config.rows;
            cols = config.cols;
            
            currentSymmetryMode = config.modes[Math.floor(Math.random() * config.modes.length)];
            
            generateLevelItems();
            resize(); 
            updateHUD();
            startTimer();
        }

        function nextLevel() {
            document.getElementById('level-complete').classList.add('hidden');
            level++;
            startLevel();
        }

        function startTimer() {
            stopTimer();
            elapsedSeconds = 0; // Reset for each level
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const now = Date.now();
                const totalSeconds = elapsedSeconds + Math.floor((now - startTime) / 1000);
                const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('time-display').innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                const now = Date.now();
                elapsedSeconds += Math.floor((now - startTime) / 1000);
            }
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- Logic: Grid & Item Generation ---

        function calculateGrid() {
            const margin = canvas.width * 0.05;
            gridWidth = canvas.width - (margin * 2);
            const maxHeight = canvas.height * 0.65;
            
            cellSize = gridWidth / cols;
            gridHeight = cellSize * rows;

            if (gridHeight > maxHeight) {
                gridHeight = maxHeight;
                cellSize = gridHeight / rows;
                gridWidth = cellSize * cols;
            }
            
            gridX = (canvas.width - gridWidth) / 2;
            gridY = (canvas.height - gridHeight) / 2 + 60; // Increased Offset for larger HUD
        }

        function generateLevelItems() {
            fixedItems = [];
            playItems = [];
            
            let fixedZone, playZone;
            const halfR = Math.floor(rows/2);
            const halfC = Math.floor(cols/2);

            if (currentSymmetryMode === 'L-R') {
                fixedZone = { r1:0, r2:rows-1, c1:0, c2:halfC-1 };
                playZone = { r1:0, r2:rows-1, c1:halfC, c2:cols-1 };
            } else if (currentSymmetryMode === 'R-L') {
                fixedZone = { r1:0, r2:rows-1, c1:halfC, c2:cols-1 };
                playZone = { r1:0, r2:rows-1, c1:0, c2:halfC-1 };
            } else if (currentSymmetryMode === 'T-B') {
                fixedZone = { r1:0, r2:halfR-1, c1:0, c2:cols-1 };
                playZone = { r1:halfR, r2:rows-1, c1:0, c2:cols-1 };
            } else if (currentSymmetryMode === 'B-T') {
                fixedZone = { r1:halfR, r2:rows-1, c1:0, c2:cols-1 };
                playZone = { r1:0, r2:halfR-1, c1:0, c2:cols-1 };
            } else if (currentSymmetryMode === 'QUADRANT') {
                fixedZone = { r1:0, r2:halfR-1, c1:0, c2:halfC-1 };
                playZone = { r1:halfR, r2:rows-1, c1:halfC, c2:cols-1 };
            } else if (currentSymmetryMode === 'DIAGONAL') {
                fixedZone = null; // Calculated dynamically
            } else if (currentSymmetryMode === 'FOUR_WAY') {
                // Four way reflection: Source is Top-Left Quadrant
                // Targets are other 3 quadrants.
                fixedZone = { r1:0, r2:halfR-1, c1:0, c2:halfC-1 };
                // playZone covers the whole grid, but validation checks specific quadrants
                playZone = { r1:0, r2:rows-1, c1:0, c2:cols-1 }; 
            }

            let itemCount = Math.min(3 + Math.floor(level/2), 8);
            if (difficulty === 'Easy') itemCount = 3;
            if (difficulty === 'Free') itemCount = Math.floor(Math.random() * 4) + 3;
            if (currentSymmetryMode === 'FOUR_WAY') {
                // Reduce item count for 4-way because user has to place 3x items
                itemCount = Math.max(1, Math.floor(itemCount / 3) + 1); 
            }

            let usedKeys = new Set();
            
            for(let i=0; i<itemCount; i++) {
                let r, c;
                let safety = 0;
                do {
                    if (currentSymmetryMode === 'DIAGONAL') {
                        r = Math.floor(Math.random() * rows);
                        c = Math.floor(Math.random() * cols);
                        if (c <= r) c = r + 1 + Math.floor(Math.random()*(cols-r-1)); 
                        if (c >= cols) c = cols-1;
                    } 
                    else if (fixedZone) {
                        r = Math.floor(Math.random() * (fixedZone.r2 - fixedZone.r1 + 1)) + fixedZone.r1;
                        c = Math.floor(Math.random() * (fixedZone.c2 - fixedZone.c1 + 1)) + fixedZone.c1;
                    }
                    safety++;
                } while (usedKeys.has(`${r},${c}`) && safety < 100);
                
                usedKeys.add(`${r},${c}`);
                
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                fixedItems.push({ id:i, r, c, shape, color });

                // Create Play Items
                if (currentSymmetryMode === 'FOUR_WAY') {
                    // Create 3 Play items for this 1 Fixed item
                    // User must place them in TR, BL, BR
                    for(let k=0; k<3; k++) {
                        playItems.push({ id:i, r:-1, c:-1, shape, color, x:0, y:0, subId: k });
                    }
                } else {
                    playItems.push({ id:i, r:-1, c:-1, shape, color, x:0, y:0 }); 
                }
            }

            let playKeys = new Set();
            playItems.forEach(item => {
                let r, c;
                let safety = 0;
                do {
                    if (currentSymmetryMode === 'DIAGONAL') {
                        r = Math.floor(Math.random() * rows);
                        c = Math.floor(Math.random() * cols);
                        if (c >= r) { // Swap to lower triangle
                            let temp = c; c = r; r = temp;
                            if (c===r && c>0) c--;
                        }
                    } 
                    else if (currentSymmetryMode === 'FOUR_WAY') {
                        // Place randomly anywhere except source quadrant
                        r = Math.floor(Math.random() * rows);
                        c = Math.floor(Math.random() * cols);
                        // If falls in TL quadrant (source), retry
                        if (r < halfR && c < halfC) {
                            r = halfR + Math.floor(Math.random() * halfR); // Force Move out
                        }
                    }
                    else if (playZone) {
                        r = Math.floor(Math.random() * (playZone.r2 - playZone.r1 + 1)) + playZone.r1;
                        c = Math.floor(Math.random() * (playZone.c2 - playZone.c1 + 1)) + playZone.c1;
                    }
                    safety++;
                } while (playKeys.has(`${r},${c}`) && safety < 100);
                
                playKeys.add(`${r},${c}`);
                item.r = r;
                item.c = c;
            });
            
            calculateGrid();
            playItems.forEach(updateItemPos);
        }

        function updateItemPos(item) {
            const center = getCellCenter(item.r, item.c);
            item.x = center.x;
            item.y = center.y;
        }

        function checkWin() {
            let correct = 0;

            if (currentSymmetryMode === 'FOUR_WAY') {
                // Special check for 4-way
                // For each fixed item, we need 3 play items in specific spots:
                // 1. TR (H-Reflect)
                // 2. BL (V-Reflect)
                // 3. BR (Diag/Point-Reflect)
                
                let allItemsCorrect = true;

                for (let f of fixedItems) {
                    const tr_c = (cols - 1) - f.c; const tr_r = f.r;
                    const bl_c = f.c;              const bl_r = (rows - 1) - f.r;
                    const br_c = (cols - 1) - f.c; const br_r = (rows - 1) - f.r;

                    // Filter play items that match this fixed item's ID (we generated 3 per ID)
                    // Note: shape/color check is redundant if we check ID, but safe.
                    const myPlayItems = playItems.filter(p => p.id === f.id);
                    
                    // Check if *any* of these play items occupy the required spots
                    const hasTR = myPlayItems.some(p => p.r === tr_r && p.c === tr_c);
                    const hasBL = myPlayItems.some(p => p.r === bl_r && p.c === bl_c);
                    const hasBR = myPlayItems.some(p => p.r === br_r && p.c === br_c);

                    if (!hasTR || !hasBL || !hasBR) {
                        allItemsCorrect = false;
                        break;
                    }
                }
                
                if (allItemsCorrect) correct = fixedItems.length; // Logic wrapper to trigger win below

            } else {
                // Standard 1-to-1 Logic
                fixedItems.forEach(f => {
                    const p = playItems.find(x => x.id === f.id);
                    if (isSymmetric(f.r, f.c, p.r, p.c)) correct++;
                });
            }

            if (correct === fixedItems.length) {
                stopTimer();
                
                if (difficulty === 'Assessment') {
                    totalAssessmentTime += elapsedSeconds;
                    if (level === 10) {
                        showAssessmentResult();
                        saveLeaderboard('Assessment', "Complete", totalAssessmentTime);
                    } else {
                        document.getElementById('level-score').innerText = `ผ่านด่าน ${level}`;
                        document.getElementById('level-time').innerText = formatTime(elapsedSeconds);
                        document.getElementById('level-complete').classList.remove('hidden');
                    }
                } else {
                    const timePenalty = Math.floor(elapsedSeconds);
                    const levelBonus = (rows * cols);
                    const roundScore = Math.max(10, 200 + levelBonus - (timePenalty * 2));
                    score += roundScore;

                    if (difficulty !== 'Free') {
                         saveLeaderboard(difficulty, score, elapsedSeconds); 
                    }
                   
                    document.getElementById('level-score').innerText = `+${roundScore}`;
                    document.getElementById('level-time').innerText = formatTime(elapsedSeconds);
                    document.getElementById('level-complete').classList.remove('hidden');
                }
            }
        }
        
        function showAssessmentResult() {
            document.getElementById('assessment-complete').classList.remove('hidden');
            document.getElementById('total-assess-time').innerText = formatTime(totalAssessmentTime);
            
            const skillBox = document.getElementById('skill-result');
            if (totalAssessmentTime < 120) { 
                skillBox.innerText = "ระดับ: เชี่ยวชาญ (Hard/Expert)";
                skillBox.style.color = "#ef5350";
                skillBox.style.borderColor = "#ef5350";
            } else if (totalAssessmentTime < 240) {
                skillBox.innerText = "ระดับ: ปานกลาง (Medium)";
                skillBox.style.color = "#ffb74d";
                skillBox.style.borderColor = "#ffb74d";
            } else {
                skillBox.innerText = "ระดับ: เริ่มต้น (Easy)";
                skillBox.style.color = "#66bb6a";
                skillBox.style.borderColor = "#66bb6a";
            }
        }

        function isSymmetric(fr, fc, pr, pc) {
            if (currentSymmetryMode === 'L-R' || currentSymmetryMode === 'R-L') {
                return fr === pr && pc === (cols - 1) - fc;
            }
            if (currentSymmetryMode === 'T-B' || currentSymmetryMode === 'B-T') {
                return fc === pc && pr === (rows - 1) - fr;
            }
            if (currentSymmetryMode === 'QUADRANT') {
                return pr === (rows - 1) - fr && pc === (cols - 1) - fc;
            }
            if (currentSymmetryMode === 'DIAGONAL') {
                return pr === fc && pc === fr;
            }
            return false;
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = (difficulty === 'Assessment') ? '-' : score;
            const mBox = document.getElementById('mission-display');
            
            let txt = "สะท้อนแบบ ";
            if (currentSymmetryMode === 'L-R') txt += "ซ้าย ⮕ ขวา";
            if (currentSymmetryMode === 'R-L') txt += "ขวา ⮕ ซ้าย";
            if (currentSymmetryMode === 'T-B') txt += "บน ⬇ ล่าง";
            if (currentSymmetryMode === 'B-T') txt += "ล่าง ⬆ บน";
            if (currentSymmetryMode === 'QUADRANT') txt += "จุดศูนย์กลาง (มุมชนมุม)";
            if (currentSymmetryMode === 'DIAGONAL') txt += "แนวทแยง (มุมฉาก)";
            if (currentSymmetryMode === 'FOUR_WAY') txt += "4 ทิศ (กระจก 4 ด้าน)";
            
            mBox.innerText = `Level ${level}: ${txt}`;
        }

        // --- Leaderboard System ---
        function saveLeaderboard(diff, resultVal, timeSecs) {
            const key = `sym_lb_${diff}`;
            let data = JSON.parse(localStorage.getItem(key) || '[]');
            data.push({ score: resultVal, time: timeSecs, date: Date.now() });
            
            if (diff === 'Assessment') {
                data.sort((a, b) => a.time - b.time); 
            } else {
                data.sort((a, b) => b.score - a.score); 
            }
            
            data = data.slice(0, 10); 
            localStorage.setItem(key, JSON.stringify(data));
        }

        function showLeaderboard() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('leaderboard-screen').classList.remove('hidden');
            renderLeaderboard('Easy');
        }

        function renderLeaderboard(diff) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            const key = `sym_lb_${diff}`;
            const data = JSON.parse(localStorage.getItem(key) || '[]');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">ยังไม่มีข้อมูล</td></tr>';
                return;
            }

            data.forEach((entry, idx) => {
                const tr = document.createElement('tr');
                tr.className = 'leaderboard-row';
                let valDisplay = entry.score;
                if (diff === 'Assessment') valDisplay = 'Pass'; 
                
                tr.innerHTML = `<td>${idx+1}</td><td>${valDisplay}</td><td>${formatTime(entry.time)}</td>`;
                tbody.appendChild(tr);
            });
        }

        // --- Drawing ---

        function draw() {
            if (gameState !== 'PLAYING') return;
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawGridPanel();
            drawAxis();

            fixedItems.forEach(i => drawItem(i, true));
            playItems.filter(i => i !== dragItem).forEach(i => drawItem(i, false));
            if (dragItem) drawItem(dragItem, false);
        }

        function drawGridPanel() {
            const r = 10;
            ctx.fillStyle = '#5d4037';
            roundRect(gridX-5, gridY-5, gridWidth+10, gridHeight+10, r);
            ctx.fill();
            ctx.fillStyle = '#3e2723';
            roundRect(gridX, gridY, gridWidth, gridHeight, r);
            ctx.fill();

            ctx.strokeStyle = '#6d4c41';
            ctx.lineWidth = 1;
            for(let i=1; i<rows; i++) {
                let y = gridY + i*cellSize;
                ctx.beginPath(); ctx.moveTo(gridX, y); ctx.lineTo(gridX+gridWidth, y); ctx.stroke();
            }
            for(let i=1; i<cols; i++) {
                let x = gridX + i*cellSize;
                ctx.beginPath(); ctx.moveTo(x, gridY); ctx.lineTo(x, gridY+gridHeight); ctx.stroke();
            }
        }

        function drawAxis() {
            ctx.save();
            ctx.strokeStyle = '#ef5350';
            ctx.lineWidth = 3;
            ctx.setLineDash([5, 5]);

            const cx = gridX + gridWidth/2;
            const cy = gridY + gridHeight/2;

            if (['L-R', 'R-L'].includes(currentSymmetryMode)) {
                ctx.beginPath(); ctx.moveTo(cx, gridY); ctx.lineTo(cx, gridY+gridHeight); ctx.stroke();
            }
            else if (['T-B', 'B-T'].includes(currentSymmetryMode)) {
                ctx.beginPath(); ctx.moveTo(gridX, cy); ctx.lineTo(gridX+gridWidth, cy); ctx.stroke();
            }
            else if (currentSymmetryMode === 'QUADRANT') {
                ctx.beginPath(); ctx.moveTo(cx, gridY); ctx.lineTo(cx, gridY+gridHeight); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(gridX, cy); ctx.lineTo(gridX+gridWidth, cy); ctx.stroke();
                ctx.fillStyle = '#ef5350';
                ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
            }
            else if (currentSymmetryMode === 'DIAGONAL') {
                ctx.beginPath(); ctx.moveTo(gridX, gridY); ctx.lineTo(gridX+gridWidth, gridY+gridHeight); ctx.stroke();
            }
            else if (currentSymmetryMode === 'FOUR_WAY') {
                // Cross lines for 4-way
                ctx.beginPath(); ctx.moveTo(cx, gridY); ctx.lineTo(cx, gridY+gridHeight); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(gridX, cy); ctx.lineTo(gridX+gridWidth, cy); ctx.stroke();
                ctx.fillStyle = '#ef5350';
                ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }

        function drawItem(item, isFixed) {
            let x, y;
            if (isFixed) {
                const c = getCellCenter(item.r, item.c);
                x = c.x; y = c.y;
            } else {
                x = item.x; y = item.y;
            }

            const size = cellSize * 0.7;
            const w = size, h = size;

            ctx.save();
            ctx.translate(x, y);

            if (isFixed) {
                ctx.globalAlpha = 0.5; 
            }
            if (item === dragItem) {
                ctx.scale(1.2, 1.2);
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
            }

            ctx.fillStyle = item.color;
            if (item.shape === 'vase') {
                ctx.beginPath(); 
                ctx.ellipse(0, 0, w*0.3, h*0.4, 0, 0, Math.PI*2); 
                ctx.fill();
                ctx.fillStyle='rgba(255,255,255,0.3)';
                ctx.beginPath(); ctx.ellipse(0, -h*0.4, w*0.2, h*0.05, 0, 0, Math.PI*2); ctx.fill();
            } 
            else if (item.shape === 'photo') {
                ctx.fillRect(-w/2, -h/2, w, h);
                ctx.fillStyle='#fff'; ctx.fillRect(-w/2+2, -h/2+2, w-4, h-4);
                ctx.fillStyle=item.color; ctx.beginPath(); ctx.arc(0,0, w*0.2, 0, Math.PI*2); ctx.fill();
            }
            else if (item.shape === 'bottle') {
                roundRect(-w*0.2, -h*0.2, w*0.4, h*0.7, 5);
                ctx.fill();
                ctx.fillRect(-w*0.1, -h*0.5, w*0.2, h*0.3);
            }
            else if (item.shape === 'doll') {
                ctx.beginPath(); ctx.arc(0, -h*0.2, w*0.25, 0, Math.PI*2); ctx.fill(); 
                ctx.beginPath(); ctx.ellipse(0, h*0.2, w*0.3, h*0.25, 0, 0, Math.PI*2); ctx.fill(); 
            }
            else if (item.shape === 'plant') {
                ctx.fillStyle='#795548'; ctx.fillRect(-w*0.2, h*0.2, w*0.4, h*0.3); 
                ctx.fillStyle=item.color; ctx.beginPath(); ctx.arc(0, 0, w*0.3, 0, Math.PI*2); ctx.fill();
            }
            else if (item.shape === 'clock') {
                ctx.beginPath(); ctx.arc(0,0,w/2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,w/2-3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle='#333'; ctx.fillRect(-1, -h*0.3, 2, h*0.3); ctx.fillRect(0, -1, w*0.2, 2);
            }
            
            ctx.restore();
        }

        // --- Interaction ---
        function getCellCenter(r, c) {
            return {
                x: gridX + c*cellSize + cellSize/2,
                y: gridY + r*cellSize + cellSize/2
            };
        }

        function getGridPos(x, y) {
            if (x < gridX || x > gridX+gridWidth || y < gridY || y > gridY+gridHeight) return null;
            return {
                c: Math.floor((x-gridX)/cellSize),
                r: Math.floor((y-gridY)/cellSize)
            };
        }

        // Event Handlers
        function handleStart(x, y) {
            for(let p of playItems) {
                const dist = Math.hypot(x - p.x, y - p.y);
                if (dist < cellSize/2) {
                    isDragging = true;
                    dragItem = p;
                    originalGridPos = { r:p.r, c:p.c };
                    return;
                }
            }
        }

        function handleMove(x, y) {
            if(isDragging && dragItem) {
                dragItem.x = x;
                dragItem.y = y;
                draw();
            }
        }

        function handleEnd(x, y) {
            if(!isDragging || !dragItem) return;

            const gridPos = getGridPos(x, y);
            
            if (gridPos) {
                const occupant = playItems.find(p => p !== dragItem && p.r === gridPos.r && p.c === gridPos.c);
                if (occupant) {
                    occupant.r = originalGridPos.r;
                    occupant.c = originalGridPos.c;
                    updateItemPos(occupant);
                }
                dragItem.r = gridPos.r;
                dragItem.c = gridPos.c;
            } else {
                dragItem.r = originalGridPos.r;
                dragItem.c = originalGridPos.c;
            }
            
            updateItemPos(dragItem);
            isDragging = false;
            dragItem = null;
            
            draw();
            checkWin();
        }

        // Mouse & Touch
        const getP = (e) => { const r = canvas.getBoundingClientRect(); return {x: e.clientX-r.left, y: e.clientY-r.top}; }
        canvas.addEventListener('mousedown', e => handleStart(getP(e).x, getP(e).y));
        canvas.addEventListener('mousemove', e => handleMove(getP(e).x, getP(e).y));
        canvas.addEventListener('mouseup', e => handleEnd(getP(e).x, getP(e).y));
        
        const getT = (e) => { const r = canvas.getBoundingClientRect(); return {x: e.touches[0].clientX-r.left, y: e.touches[0].clientY-r.top}; }
        canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(getT(e).x, getT(e).y); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(getT(e).x, getT(e).y); }, {passive:false});
        canvas.addEventListener('touchend', e => { e.preventDefault(); if(isDragging) handleEnd(dragItem.x, dragItem.y); }, {passive:false}); 

        function roundRect(x,y,w,h,r){
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.beginPath();
            ctx.moveTo(x+r,y);
            ctx.arcTo(x+w,y,x+w,y+h,r);
            ctx.arcTo(x+w,y+h,x,y+h,r);
            ctx.arcTo(x,y+h,x,y,r);
            ctx.arcTo(x,y,x+w,y,r);
            ctx.closePath();
        }

        // Init
        resize();
    </script>
</body>
