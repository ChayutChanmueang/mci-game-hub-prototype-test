<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symmetry Decor Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Warm Paper Cut Palette */
            --bg-main: #FFF9F0;
            --panel-bg: #FFFFFF;
            --text-dark: #4E342E;
            --text-light: #8D6E63;
            
            --border-color: #D7CCC8;
            --stroke-color: #4E342E;
            
            --peach: #FFB7B2;
            --mint: #B2DFDB;
            --sky: #B3E5FC;
            --yellow: #FFF9C4;
            --success: #81C784;
            --danger: #E57373;
            
            --btn-shadow: rgba(78, 52, 46, 0.15);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #EFEBE9;
            font-family: 'Mali', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 50vh; 
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-aspect-ratio: 9/18) {
             #game-container {
                height: 95vh;
                width: calc(95vh * 9 / 18);
                border-radius: 32px;
                border: 6px solid var(--stroke-color);
                box-shadow: 0 12px 0 var(--btn-shadow);
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* --- UI Screens & Panels --- */
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(4px);
            z-index: 10;
            transition: opacity 0.3s, transform 0.3s;
            padding: 20px;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
            z-index: 0;
        }

        .panel {
            background: var(--panel-bg);
            border: 4px solid var(--stroke-color);
            border-radius: 24px;
            padding: 24px 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 0 var(--btn-shadow);
            max-height: 90vh;
            overflow-y: auto;
        }

        .title-logo {
            font-size: 4rem;
            font-weight: 700;
            color: var(--peach);
            margin: 0 0 10px 0;
            line-height: 1.1;
            text-shadow: 2px 2px 0 var(--stroke-color);
            -webkit-text-stroke: 1px var(--stroke-color);
        }

        .desc-text {
            font-size: 1.3rem;
            color: var(--text-light);
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* --- Buttons --- */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            margin-top: 15px;
        }

        .diff-btn {
            background: #fff;
            border: 3px solid var(--stroke-color);
            border-radius: 20px;
            padding: 12px 15px;
            font-size: 1.4rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--btn-shadow);
            transition: all 0.1s ease;
            text-align: left;
            display: flex;
            flex-direction: column;
            color: var(--text-dark);
            font-weight: 700;
        }

        .diff-btn small {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 600;
            margin-top: 4px;
        }

        .diff-btn.selected {
            background: var(--mint);
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--btn-shadow);
        }

        .start-btn {
            background: var(--peach);
            border: 4px solid var(--stroke-color);
            border-radius: 50px;
            padding: 16px 0;
            width: 100%;
            font-size: 1.8rem;
            font-family: inherit;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 8px 0 var(--btn-shadow);
            transition: all 0.1s ease;
            margin-top: 10px;
        }
        .start-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 var(--btn-shadow);
        }

        .secondary-btn {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: 600;
            text-decoration: underline;
        .btn-easy { background: linear-gradient(to right, #27ae60, #2ecc71); }
        .btn-medium { background: linear-gradient(to right, #f39c12, #f1c40f); color: #333; }
        .btn-hard { background: linear-gradient(to right, #c0392b, #e74c3c); }
        
        /* --- HUD --- */
        .hud-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            pointer-events: none;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            border: 3px solid var(--stroke-color);
            padding: 10px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 0 var(--btn-shadow);
            margin-bottom: 15px;
        }

        .stat-box { font-size: 1.2rem; font-weight: 700; color: var(--text-light); display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
        .stat-val { font-size: 1.6rem; color: var(--text-dark); }

        .mission-box {
            background: var(--yellow);
            border: 3px solid var(--stroke-color);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            box-shadow: 0 4px 0 var(--btn-shadow);
            pointer-events: auto;
        }

        .hud-btn {
            pointer-events: auto;
            background: var(--sky);
            border: 3px solid var(--stroke-color);
            color: var(--text-dark);
            padding: 8px 15px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 var(--btn-shadow);
        }
        .hud-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--btn-shadow); }

        /* --- Modals --- */
        .win-score { font-size: 4rem; color: var(--success); margin: 10px 0; font-weight: 700; -webkit-text-stroke: 1px var(--stroke-color); }
        .win-time { font-size: 1.5rem; color: var(--text-dark); font-weight: 600; margin-bottom: 20px; }
        
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div id="hud" class="hud-layer hidden">
            <div class="top-bar">
                <button class="hud-btn" onclick="goToMenu()">กลับ</button>
                <div class="stat-box">เวลา<span id="time-display" class="stat-val">00:00</span></div>
                <div class="stat-box">คะแนน<span id="score-display" class="stat-val">0</span></div>
            </div>
            <div class="mission-box" id="mission-display">
                โจทย์: สะท้อนซ้ายไปขวา
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <div class="panel">
                <h1 class="title-logo">Symmetry<br>Decor</h1>
                <p class="desc-text" style="font-size: 1.4rem; margin-bottom: 10px;">จัดของแต่งบ้านให้สมมาตรกัน!</p>

                <div class="btn-group">
                    <button class="diff-btn selected" id="btn-Easy" onclick="selectDiffUI('Easy')">
                        🟢 ระดับเริ่มต้น (Easy)
                        <small>ตาราง 4x4 / สะท้อน 2 ทิศทาง</small>
                    </button>
                    <button class="diff-btn" id="btn-Medium" onclick="selectDiffUI('Medium')">
                        🟡 ระดับปานกลาง (Medium)
                        <small>ตารางใหญ่ขึ้น / สะท้อน 4 ทิศทาง</small>
                    </button>
                    <button class="diff-btn" id="btn-Hard" onclick="selectDiffUI('Hard')">
                        🔴 ระดับท้าทาย (Hard)
                        <small>ตารางใหญ่สุด / สะท้อนหลายรูปแบบ</small>
                    </button>
                </div>
                
                <button class="start-btn" onclick="startSelected()">เริ่มเกมเลย!</button>
            </div>
        </div>

        <!-- Level Complete Modal -->
        <div id="level-complete" class="screen hidden">
            <div class="panel">
                <h2 style="color: var(--success); font-size: 3rem; margin:0;">เย้! ทำได้แล้ว</h2>
                <div class="win-score" id="level-score">+100</div>
                <p class="win-time">เวลาที่ใช้: <span id="level-time">00:15</span> วินาที</p>
                <button class="start-btn" style="background:var(--mint);" onclick="nextLevel()">ด่านถัดไป</button>
                <button class="secondary-btn" onclick="goToMenu()">กลับเมนูหลัก</button>
            </div>
        </div>

    </div>

    <script>
        // --- Setup Audio Context for Feedback ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'chime') { // Correct drop
                osc.type = 'sine';
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5
                osc.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.1); // E6
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'boop') { // Wrong drop
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'win') { // Level clear
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.3); // C6
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        // --- Game State ---
        let gameState = 'MENU'; 
        let selectedDiff = 'Easy';
        let level = 1;
        let score = 0;
        let startTime = 0;
        let timerInterval = null;
        let elapsedSeconds = 0;
        let particles = []; 

        // --- Grid & Physics ---
        let rows = 4, cols = 4;
        let cellSize, gridX, gridY, gridWidth, gridHeight;
        let fixedItems = [], playItems = [];
        let isDragging = false, dragItem = null;
        let originalGridPos = { r: 0, c: 0 };
        let currentSymmetryMode = 'L-R'; 

        // --- Assets ---
        const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#9D4EDD', '#FF9F1C', '#2EC4B6']; 
        const shapes = ['circle', 'square', 'triangle', 'diamond'];

        // --- UI Flow ---
        function selectDiffUI(diff) {
            initAudio(); 
            selectedDiff = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btn-' + diff).classList.add('selected');
        }

        function startSelected() {
            initAudio();
            level = 1;
            score = 0;
            elapsedSeconds = 0;
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            
            startLevel();
        }

        function goToMenu() {
            stopTimer();
            gameState = 'MENU';
            particles = []; 
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('level-complete').classList.add('hidden');
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }

        // --- Resize ---
        function resize() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            calculateGrid();
            if (gameState === 'PLAYING') draw();
        }
        window.addEventListener('resize', resize);

        // --- Modes & Config ---
        function getDifficultyConfig(diff, lvl) {
            let config = { rows: 4, cols: 4, modes: ['L-R', 'T-B'] };
            
            if (diff === 'Easy') {
                config.rows = 4; config.cols = 4;
                config.modes = ['L-R', 'T-B'];
            } 
            else if (diff === 'Medium') {
                if (lvl % 2 !== 0) { config.rows = 4; config.cols = 4; }
                else { config.rows = 6; config.cols = 6; }
                config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT'];
            } 
            else if (diff === 'Hard') {
                const cycle = lvl % 3;
                if (cycle === 1) { config.rows = 4; config.cols = 4; }
                else if (cycle === 2) { config.rows = 6; config.cols = 6; }
                else { config.rows = 8; config.cols = 6; }

                if (config.rows === config.cols) {
                    config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT', 'DIAGONAL', 'FOUR_WAY'];
                } else {
                    config.modes = ['L-R', 'R-L', 'T-B', 'B-T', 'QUADRANT', 'FOUR_WAY'];
                }
            }
            return config;
        }

        function startLevel() {
            gameState = 'PLAYING';
            particles = [];
            const config = getDifficultyConfig(selectedDiff, level);
            rows = config.rows;
            cols = config.cols;
            currentSymmetryMode = config.modes[Math.floor(Math.random() * config.modes.length)];
            
            generateLevelItems();
            resize(); 
            updateHUD();
            startTimer();
            animate(); 
        }

        function nextLevel() {
            document.getElementById('level-complete').classList.add('hidden');
            level++;
            startLevel();
        }

        function startTimer() {
            stopTimer();
            elapsedSeconds = 0; 
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const now = Date.now();
                const totalSeconds = Math.floor((now - startTime) / 1000);
                elapsedSeconds = totalSeconds;
                const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('time-display').innerText = `${m}:${s}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                const now = Date.now();
                elapsedSeconds = Math.floor((now - startTime) / 1000);
            }
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- Grid & Item Logic ---
        function calculateGrid() {
            const margin = canvas.width * 0.08;
            gridWidth = canvas.width - (margin * 2);
            const maxHeight = canvas.height * 0.60;
            
            cellSize = gridWidth / cols;
            gridHeight = cellSize * rows;

            if (gridHeight > maxHeight) {
                gridHeight = maxHeight;
                cellSize = gridHeight / rows;
                gridWidth = cellSize * cols;
            }
            
            gridX = (canvas.width - gridWidth) / 2;
            gridY = (canvas.height - gridHeight) / 2 + 50; 
        }

        function generateLevelItems() {
            fixedItems = [];
            playItems = [];
            
            let fixedZone, playZone;
            const halfR = Math.floor(rows/2);
            const halfC = Math.floor(cols/2);

            if (currentSymmetryMode === 'L-R') {
                fixedZone = { r1:0, r2:rows-1, c1:0, c2:halfC-1 };
                playZone = { r1:0, r2:rows-1, c1:halfC, c2:cols-1 };
            } else if (currentSymmetryMode === 'R-L') {
                fixedZone = { r1:0, r2:rows-1, c1:halfC, c2:cols-1 };
                playZone = { r1:0, r2:rows-1, c1:0, c2:halfC-1 };
            } else if (currentSymmetryMode === 'T-B') {
                fixedZone = { r1:0, r2:halfR-1, c1:0, c2:cols-1 };
                playZone = { r1:halfR, r2:rows-1, c1:0, c2:cols-1 };
            } else if (currentSymmetryMode === 'B-T') {
                fixedZone = { r1:halfR, r2:rows-1, c1:0, c2:cols-1 };
                playZone = { r1:0, r2:halfR-1, c1:0, c2:cols-1 };
            } else if (currentSymmetryMode === 'QUADRANT') {
                fixedZone = { r1:0, r2:halfR-1, c1:0, c2:halfC-1 };
                playZone = { r1:halfR, r2:rows-1, c1:halfC, c2:cols-1 };
            } else if (currentSymmetryMode === 'DIAGONAL') {
                fixedZone = null; 
            } else if (currentSymmetryMode === 'FOUR_WAY') {
                fixedZone = { r1:0, r2:halfR-1, c1:0, c2:halfC-1 };
                playZone = { r1:0, r2:rows-1, c1:0, c2:cols-1 }; 
            }

            let itemCount = Math.min(3 + Math.floor(level/2), 8);
            if (selectedDiff === 'Easy') itemCount = 3;
            if (currentSymmetryMode === 'FOUR_WAY') {
                itemCount = Math.max(1, Math.floor(itemCount / 3) + 1); 
            }

            let usedPosKeys = new Set();
            let usedColorShapeCombos = new Set(); // Store shape-color combinations

            for(let i=0; i<itemCount; i++) {
                // 1. Position finding
                let r, c;
                let safety = 0;
                do {
                    if (currentSymmetryMode === 'DIAGONAL') {
                        r = Math.floor(Math.random() * rows);
                        c = Math.floor(Math.random() * cols);
                        if (c <= r) c = r + 1 + Math.floor(Math.random()*(cols-r-1)); 
                        if (c >= cols) c = cols-1;
                    } 
                    else if (fixedZone) {
                        r = Math.floor(Math.random() * (fixedZone.r2 - fixedZone.r1 + 1)) + fixedZone.r1;
                        c = Math.floor(Math.random() * (fixedZone.c2 - fixedZone.c1 + 1)) + fixedZone.c1;
                    }
                    safety++;
                } while (usedPosKeys.has(`${r},${c}`) && safety < 100);
                usedPosKeys.add(`${r},${c}`);
                
                // 2. Shape and Color finding (Ensuring completely unique combinations)
                let shape, color, comboKey;
                do {
                    shape = shapes[Math.floor(Math.random() * shapes.length)];
                    color = colors[Math.floor(Math.random() * colors.length)];
                    comboKey = `${shape}-${color}`;
                } while (usedColorShapeCombos.has(comboKey));
                usedColorShapeCombos.add(comboKey);
                
                fixedItems.push({ id:i, r, c, shape, color });

                if (currentSymmetryMode === 'FOUR_WAY') {
                    for(let k=0; k<3; k++) {
                        playItems.push({ id:i, r:-1, c:-1, shape, color, x:0, y:0, wiggle:0 });
                    }
                } else {
                    playItems.push({ id:i, r:-1, c:-1, shape, color, x:0, y:0, wiggle:0 }); 
                }
            }

            // Distribute Play Items
            let playKeys = new Set();
            playItems.forEach(item => {
                let r, c;
                let safety = 0;
                do {
                    if (currentSymmetryMode === 'DIAGONAL') {
                        r = Math.floor(Math.random() * rows);
                        c = Math.floor(Math.random() * cols);
                        if (c >= r) { let t=c; c=r; r=t; if (c===r && c>0) c--; }
                    } 
                    else if (currentSymmetryMode === 'FOUR_WAY') {
                        r = Math.floor(Math.random() * rows);
                        c = Math.floor(Math.random() * cols);
                        if (r < halfR && c < halfC) r = halfR + Math.floor(Math.random() * halfR); 
                    }
                    else if (playZone) {
                        r = Math.floor(Math.random() * (playZone.r2 - playZone.r1 + 1)) + playZone.r1;
                        c = Math.floor(Math.random() * (playZone.c2 - playZone.c1 + 1)) + playZone.c1;
                    }
                    safety++;
                } while (playKeys.has(`${r},${c}`) && safety < 100);
                
                playKeys.add(`${r},${c}`);
                item.r = r; item.c = c;
            });
            
            calculateGrid();
            playItems.forEach(updateItemPos);
        }

        function updateItemPos(item) {
            const center = getCellCenter(item.r, item.c);
            item.x = center.x;
            item.y = center.y;
        }

        function isValidTarget(item) {
            const f = fixedItems.find(x => x.id === item.id);
            if (!f) return false;

            if (currentSymmetryMode === 'FOUR_WAY') {
                const tr = { r: f.r, c: (cols - 1) - f.c };
                const bl = { r: (rows - 1) - f.r, c: f.c };
                const br = { r: (rows - 1) - f.r, c: (cols - 1) - f.c };
                return (item.r===tr.r && item.c===tr.c) || 
                       (item.r===bl.r && item.c===bl.c) || 
                       (item.r===br.r && item.c===br.c);
            }
            return isSymmetric(f.r, f.c, item.r, item.c);
        }

        function checkWin() {
            let correct = 0;

            if (currentSymmetryMode === 'FOUR_WAY') {
                let allItemsCorrect = true;
                for (let f of fixedItems) {
                    const tr_c = (cols - 1) - f.c; const tr_r = f.r;
                    const bl_c = f.c;              const bl_r = (rows - 1) - f.r;
                    const br_c = (cols - 1) - f.c; const br_r = (rows - 1) - f.r;

                    const myPlayItems = playItems.filter(p => p.id === f.id);
                    const hasTR = myPlayItems.some(p => p.r === tr_r && p.c === tr_c);
                    const hasBL = myPlayItems.some(p => p.r === bl_r && p.c === bl_c);
                    const hasBR = myPlayItems.some(p => p.r === br_r && p.c === br_c);

                    if (!hasTR || !hasBL || !hasBR) {
                        allItemsCorrect = false; break;
                    }
                }
                if (allItemsCorrect) correct = fixedItems.length; 
            } else {
                fixedItems.forEach(f => {
                    const p = playItems.find(x => x.id === f.id);
                    if (isSymmetric(f.r, f.c, p.r, p.c)) correct++;
                });
            }

            if (correct === fixedItems.length) {
                stopTimer();
                gameState = 'END';
                playSound('win');
                spawnConfetti();
                
                setTimeout(() => {
                    const timePenalty = Math.floor(elapsedSeconds);
                    const levelBonus = (rows * cols);
                    const roundScore = Math.max(10, 200 + levelBonus - (timePenalty * 2));
                    score += roundScore;

                    document.getElementById('score-display').innerText = score;
                    document.getElementById('level-score').innerText = `+${roundScore}`;
                    document.getElementById('level-time').innerText = formatTime(elapsedSeconds);
                    document.getElementById('level-complete').classList.remove('hidden');
                }, 1500); 
            }
        }

        function isSymmetric(fr, fc, pr, pc) {
            if (currentSymmetryMode === 'L-R' || currentSymmetryMode === 'R-L') return fr === pr && pc === (cols - 1) - fc;
            if (currentSymmetryMode === 'T-B' || currentSymmetryMode === 'B-T') return fc === pc && pr === (rows - 1) - fr;
            if (currentSymmetryMode === 'QUADRANT') return pr === (rows - 1) - fr && pc === (cols - 1) - fc;
            if (currentSymmetryMode === 'DIAGONAL') return pr === fc && pc === fr;
            return false;
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = score;
            const mBox = document.getElementById('mission-display');
            
            let txt = "สะท้อนแบบ ";
            if (currentSymmetryMode === 'L-R') txt += "ซ้าย ⮕ ขวา";
            if (currentSymmetryMode === 'R-L') txt += "ขวา ⮕ ซ้าย";
            if (currentSymmetryMode === 'T-B') txt += "บน ⬇ ล่าง";
            if (currentSymmetryMode === 'B-T') txt += "ล่าง ⬆ บน";
            if (currentSymmetryMode === 'QUADRANT') txt += "มุมทะแยง (ตรงข้ามศูนย์กลาง)";
            if (currentSymmetryMode === 'DIAGONAL') txt += "สลับแกน (มุมฉาก)";
            if (currentSymmetryMode === 'FOUR_WAY') txt += "4 ทิศทาง (กระจก 4 ด้าน)";
            
            mBox.innerText = `ด่านที่ ${level}: ${txt}`;
        }

        // --- Animation & Drawing Loop ---
        function animate() {
            if (gameState === 'MENU') return;
            draw();
            requestAnimationFrame(animate);
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawGridPanel();
            drawAxis();

            fixedItems.forEach(i => drawItem(i, true));
            playItems.filter(i => i !== dragItem).forEach(i => drawItem(i, false));
            if (dragItem) drawItem(dragItem, false);

            drawConfetti();
        }

        function drawGridPanel() {
            const r = 16;
            // Shadow layer
            ctx.fillStyle = 'rgba(78, 52, 46, 0.1)';
            roundRect(gridX, gridY + 6, gridWidth, gridHeight, r);
            ctx.fill();
            
            // Base layer
            ctx.fillStyle = '#FFFFFF';
            roundRect(gridX, gridY, gridWidth, gridHeight, r);
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#D7CCC8';
            ctx.stroke();

            // Grid Lines
            ctx.strokeStyle = '#EFEBE9';
            ctx.lineWidth = 2;
            for(let i=1; i<rows; i++) {
                let y = gridY + i*cellSize;
                ctx.beginPath(); ctx.moveTo(gridX+4, y); ctx.lineTo(gridX+gridWidth-4, y); ctx.stroke();
            }
            for(let i=1; i<cols; i++) {
                let x = gridX + i*cellSize;
                ctx.beginPath(); ctx.moveTo(x, gridY+4); ctx.lineTo(x, gridY+gridHeight-4); ctx.stroke();
            }
        }

        function drawAxis() {
            ctx.save();
            ctx.strokeStyle = '#E57373';
            ctx.lineWidth = 4;
            ctx.setLineDash([8, 8]);

            const cx = gridX + gridWidth/2;
            const cy = gridY + gridHeight/2;

            if (['L-R', 'R-L'].includes(currentSymmetryMode)) {
                ctx.beginPath(); ctx.moveTo(cx, gridY-10); ctx.lineTo(cx, gridY+gridHeight+10); ctx.stroke();
            }
            else if (['T-B', 'B-T'].includes(currentSymmetryMode)) {
                ctx.beginPath(); ctx.moveTo(gridX-10, cy); ctx.lineTo(gridX+gridWidth+10, cy); ctx.stroke();
            }
            else if (currentSymmetryMode === 'QUADRANT' || currentSymmetryMode === 'FOUR_WAY') {
                ctx.beginPath(); ctx.moveTo(cx, gridY-10); ctx.lineTo(cx, gridY+gridHeight+10); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(gridX-10, cy); ctx.lineTo(gridX+gridWidth+10, cy); ctx.stroke();
                ctx.fillStyle = '#E57373';
                ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.fill();
            }
            else if (currentSymmetryMode === 'DIAGONAL') {
                ctx.beginPath(); ctx.moveTo(gridX-10, gridY-10); ctx.lineTo(gridX+gridWidth+10, gridY+gridHeight+10); ctx.stroke();
            }
            ctx.restore();
        }

        function drawItem(item, isFixed) {
            let x, y;
            if (isFixed) {
                const c = getCellCenter(item.r, item.c);
                x = c.x; y = c.y;
            } else {
                x = item.x; y = item.y;
            }

            // Wiggle Effect logic
            if (!isFixed && item.wiggle > 0) {
                x += Math.sin(item.wiggle * 0.5) * 6;
                item.wiggle--;
            }

            const size = cellSize * 0.65;
            const w = size, h = size;

            ctx.save();
            ctx.translate(x, y);

            if (isFixed) {
                ctx.globalAlpha = 0.4; 
            } else if (item === dragItem) {
                ctx.scale(1.15, 1.15);
                ctx.shadowColor = 'rgba(78, 52, 46, 0.2)';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 6;
            } else {
                // Paper cut shadow for normal items
                ctx.shadowColor = 'rgba(78, 52, 46, 0.15)';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 3;
            }

            ctx.fillStyle = item.color;
            ctx.strokeStyle = '#4E342E';
            ctx.lineWidth = 3;

            // Simplified Vector Shapes
            if (item.shape === 'circle') {
                ctx.beginPath(); ctx.arc(0, 0, w/2, 0, Math.PI*2); 
                ctx.fill(); ctx.stroke();
                // Inner highlight
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath(); ctx.arc(-w/6, -w/6, w/6, 0, Math.PI*2); ctx.fill();
            } 
            else if (item.shape === 'square') {
                roundRect(-w/2, -h/2, w, h, 8);
                ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                roundRect(-w/2+4, -h/2+4, w/3, h/3, 4); ctx.fill();
            }
            else if (item.shape === 'triangle') {
                ctx.beginPath();
                ctx.moveTo(0, -h/2);
                ctx.lineTo(w/2, h/2);
                ctx.lineTo(-w/2, h/2);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            }
            else if (item.shape === 'diamond') {
                ctx.beginPath();
                ctx.moveTo(0, -h/2);
                ctx.lineTo(w/2, 0);
                ctx.lineTo(0, h/2);
                ctx.lineTo(-w/2, 0);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            }
            
            ctx.restore();
        }

        function spawnConfetti() {
            for(let i=0; i<50; i++) {
                particles.push({
                    x: canvas.width/2,
                    y: canvas.height/2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15 - 5,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0
                });
            }
        }

        function drawConfetti() {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5; // gravity
                p.life -= 0.01;
                
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.life * 10);
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();

                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        // --- Interaction ---
        function getCellCenter(r, c) {
            return {
                x: gridX + c*cellSize + cellSize/2,
                y: gridY + r*cellSize + cellSize/2
            };
        }

        function getGridPos(x, y) {
            if (x < gridX || x > gridX+gridWidth || y < gridY || y > gridY+gridHeight) return null;
            return {
                c: Math.floor((x-gridX)/cellSize),
                r: Math.floor((y-gridY)/cellSize)
            };
        }

        function handleStart(x, y) {
            if (gameState !== 'PLAYING') return;
            for(let p of playItems) {
                const dist = Math.hypot(x - p.x, y - p.y);
                if (dist < cellSize/2) {
                    isDragging = true;
                    dragItem = p;
                    originalGridPos = { r:p.r, c:p.c };
                    return;
                }
            }
        }

        function handleMove(x, y) {
            if(isDragging && dragItem) {
                dragItem.x = x;
                dragItem.y = y;
            }
        }

        function handleEnd(x, y) {
            if(!isDragging || !dragItem) return;

            const gridPos = getGridPos(x, y);
            
            if (gridPos) {
                const occupant = playItems.find(p => p !== dragItem && p.r === gridPos.r && p.c === gridPos.c);
                if (occupant) {
                    occupant.r = originalGridPos.r;
                    occupant.c = originalGridPos.c;
                    updateItemPos(occupant);
                }
                dragItem.r = gridPos.r;
                dragItem.c = gridPos.c;
                
                // Feedback validation
                if (isValidTarget(dragItem)) {
                    playSound('chime');
                } else {
                    playSound('boop');
                    dragItem.wiggle = 20; // set wiggle frames
                }
            } else {
                dragItem.r = originalGridPos.r;
                dragItem.c = originalGridPos.c;
            }
            
            updateItemPos(dragItem);
            isDragging = false;
            dragItem = null;
            
            checkWin();
        }

        const getP = (e) => { const r = canvas.getBoundingClientRect(); return {x: e.clientX-r.left, y: e.clientY-r.top}; }
        canvas.addEventListener('mousedown', e => handleStart(getP(e).x, getP(e).y));
        canvas.addEventListener('mousemove', e => handleMove(getP(e).x, getP(e).y));
        canvas.addEventListener('mouseup', e => handleEnd(getP(e).x, getP(e).y));
        
        const getT = (e) => { const r = canvas.getBoundingClientRect(); return {x: e.touches[0].clientX-r.left, y: e.touches[0].clientY-r.top}; }
        canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(getT(e).x, getT(e).y); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(getT(e).x, getT(e).y); }, {passive:false});
        canvas.addEventListener('touchend', e => { e.preventDefault(); if(isDragging) handleEnd(dragItem.x, dragItem.y); }, {passive:false}); 

        function roundRect(x,y,w,h,r){
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.beginPath();
            ctx.moveTo(x+r,y);
            ctx.arcTo(x+w,y,x+w,y+h,r);
            ctx.arcTo(x+w,y+h,x,y+h,r);
            ctx.arcTo(x,y+h,x,y,r);
            ctx.arcTo(x,y,x+w,y,r);
            ctx.closePath();
        }

        // Init
        resize();
    </script>
</body>
