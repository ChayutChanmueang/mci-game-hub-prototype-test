<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สวนสัตว์แห่งความทรงจำ (Zoo Memory Quest)</title>
    
    <!-- Google Fonts: Kanit (Rounded Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FFF9F0',
                        peach: { 100: '#FFE5D4', 400: '#FFAD85', 500: '#FA9261' },
                        mint: { 100: '#E0F5EC', 400: '#8CDCB8', 500: '#6ABFA2' },
                        sky: { 100: '#E0F2FA', 400: '#8ACAE6', 500: '#69B6D9' },
                        lemon: { 100: '#FEF4D4', 400: '#FDE08B', 500: '#E8C55A' },
                        ink: '#4A4A4A'
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-3deg)' },
                            '50%': { transform: 'rotate(3deg)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '50%': { transform: 'scale(1.1)' },
                            '100%': { transform: 'scale(1)', opacity: '1' }
                        }
                    },
                    animation: {
                        wiggle: 'wiggle 0.3s ease-in-out 2',
                        pop: 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #FFF9F0;
            color: #4A4A4A;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Paper Cut Effects */
        .paper-card {
            background: white;
            border: 4px solid #F3E8D6;
            border-radius: 2rem;
            box-shadow: 0 12px 0 0 #F3E8D6;
            margin-bottom: 12px;
        }

        .paper-btn {
            border: 3px solid rgba(0,0,0,0.1);
            border-bottom-width: 8px;
            border-radius: 1.5rem;
            transition: all 0.15s ease;
        }
        .paper-btn:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 4px;
        }
        
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #f00;
            border-radius: 4px;
            animation: fall 2s linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(300px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const APP_VERSION = "v2.0.0";

        // --- Audio System (Soft Synths) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const playTone = (freq, type, duration, vol = 0.1) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const playClick = () => playTone(600, 'sine', 0.1, 0.05);
        const playCorrect = () => {
            playTone(523.25, 'sine', 0.4, 0.1); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.6, 0.1), 150); // E5
        };
        const playWrong = () => {
            playTone(300, 'triangle', 0.4, 0.1);
            setTimeout(() => playTone(250, 'triangle', 0.6, 0.1), 200);
        };

        // --- Icons ---
        const Icon = ({ path, size = 28, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            Play: <polygon points="5 3 19 12 5 21 5 3"></polygon>,
            RefreshCw: <><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></>,
            Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
            ListChecks: <><path d="M10 6h11"/><path d="M10 12h11"/><path d="M10 18h11"/><path d="M3 6h1"/><path d="M3 12h1"/><path d="M3 18h1"/></>,
            Star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>,
            Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
            ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>
        };

        // --- Game Data ---
        const MEMORY_ITEMS = [
            { id: 'lion', name: 'สิงโต', icon: '🦁' },
            { id: 'elephant', name: 'ช้าง', icon: '🐘' },
            { id: 'monkey', name: 'ลิง', icon: '🐵' },
            { id: 'penguin', name: 'เพนกวิน', icon: '🐧' },
            { id: 'giraffe', name: 'ยีราฟ', icon: '🦒' },
            { id: 'zebra', name: 'ม้าลาย', icon: '🦓' },
            { id: 'panda', name: 'แพนด้า', icon: '🐼' },
            { id: 'tiger', name: 'เสือ', icon: '🐯' },
            { id: 'koala', name: 'โคอาล่า', icon: '🐨' },
            { id: 'cow', name: 'วัว', icon: '🐮' },
            { id: 'pig', name: 'หมู', icon: '🐷' },
            { id: 'frog', name: 'กบ', icon: '🐸' },
        ];

        const DISTRACTION_QUIZ_POOL = [
            { q: "สัตว์ตัวไหนคอยาวที่สุด?", a: '🦒', options: ['🦁', '🦒', '🐧'] },
            { q: "สัตว์ตัวไหนชอบกินกล้วย?", a: '🐵', options: ['🐵', '🐯', '🦓'] },
            { q: "สัตว์ตัวไหนมีงวงยาว?", a: '🐘', options: ['🐼', '🐘', '🦁'] },
            { q: "สัตว์ตัวไหนมีลายขาว-ดำ?", a: '🦓', options: ['🦓', '🐘', '🐯'] },
            { q: "สัตว์ตัวไหนคือเจ้าป่า?", a: '🦁', options: ['🐧', '🦁', '🦓'] },
            { q: "สัตว์ตัวไหนกินไผ่?", a: '🐼', options: ['🐵', '🐼', '🦁'] },
            { q: "สัตว์ตัวไหนอยู่ในที่หนาวเย็น?", a: '🐧', options: ['🐧', '🦒', '🐘'] },
            { q: "สัตว์ตัวไหนร้องอู๊ดๆ?", a: '🐷', options: ['🐷', '🐮', '🐸'] },
            { q: "สัตว์ตัวไหนให้นมเราดื่ม?", a: '🐮', options: ['🐮', '🐸', '🐨'] },
            { q: "สัตว์ตัวไหนกระโดดเก่ง?", a: '🐸', options: ['🐸', '🐷', '🐮'] },
        ];

        const TOTAL_ROUNDS = 5;

        // --- Common UI Components ---
        const PaperButton = ({ onClick, children, colorClass = "bg-mint-400 border-mint-500", disabled = false, className = "" }) => (
            <button
                onClick={() => { playClick(); onClick(); }}
                disabled={disabled}
                className={`w-full py-5 px-6 text-2xl font-bold text-ink flex items-center justify-center gap-4 paper-btn ${colorClass} ${disabled ? 'opacity-60 cursor-not-allowed' : ''} ${className}`}
            >
                {children}
            </button>
        );

        const Confetti = () => {
            const colors = ['#8CDCB8', '#FDE08B', '#FFAD85', '#8ACAE6'];
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    {[...Array(30)].map((_, i) => {
                        const style = {
                            left: `${Math.random() * 100}%`,
                            backgroundColor: colors[Math.floor(Math.random() * colors.length)],
                            animationDuration: `${Math.random() * 2 + 1}s`,
                            animationDelay: `${Math.random() * 0.5}s`
                        };
                        return <div key={i} className="confetti" style={style} />;
                    })}
                </div>
            );
        };

        // --- Main App ---
        function App() {
            // States: 'menu', 'leaderboard', 'distract', 'recall', 'feedback', 'summary'
            const [gameState, setGameState] = useState('menu');
            
            // Session State
            const [fixedLevel, setFixedLevel] = useState(3);
            const [currentDifficulty, setCurrentDifficulty] = useState('Easy');
            const [currentRound, setCurrentRound] = useState(1);
            const [correctCount, setCorrectCount] = useState(0);
            const [gameStartTime, setGameStartTime] = useState(null);
            
            // Round State
            const [targetItem, setTargetItem] = useState(null);
            const [distractionStep, setDistractionStep] = useState(0);
            const [currentQuiz, setCurrentQuiz] = useState(null);
            const [quizPool, setQuizPool] = useState([]);
            const [recallOptions, setRecallOptions] = useState([]);
            const [isCorrect, setIsCorrect] = useState(false);
            const [wigglingOption, setWigglingOption] = useState(null);
            
            // Final Time State
            const [finalTime, setFinalTime] = useState("0:00");
            
            // Exit Confirmation State
            const [showExitConfirm, setShowExitConfirm] = useState(false);

            const formatTime = (ms) => {
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            };

            const getElapsedTime = () => gameStartTime ? formatTime(Date.now() - gameStartTime) : "0:00";
            const getQuestionsCount = () => fixedLevel;

            // --- Game Flow Logic ---
            const startGame = (level, diffName) => {
                setFixedLevel(level);
                setCurrentDifficulty(diffName);
                setCurrentRound(1);
                setCorrectCount(0);
                setGameStartTime(Date.now());
                startRound();
            };

            const startRound = () => {
                const shuffledQuiz = [...DISTRACTION_QUIZ_POOL].sort(() => Math.random() - 0.5);
                setQuizPool(shuffledQuiz);
                setDistractionStep(0);

                // Set Target based on Answer to 1st Question
                const targetIcon = shuffledQuiz[0].a;
                const targetObj = MEMORY_ITEMS.find(item => item.icon === targetIcon);
                setTargetItem(targetObj || MEMORY_ITEMS[0]);
                
                setCurrentQuiz(shuffledQuiz[0]);
                setGameState('distract');
            };

            const handleDistractionAnswer = () => {
                // Ignore if correct or wrong, just proceed
                const nextStep = distractionStep + 1;
                const totalQs = getQuestionsCount();
                
                if (nextStep >= totalQs) {
                    setupRecall();
                } else {
                    setDistractionStep(nextStep);
                    setCurrentQuiz(quizPool[nextStep % quizPool.length]);
                }
            };

            const setupRecall = () => {
                let options = [targetItem];
                let numDistractors = fixedLevel >= 6 ? 5 : 3; // Easy: 4 options, Med/Hard: 6 options

                const distractors = MEMORY_ITEMS.filter(item => item.id !== targetItem.id);
                const randomDistractors = distractors.sort(() => Math.random() - 0.5).slice(0, numDistractors);
                
                options = [...options, ...randomDistractors].sort(() => Math.random() - 0.5);
                setRecallOptions(options);
                setGameState('recall');
            };

            const handleRecallAnswer = (selectedItem) => {
                const correct = selectedItem.id === targetItem.id;
                
                if (correct) {
                    playCorrect();
                    setIsCorrect(true);
                    setCorrectCount(prev => prev + 1);
                    setGameState('feedback');
                } else {
                    playWrong();
                    setWigglingOption(selectedItem.id);
                    // Wiggle effect delay before moving to feedback
                    setTimeout(() => {
                        setWigglingOption(null);
                        setIsCorrect(false);
                        setGameState('feedback');
                    }, 800);
                }
            };

            const nextRoundOrFinish = () => {
                if (currentRound < TOTAL_ROUNDS) {
                    setCurrentRound(prev => prev + 1);
                    startRound();
                } else {
                    saveScore();
                }
            };

            const saveScore = () => {
                setFinalTime(getElapsedTime());
                setGameState('summary');
            };

            const goHome = () => {
                playClick();
                setShowExitConfirm(true);
            };

            const confirmExit = () => {
                playClick();
                setShowExitConfirm(false);
                setGameState('menu');
            };

            const cancelExit = () => {
                playClick();
                setShowExitConfirm(false);
            };

            // --- Screens ---
            const MenuScreen = () => (
                <div className="flex flex-col items-center h-full p-6 animate-pop">
                    <div className="paper-card p-8 w-full text-center relative overflow-hidden bg-cream">
                        <div className="flex justify-center mb-4">
                            <div className="bg-lemon-400 p-4 rounded-full border-4 border-lemon-500 shadow-sm">
                                <span className="text-5xl">🦁</span>
                            </div>
                        </div>
                        <h1 className="text-3xl font-extrabold text-ink mb-3 leading-snug">สวนสัตว์<br/>แห่งความทรงจำ</h1>
                        <p className="text-xl text-ink/80 mb-8 bg-white p-4 rounded-2xl border-2 border-slate-100">
                            จำคำตอบของ <span className="text-peach-500 font-bold">"ข้อแรก"</span> ไว้ให้ดี<br/>แล้วตอบคำถามคั่นเวลาให้ครบ!
                        </p>
                        
                        <div className="flex flex-col gap-4">
                            <PaperButton onClick={() => startGame(3, 'Easy')} colorClass="bg-mint-400 border-[#6ABFA2]">
                                ระดับง่าย <span className="text-lg font-normal opacity-80">(คั่น 3 ข้อ)</span>
                            </PaperButton>
                            <PaperButton onClick={() => startGame(6, 'Medium')} colorClass="bg-lemon-400 border-[#E8C55A]">
                                ระดับกลาง <span className="text-lg font-normal opacity-80">(คั่น 6 ข้อ)</span>
                            </PaperButton>
                            <PaperButton onClick={() => startGame(10, 'Hard')} colorClass="bg-peach-400 border-[#FA9261]">
                                ระดับยาก <span className="text-lg font-normal opacity-80">(คั่น 10 ข้อ)</span>
                            </PaperButton>
                        </div>
                    </div>
                </div>
            );

            const DistractionScreen = () => (
                <div className="flex flex-col h-full p-4 relative animate-pop">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6 bg-white p-3 rounded-2xl border-2 border-slate-100 shadow-sm">
                        <button onClick={goHome} className="text-ink/60 hover:text-peach-500 p-2"><Icon path={Icons.ArrowLeft} /></button>
                        <div className="text-xl font-bold text-ink">ด่าน {currentRound}/{TOTAL_ROUNDS}</div>
                        <div className="w-10"></div> {/* Spacer for balance */}
                    </div>

                    <div className="paper-card py-10 px-6 flex-1 flex flex-col justify-center bg-cream">
                        {distractionStep === 0 && (
                            <div className="bg-peach-100 text-peach-500 font-bold text-xl py-2 px-4 rounded-xl mb-6 mx-auto w-max animate-bounce">
                                ⭐ จำคำตอบข้อนี้ไว้ให้ดี!
                            </div>
                        )}
                        
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-ink/60 font-bold text-lg">คำถามข้อที่ {distractionStep + 1}</span>
                        </div>
                        
                        <h2 className="text-3xl font-extrabold text-ink mb-8 min-h-[4rem] flex items-center justify-center text-center leading-relaxed">
                            {currentQuiz?.q}
                        </h2>
                        
                        <div className="grid grid-cols-1 gap-4 mt-auto">
                            {currentQuiz?.options.map((opt, idx) => (
                                <button 
                                    key={idx} 
                                    onClick={() => { playClick(); handleDistractionAnswer(); }} 
                                    className="paper-btn bg-white border-slate-200 py-6 text-6xl shadow-sm hover:bg-sky-100 flex items-center justify-center"
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const RecallScreen = () => (
                <div className="flex flex-col h-full p-4 relative animate-pop">
                    <div className="flex justify-between items-center mb-6 bg-white p-3 rounded-2xl border-2 border-slate-100 shadow-sm">
                        <button onClick={goHome} className="text-ink/60 hover:text-peach-500 p-2"><Icon path={Icons.ArrowLeft} /></button>
                        <div className="text-xl font-bold text-ink">ทายคำตอบ</div>
                        <div className="w-10"></div>
                    </div>

                    <div className="paper-card py-8 px-6 flex-1 flex flex-col bg-sky-100/50">
                        <h2 className="text-3xl font-extrabold text-ink mb-8 text-center leading-snug">
                            คำตอบของ <span className="text-peach-500">"คำถามข้อแรกสุด"</span><br/>คือสัตว์ตัวไหน?
                        </h2>
                        
                        <div className={`grid gap-4 w-full mt-auto ${recallOptions.length > 4 ? 'grid-cols-2' : 'grid-cols-1'}`}>
                            {recallOptions.map((item) => (
                                <button 
                                    key={item.id} 
                                    disabled={wigglingOption !== null}
                                    onClick={() => handleRecallAnswer(item)} 
                                    className={`paper-btn bg-white border-slate-200 p-4 shadow-sm flex items-center gap-4 hover:bg-lemon-100
                                        ${recallOptions.length > 4 ? 'flex-col text-center justify-center py-6' : 'text-left'}
                                        ${wigglingOption === item.id ? 'animate-wiggle bg-red-50 border-red-200' : ''}
                                    `}
                                >
                                    <div className="text-5xl">{item.icon}</div>
                                    <span className="text-2xl font-bold text-ink">{item.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const FeedbackScreen = () => (
                <div className="flex flex-col items-center justify-center h-full p-4 relative animate-pop">
                    {isCorrect && <Confetti />}
                    
                    <div className={`paper-card p-8 w-full text-center z-10 ${isCorrect ? 'bg-mint-100 border-[#8CDCB8]' : 'bg-cream border-slate-200'}`}>
                        <div className="text-7xl mb-6">
                            {isCorrect ? '🌟' : '💡'}
                        </div>
                        
                        <h2 className={`text-4xl font-extrabold mb-4 ${isCorrect ? 'text-mint-500' : 'text-ink'}`}>
                            {isCorrect ? 'ยอดเยี่ยมมาก!' : 'เกือบถูกแล้วครับ'}
                        </h2>
                        
                        <div className="bg-white p-6 rounded-2xl border-2 border-slate-100 mb-8 inline-block shadow-sm w-full">
                            <span className="text-xl text-ink/70 block mb-2">คำตอบที่ถูกต้องคือ</span>
                            <div className="flex items-center justify-center gap-4">
                                <span className="text-5xl">{targetItem.icon}</span>
                                <span className="text-3xl font-bold text-ink">{targetItem.name}</span>
                            </div>
                        </div>

                        <PaperButton onClick={nextRoundOrFinish} colorClass="bg-sky-400 border-[#69B6D9]">
                            {currentRound < TOTAL_ROUNDS ? 'ไปด่านต่อไป' : 'ดูสรุปผลคะแนน'} <Icon path={Icons.ArrowRight} />
                        </PaperButton>
                    </div>
                </div>
            );

            const SummaryScreen = () => (
                <div className="flex flex-col items-center justify-center h-full p-4 relative animate-pop">
                    <div className="paper-card p-8 w-full text-center bg-cream">
                        <div className="text-7xl mb-4">🏆</div>
                        <h2 className="text-4xl font-extrabold text-ink mb-2">จบเกมแล้ว!</h2>
                        <p className="text-xl text-ink/70 mb-8 bg-white py-2 px-4 rounded-xl border border-slate-100 inline-block">
                            ระดับ: {currentDifficulty === 'Easy' ? 'ง่าย' : currentDifficulty === 'Medium' ? 'กลาง' : 'ยาก'}
                        </p>
                        
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-mint-100 p-6 rounded-2xl border-2 border-mint-400 text-center">
                                <div className="text-ink/70 text-lg font-bold mb-2">คะแนน</div>
                                <div className="text-4xl font-extrabold text-mint-500">{correctCount}/{TOTAL_ROUNDS}</div>
                            </div>
                            <div className="bg-sky-100 p-6 rounded-2xl border-2 border-sky-400 text-center">
                                <div className="text-ink/70 text-lg font-bold mb-2">เวลาที่ใช้</div>
                                <div className="text-3xl font-extrabold text-sky-500 mt-3">{finalTime}</div>
                            </div>
                        </div>
                        
                        <PaperButton onClick={() => setGameState('menu')} colorClass="bg-lemon-400 border-[#E8C55A]">
                            <Icon path={Icons.Home} /> กลับหน้าหลัก
                        </PaperButton>
                    </div>
                </div>
            );

            return (
                <div className="h-[100dvh] w-full flex items-center justify-center bg-slate-800 p-0 sm:p-4">
                    <div className="relative w-full h-full sm:h-auto sm:max-h-[900px] max-w-[450px] sm:aspect-[9/16] bg-[#FFF9F0] sm:rounded-[3rem] overflow-hidden sm:ring-8 ring-slate-900 flex flex-col shadow-2xl">
                        <div className="flex-1 overflow-y-auto overflow-x-hidden no-scrollbar">
                            {gameState === 'menu' && <MenuScreen />}
                            {gameState === 'distract' && <DistractionScreen />}
                            {gameState === 'recall' && <RecallScreen />}
                            {gameState === 'feedback' && <FeedbackScreen />}
                            {gameState === 'summary' && <SummaryScreen />}
                        </div>

                        {/* Custom Exit Confirmation Modal */}
                        {showExitConfirm && (
                            <div className="absolute inset-0 bg-ink/50 z-[100] flex items-center justify-center p-4 animate-fade-in">
                                <div className="paper-card p-6 w-full max-w-[300px] text-center bg-cream animate-pop shadow-2xl">
                                    <div className="text-5xl mb-4">⚠️</div>
                                    <h3 className="text-2xl font-extrabold text-ink mb-2">ต้องการออกจากเกม?</h3>
                                    <p className="text-ink/70 mb-6 font-medium">ความคืบหน้าในรอบนี้จะถูกยกเลิก</p>
                                    <div className="flex gap-3">
                                        <button onClick={cancelExit} className="flex-1 py-3 rounded-2xl font-bold text-ink bg-slate-200 hover:bg-slate-300 transition-colors">
                                            ยกเลิก
                                        </button>
                                        <button onClick={confirmExit} className="flex-1 py-3 rounded-2xl font-bold text-white bg-peach-500 hover:bg-peach-600 transition-colors shadow-sm">
                                            ยืนยัน
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
