<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ทิศทางของเสียง</title>
    <!-- ใช้ฟอนต์หัวมนอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Mali:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* High Saturation Pastels */
            --bg-color: #FDFBF7; /* Cream/Off-white */
            --peach: #FFBFA8;
            --mint: #A8E6CF;
            --sky: #A3D5FF;
            --yellow: #FFD3B6;
            --text-dark: #4A4A4A;
            --text-light: #7A7A7A;
            --stroke-color: #D1C7B7;
            --panel-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #EAE6DF;
            font-family: 'Mali', 'Nunito', sans-serif; /* ฟอนต์ไทยหัวมน */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* จำลองหน้าจอมือถือสัดส่วน 9:18 */
        #app-container {
            width: 100%;
            height: 100%;
            max-width: 450px; /* จำกัดความกว้างบน PC */
            aspect-ratio: 9 / 18;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* Paper Cut Style Panels */
        .panel {
            background: var(--panel-bg);
            border: 3px solid var(--stroke-color);
            border-radius: 24px;
            box-shadow: 0 6px 0 var(--stroke-color);
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Paper Cut Style Buttons */
        .btn {
            font-family: inherit;
            font-weight: 700;
            font-size: 20px;
            padding: 15px 20px;
            border: 3px solid var(--stroke-color);
            border-radius: 20px;
            background: var(--panel-bg);
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: 0 6px 0 var(--stroke-color);
            transition: all 0.1s ease;
            width: 100%;
            display: block;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--stroke-color);
        }

        .btn.primary {
            background: linear-gradient(135deg, var(--peach), var(--yellow));
            font-size: 24px;
            padding: 20px;
        }

        .btn-diff {
            background: #FAFAFA;
            text-align: left;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .btn-diff.selected {
            background: var(--sky);
            border-color: #7AB8EB;
            box-shadow: 0 6px 0 #7AB8EB;
        }
        .diff-title { font-size: 22px; font-weight: 800; }
        .diff-desc { font-size: 16px; font-weight: 400; color: var(--text-dark); margin-top: 5px;}

        /* Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: none;
            flex-direction: column;
            background: var(--bg-color);
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        /* Game Screen Specifics */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: var(--yellow);
            border: 3px solid var(--stroke-color);
            border-radius: 16px;
            width: 50px;
            height: 50px;
            font-size: 24px;
            box-shadow: 0 4px 0 var(--stroke-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .back-btn:active { transform: translateY(4px); box-shadow: 0 0 0 var(--stroke-color); }

        .stat-box {
            background: var(--panel-bg);
            border: 3px solid var(--stroke-color);
            border-radius: 16px;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 0 var(--stroke-color);
        }

        .game-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .nature-graphic {
            font-size: 80px;
            margin-bottom: 20px;
            text-shadow: 0 4px 0 var(--stroke-color);
            animation: float 3s ease-in-out infinite;
        }

        .instruction-text {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
            margin-bottom: 20px;
        }

        .play-btn {
            flex: 1;
            aspect-ratio: 1;
            border-radius: 30px;
            font-size: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--mint);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .wiggle {
            animation: wiggle 0.4s ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .confetti {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: pop 1s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(0) translateY(0) rotate(0); opacity: 1; }
            50% { transform: scale(1.5) translateY(-50px) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) translateY(-100px) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

<div id="app-container">
    
    <!-- Main Menu Screen -->
    <div id="menu-screen" class="screen active">
        <div class="panel" style="margin-top: 20px;">
            <h1 style="font-size: 32px; color: #E87A5D; margin-bottom: 10px;">ทิศทางของเสียง</h1>
            <p style="font-size: 18px; line-height: 1.5;">หลับตาฟังเสียงนกร้อง...<br>แล้วทายว่าเสียงมาจากฝั่งซ้าย หรือ ขวา</p>
            <p style="font-size: 14px; color: var(--text-light); margin-top: 10px;">(แนะนำให้ใส่หูฟังเพื่อการแยกแยะที่ชัดเจน)</p>
        </div>

        <h2 style="font-size: 20px; margin-bottom: 10px; margin-top: 10px;">ระดับความยาก</h2>
        
        <button class="btn btn-diff selected" onclick="selectDifficulty('easy')">
            <span class="diff-title">🌱 ง่าย (Easy)</span>
            <span class="diff-desc">เสียงซ้าย-ขวาชัดเจน ฟังง่าย</span>
        </button>
        
        <button class="btn btn-diff" onclick="selectDifficulty('medium')">
            <span class="diff-title">🌿 ปานกลาง (Medium)</span>
            <span class="diff-desc">เสียงเบาลง ต้องตั้งใจฟังมากขึ้น</span>
        </button>
        
        <button class="btn btn-diff" onclick="selectDifficulty('hard')">
            <span class="diff-title">🍂 ยาก (Hard)</span>
            <span class="diff-desc">มีเสียงรบกวน (Noise) อยู่ตรงกลาง</span>
        </button>

        <div style="flex-grow: 1;"></div>
        
        <button class="btn primary" onclick="startGame()">เริ่มฟังเสียง! 🎧</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="top-bar">
            <button class="back-btn" onclick="returnToMenu()">⬅️</button>
            <div class="stat-box">⭐ <span id="score">0</span></div>
            <div class="stat-box">⏱️ <span id="timer">03:00</span></div>
        </div>

        <div class="game-area" id="game-area">
            <div class="nature-graphic" id="nature-icon">🌳</div>
            <div class="instruction-text" id="game-instruction">กำลังรอเสียง...</div>
            
            <button class="btn" style="background: var(--yellow); font-size: 18px; margin-bottom: 30px; width: auto; padding: 10px 30px;" onclick="playCurrentSound()">
                ▶️ ฟังเสียงอีกครั้ง
            </button>
        </div>

        <div class="controls">
            <button class="btn play-btn" style="background: var(--sky);" onclick="checkAnswer('left')">⬅️ ซ้าย</button>
            <button class="btn play-btn" style="background: var(--peach);" onclick="checkAnswer('right')">ขวา ➡️</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen">
        <div class="game-area">
            <div class="panel">
                <h1 style="font-size: 40px; margin-bottom: 10px;">หมดเวลา! ⏰</h1>
                <p style="font-size: 24px; margin-bottom: 20px;">คะแนนของคุณคือ</p>
                <div style="font-size: 60px; font-weight: 900; color: #E87A5D; margin-bottom: 20px;">
                    ⭐ <span id="final-score">0</span>
                </div>
                <p style="font-size: 18px; color: var(--text-light);" id="result-msg">คุณมีหูที่ยอดเยี่ยมมาก!</p>
            </div>
            
            <div style="width: 100%; margin-top: 30px;">
                <button class="btn primary" onclick="returnToMenu()">เล่นอีกครั้ง 🔄</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- State Variables ---
    let currentDifficulty = 'easy';
    let score = 0;
    let timeLeft = 180; // 3 minutes
    let timerInterval;
    let currentTarget = 'left'; // 'left' or 'right'
    let isPlaying = false;
    let isInputLocked = false;

    // --- Audio System (Web Audio API) ---
    // สร้างระบบเสียงสังเคราะห์ (Synth) เพื่อไม่ต้องพึ่งพาไฟล์ภายนอกและจัดการ Panning ได้ 100%
    let audioCtx;
    let masterGain;
    let bgmOsc;
    let noiseNode;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0.8;
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // สร้างเสียงประกอบ BGM อ่อนๆ (Acoustic Pad)
    function startBGM() {
        if(bgmOsc) bgmOsc.stop();
        bgmOsc = audioCtx.createOscillator();
        let bgmGain = audioCtx.createGain();
        bgmOsc.type = 'triangle';
        bgmOsc.frequency.value = 200; // เสียงทุ้มต่ำอบอุ่น
        bgmGain.gain.value = 0.05; // เบามากๆ
        bgmOsc.connect(bgmGain);
        bgmGain.connect(masterGain);
        bgmOsc.start();
    }

    function stopBGM() {
        if(bgmOsc) { bgmOsc.stop(); bgmOsc = null; }
    }

    // สร้างเสียงรบกวน (Noise) สำหรับโหมด Hard
    function startNoise() {
        if(noiseNode) noiseNode.stop();
        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;
        noiseNode.loop = true;
        
        let noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.value = 800; // ทำให้เสียงซ่าทุ้มลง ไม่บาดหู

        let noiseGain = audioCtx.createGain();
        noiseGain.gain.value = 0.08;

        noiseNode.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(masterGain);
        noiseNode.start();
    }

    function stopNoise() {
        if(noiseNode) { noiseNode.stop(); noiseNode = null; }
    }

    // สร้างเสียงนกร้อง (Bird Chirp) พร้อมกำหนดตำแหน่งซ้ายขวา
    function playBird(panValue, volumeMultiplier = 1) {
        if(!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const panner = audioCtx.createStereoPanner();

        // ตั้งค่า Panning (-1 ซ้ายสุด, 1 ขวาสุด)
        panner.pan.value = panValue;

        // รูปแบบเสียงนก (Sine wave เสียงแหลมแกว่ง)
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(2500, audioCtx.currentTime + 0.1);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.3);

        // Envelope ควบคุมความดัง (Volume Envelope)
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5 * volumeMultiplier, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

        osc.connect(gain);
        gain.connect(panner);
        panner.connect(masterGain);

        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.4);
    }

    // เสียง Effect เมือตอบถูก (Soft Chime)
    function playSuccessChime() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

        osc.connect(gain);
        gain.connect(masterGain);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.6);
    }

    // --- UI & Game Logic ---

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function selectDifficulty(diff) {
        currentDifficulty = diff;
        document.querySelectorAll('.btn-diff').forEach(btn => btn.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
    }

    function startGame() {
        initAudio(); // ต้องเรียกจาก User Interaction
        startBGM();
        
        if(currentDifficulty === 'hard') {
            startNoise();
        }

        score = 0;
        timeLeft = 180;
        updateScoreUI();
        updateTimerUI();
        
        switchScreen('game-screen');
        isPlaying = true;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if(timeLeft <= 0) {
                endGame();
            }
        }, 1000);

        setTimeout(nextRound, 1000); // ดีเลย์ก่อนเริ่มตาแรก
    }

    function returnToMenu() {
        clearInterval(timerInterval);
        isPlaying = false;
        stopBGM();
        stopNoise();
        switchScreen('menu-screen');
    }

    function endGame() {
        clearInterval(timerInterval);
        isPlaying = false;
        stopBGM();
        stopNoise();
        
        document.getElementById('final-score').innerText = score;
        let msg = "เก่งมาก!";
        if(score < 50) msg = "ลองฝึกฟังบ่อยๆ นะ";
        if(score > 150) msg = "หูเทพสุดๆ ไปเลย!";
        document.getElementById('result-msg').innerText = msg;
        
        switchScreen('result-screen');
    }

    function nextRound() {
        if(!isPlaying) return;
        isInputLocked = false;
        
        // สุ่มทิศทาง
        currentTarget = Math.random() > 0.5 ? 'left' : 'right';
        document.getElementById('game-instruction').innerText = "ฟังเสียง... 🐦";
        document.getElementById('nature-icon').innerText = "🌳";
        
        playCurrentSound();
    }

    function playCurrentSound() {
        if(!isPlaying) return;
        
        let pan = currentTarget === 'left' ? -1 : 1;
        let vol = 1;

        if (currentDifficulty === 'medium') {
            vol = 0.4; // เสียงเบาลง
        } else if (currentDifficulty === 'hard') {
            vol = 0.5; // เสียงเบาลง + มี noise (Noise เปิดไว้แล้วใน startGame)
        }

        playBird(pan, vol);
    }

    function checkAnswer(guess) {
        if(!isPlaying || isInputLocked) return;
        isInputLocked = true; // ล็อคปุ่มกันกดรัว

        let gameArea = document.getElementById('game-area');

        if (guess === currentTarget) {
            // ตอบถูก
            score += 10;
            playSuccessChime();
            document.getElementById('game-instruction').innerText = "ถูกต้อง! 🌟";
            document.getElementById('nature-icon').innerText = "✨";
            createConfetti();
        } else {
            // ตอบผิด
            score -= 5;
            document.getElementById('game-instruction').innerText = "พลาดไปนิดนึง 🍂";
            document.getElementById('nature-icon').innerText = "🍃";
            gameArea.classList.add('wiggle');
            setTimeout(() => gameArea.classList.remove('wiggle'), 400);
        }

        updateScoreUI();
        setTimeout(nextRound, 1500); // รอ 1.5 วิแล้วไปตาต่อไป
    }

    function updateScoreUI() {
        document.getElementById('score').innerText = score;
    }

    function updateTimerUI() {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `0${m}:${s < 10 ? '0'+s : s}`;
    }

    // --- Visual Effects ---
    function createConfetti() {
        const area = document.getElementById('game-area');
        const colors = ['⭐', '✨', '🎵', '🌿'];
        
        for(let i = 0; i < 6; i++) {
            let el = document.createElement('div');
            el.className = 'confetti';
            el.innerText = colors[Math.floor(Math.random() * colors.length)];
            
            // สุ่มตำแหน่งรอบๆ ตรงกลาง
            let left = 50 + (Math.random() * 40 - 20); 
            let top = 40 + (Math.random() * 40 - 20);
            
            el.style.left = left + '%';
            el.style.top = top + '%';
            
            area.appendChild(el);
            
            // ลบ element ทิ้งเมื่อแอนิเมชันจบ
            setTimeout(() => {
                if(el.parentNode) el.parentNode.removeChild(el);
            }, 1000);
        }
    }

</script>
</body>
</html>
