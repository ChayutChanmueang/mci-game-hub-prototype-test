<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dial-a-Friend (โทรหาเพื่อนรัก)</title>
    <!-- Google Fonts: Mali for rounded sans-serif Thai font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- Screen 1: Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="panel main-panel">
                <h1 class="game-title">Dial-a-Friend</h1>
                <h2 class="game-subtitle">(โทรหาเพื่อนรัก)</h2>
                
                <p class="description">
                    ทดสอบความจำของคุณ!<br>
                    จำเบอร์โทรศัพท์สั้นๆ แล้วกดแป้นโทรออกให้ถูกต้อง
                </p>
                
                <div class="selection-group">
                    <h3>เลือกระดับความยาก</h3>
                    <div class="difficulty-options">
                        <button class="btn btn-diff" data-diff="easy" data-desc="เบอร์จำแลง 4 หลัก (เช่น 1150)">Easy</button>
                        <button class="btn btn-diff active" data-diff="medium" data-desc="เบอร์บ้าน 7 หลัก (เช่น 02-xxx-xxxx)">Medium</button>
                        <button class="btn btn-diff" data-diff="hard" data-desc="เบอร์มือถือ 10 หลัก (เช่น 081-xxx-xxxx)">Hard</button>
                    </div>
                    <p id="diff-desc" class="helper-text">เบอร์บ้าน 7 หลัก (เช่น 02-xxx-xxxx)</p>
                </div>
                
                <button id="start-btn" class="btn btn-primary btn-large">เริ่มเกม</button>
            </div>
        </div>

        <!-- Screen 2: Phonebook Screen -->
        <div id="phonebook-screen" class="screen">
            <div class="panel book-panel">
                <div class="book-header">สมุดโทรศัพท์</div>
                <div class="book-content">
                    <h2 id="target-name" class="friend-name">ป้าแมว</h2>
                    <div id="target-number" class="phone-number">081-555</div>
                </div>
                <div class="timer-bar-container">
                    <div id="memorize-timer-bar" class="timer-bar"></div>
                </div>
                <p class="hint-text">จำเบอร์นี้ให้ดี!</p>
            </div>
        </div>

        <!-- Screen 3: Keypad Screen -->
        <div id="keypad-screen" class="screen">
            <div class="game-stats">
                <span id="score-display">คะแนน: 0</span>
                <span id="time-display">03:00</span>
            </div>
            
            <div class="panel phone-panel">
                <div class="display-area">
                    <div id="name-prompt">โทรหา: ป้าแมว</div>
                    <div id="input-display" class="input-display"></div>
                </div>
                
                <div class="keypad">
                    <button class="btn btn-key">1</button>
                    <button class="btn btn-key">2</button>
                    <button class="btn btn-key">3</button>
                    <button class="btn btn-key">4</button>
                    <button class="btn btn-key">5</button>
                    <button class="btn btn-key">6</button>
                    <button class="btn btn-key">7</button>
                    <button class="btn btn-key">8</button>
                    <button class="btn btn-key">9</button>
                    <button class="btn btn-action btn-clear">C</button>
                    <button class="btn btn-key">0</button>
                    <button class="btn btn-action btn-del">⌫</button>
                </div>
                
                <button id="call-btn" class="btn btn-call btn-large">
                    <span class="icon">📞</span> โทรออก
                </button>
            </div>
        </div>

        <!-- Screen 4: End Screen -->
        <div id="end-screen" class="screen">
            <div class="panel main-panel">
                <h1 class="game-over-title">หมดเวลา!</h1>
                <div class="final-score-box">
                    <p>คะแนนที่ทำได้</p>
                    <h2 id="final-score">0</h2>
                </div>
                
                <button id="restart-btn" class="btn btn-primary btn-large">เล่นอีกครั้ง</button>
            </div>
        </div>

        <!-- Visual Feedback Elements -->
        <div id="confetti-container"></div>
    </div>

    <!-- Audio Elements -->
    <audio id="sfx-key" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" preload="auto"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>
    <audio id="bgm" src="https://assets.mixkit.co/music/preview/mixkit-a-beautiful-day-471.mp3" loop preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
